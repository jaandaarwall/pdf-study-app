        function setActiveDocument(side, docId, render = true) {
            state.view[side].docId = docId;
            state.view[side].pageNum = 1;
            state.view[side].scrollTop = 0; 
            state.lastActiveSide = side;
            clearSelection();
            closeViewportSearch(side); 
            saveSettings(); 
            if (render) {
                renderPage(side);
                renderDocList();
            }
        }

        async function renderPage(side) {
            const viewState = state.view[side];
            const docId = viewState.docId;
            const canvas = els[side + 'Canvas'];
            const ctx = canvas.getContext('2d');
            const annoCanvas = els[side + 'AnnoCanvas'];
            const annoCtx = annoCanvas.getContext('2d');
            const textLayer = els[side + 'TextLayer'];

            if (!docId || !state.documents[docId]) {
                canvas.width = 0; canvas.height = 0;
                annoCanvas.width = 0; annoCanvas.height = 0;
                textLayer.innerHTML = '';
                els[side + 'Title'].innerText = 'None';
                els[side + 'PageInd'].innerText = '-- / --';
                document.getElementById(side + '-markers-layer').innerHTML = '';
                els[side + 'Wrapper'].querySelectorAll('.text-box').forEach(e => e.remove());
                return;
            }

            const doc = state.documents[docId];
            els[side + 'Title'].innerText = doc.name;
            els[side + 'PageInd'].innerText = `${viewState.pageNum} / ${doc.pageCount}`;

            try {
                const page = await doc.pdfDoc.getPage(viewState.pageNum);
                const scale = viewState.scale || 1.5;
                const viewport = page.getViewport({ scale: scale }); 

                canvas.width = viewport.width; canvas.height = viewport.height;
                annoCanvas.width = viewport.width; annoCanvas.height = viewport.height;

                const wrapper = els[side + 'Wrapper'];
                wrapper.style.width = `${viewport.width}px`;
                wrapper.style.height = `${viewport.height}px`;

                const renderContext = { canvasContext: ctx, viewport: viewport };
                await page.render(renderContext).promise;

                const textContent = await page.getTextContent();
                renderTextLayerCustom(textContent, textLayer, viewport);

                const searchInput = document.getElementById(`${side}-search-input`);
                if (!searchInput.classList.contains('hidden') && searchInput.value) {
                    renderSearchHighlights(side);
                }

                const viewportEl = els[side + 'Viewport'];
                if (viewState.scrollTop) viewportEl.scrollTop = viewState.scrollTop;

                renderMarkersForView(side);
                renderAnnotations(side);
                renderTextLayer(side);
            } catch (err) {
                console.error("Error rendering page:", err);
            }
        }

        function navigatePage(side, delta) {
            const viewState = state.view[side];
            if (!viewState.docId) return;
            const doc = state.documents[viewState.docId];
            const newPage = viewState.pageNum + delta;
            if (newPage >= 1 && newPage <= doc.pageCount) {
                viewState.pageNum = newPage;
                viewState.scrollTop = 0; 
                state.lastActiveSide = side;
                clearSelection();
                saveSettings(); 
                renderPage(side);
            }
        }

        function clearSelection() {
            state.selection = {
                active: false,
                side: null,
                mode: 'idle',
                marqueeStart: null,
                marqueeCurrent: null,
                selectedImages: [],
                selectedTextBoxes: [],
                selectedStrokes: [],
                boundingBox: null
            };
            ['left', 'right'].forEach(side => {
                const wrapper = els[side + 'Wrapper'];
                wrapper.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
            });
        }

        function getStrokeBounds(stroke) {
            if (!stroke.points || stroke.points.length === 0) return { x: 0, y: 0, w: 0, h: 0 };
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            stroke.points.forEach(p => {
                if(p.x < minX) minX = p.x;
                if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y;
                if(p.y > maxY) maxY = p.y;
            });
            return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
        }

        function rectsIntersect(r1, r2) {
            return !(r2.x > r1.x + r1.w || 
                     r2.x + r2.w < r1.x || 
                     r2.y > r1.y + r1.h || 
                     r2.y + r2.h < r1.y);
        }

        function renderAnnotations(side) {
            const viewState = state.view[side];
            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            const pageData = (state.annotations[viewState.docId] && state.annotations[viewState.docId][viewState.pageNum]) || { strokes: [], images: [], textBoxes: [] };
            
            pageData.images.forEach(img => {
                const imgObj = state.imageCache[img.id];
                if (imgObj) {
                    ctx.drawImage(imgObj, img.x * width, img.y * height, img.w * width, img.h * height);
                }
            });

            // NEW SMOOTH CODE
            pageData.strokes.forEach(stroke => {
                const isEraser = (stroke.tool === 'eraser-pixel');
                // drawSmoothPath(ctx, stroke.points, width, height, stroke.size, stroke.color, isEraser);
                drawSmoothPath(ctx, stroke, width, height); 
            });

            if (state.selection.active && state.selection.side === side && state.selection.mode === 'marquee') {
                const start = state.selection.marqueeStart;
                const curr = state.selection.marqueeCurrent;
                const x = Math.min(start.x, curr.x) * width;
                const y = Math.min(start.y, curr.y) * height;
                const w = Math.abs(curr.x - start.x) * width;
                const h = Math.abs(curr.y - start.y) * height;

                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = 'rgba(59, 130, 246, 0.1)';
                ctx.fillRect(x, y, w, h);
                ctx.setLineDash([]);
            }

            if (state.selection.active && state.selection.side === side && (state.selection.mode === 'idle' || state.selection.mode === 'dragging' || state.selection.mode === 'resizing')) {
                const bbox = state.selection.boundingBox;
                if (bbox) {
                    const sx = bbox.x * width;
                    const sy = bbox.y * height;
                    const sw = bbox.w * width;
                    const sh = bbox.h * height;

                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([]);
                    ctx.strokeRect(sx, sy, sw, sh);

                    ctx.fillStyle = '#3b82f6';
                    ctx.fillRect(sx + sw - 8, sy + sh - 8, 16, 16);
                }
            }
        }

        function drawSmoothPath(ctx, stroke, width, height) {
            const points = stroke.points;
            if (points.length < 2) return;

            ctx.beginPath();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const isEraser = (stroke.tool === 'eraser-pixel');
            const isHighlighter = (stroke.tool === 'highlighter');

            if (isEraser) {
                // Eraser Logic
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = stroke.size * width; 
            } 
            else if (isHighlighter) {
                // HIGHLIGHTER LOGIC
                // 'multiply' blends the color with the text underneath so text remains readable
                ctx.globalCompositeOperation = 'multiply'; 
                // Set transparency (0.4 = 40% opacity)
                ctx.globalAlpha = 0.4; 
                ctx.strokeStyle = stroke.color;
                // Highlighters are usually wider than the pen stroke size implies
                ctx.lineWidth = stroke.size * width * 3; 
            } 
            else {
                // Standard Pen Logic
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = stroke.color;
                ctx.lineWidth = stroke.size * width; 
            }

            // --- Curve Drawing Logic ---
            // Start at the first point
            let p0 = points[0];
            ctx.moveTo(p0.x * width, p0.y * height);

            // If only 2 points, draw a straight line
            if (points.length === 2) {
                ctx.lineTo(points[1].x * width, points[1].y * height);
            } else {
                // Loop through points to create quadratic curves
                for (let i = 1; i < points.length - 1; i++) {
                    let p_curr = points[i];
                    let p_next = points[i + 1];

                    // Calculate the midpoint between current and next point
                    let midX = (p_curr.x + p_next.x) / 2 * width;
                    let midY = (p_curr.y + p_next.y) / 2 * height;

                    // Draw a quadratic curve to the midpoint
                    ctx.quadraticCurveTo(p_curr.x * width, p_curr.y * height, midX, midY);
                }
                
                // Connect to the very last point
                let last = points[points.length - 1];
                ctx.lineTo(last.x * width, last.y * height);
            }

            ctx.stroke();

            // --- Reset Context ---
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
        }
        

        function startAnnotationStroke(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            
            if (!state.annotations[docId]) state.annotations[docId] = {};
            if (!state.annotations[docId][pageNum]) state.annotations[docId][pageNum] = { strokes: [], images: [], textBoxes: [] };

            const normalizedSize = state.annoThickness / 1000; 
            
            // --- FIX: Determine specific rendering settings for this tool ---
            let sizeMultiplier = 1;
            let compositeOp = 'source-over';
            let alpha = 1.0;

            if (state.annoTool === 'eraser-pixel') {
                compositeOp = 'destination-out';
            } else if (state.annoTool === 'highlighter') {
                // Highlighter settings (must match drawSmoothPath)
                compositeOp = 'multiply';
                alpha = 0.4;
                sizeMultiplier = 3; 
            }
            // -----------------------------------------------------------

            const newStroke = {
                tool: state.annoTool,
                color: state.annoColor,
                size: normalizedSize,
                points: [{ x, y }]
            };

            state.annotations[docId][pageNum].strokes.push(newStroke);
            
            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.beginPath();
            ctx.lineCap = 'round';
            
            // Apply calculated settings
            ctx.globalCompositeOperation = compositeOp;
            ctx.globalAlpha = alpha;
            ctx.lineWidth = normalizedSize * width * sizeMultiplier; // Apply Multiplier

            if (state.annoTool !== 'eraser-pixel') {
                ctx.strokeStyle = state.annoColor;
            }
            
            // Draw initial dot
            ctx.moveTo(x * width, y * height);
            ctx.lineTo(x * width, y * height);
            ctx.stroke();
            
            // Reset context
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
        }

        function continueAnnotationStroke(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            const strokes = state.annotations[docId][pageNum].strokes;
            const currentStroke = strokes[strokes.length - 1];
            
            currentStroke.points.push({ x, y });

            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const pts = currentStroke.points;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // --- FIX: Determine specific rendering settings for this tool ---
            let sizeMultiplier = 1;
            let compositeOp = 'source-over';
            let alpha = 1.0;

            if (state.annoTool === 'eraser-pixel') {
                compositeOp = 'destination-out';
            } else if (state.annoTool === 'highlighter') {
                // Highlighter settings (must match drawSmoothPath)
                compositeOp = 'multiply';
                alpha = 0.4;
                sizeMultiplier = 3; 
            }
            // -----------------------------------------------------------

            // Apply settings
            ctx.globalCompositeOperation = compositeOp;
            ctx.globalAlpha = alpha;
            ctx.lineWidth = currentStroke.size * width * sizeMultiplier; // Apply Multiplier

            if (state.annoTool !== 'eraser-pixel') {
                ctx.strokeStyle = currentStroke.color;
            }

            // --- SMOOTH REAL-TIME DRAWING LOGIC ---
            if (pts.length >= 3) {
                const p1 = pts[pts.length - 3];
                const p2 = pts[pts.length - 2];
                const p3 = pts[pts.length - 1];

                // Calculate midpoints
                const mid1x = (p1.x + p2.x) / 2 * width;
                const mid1y = (p1.y + p2.y) / 2 * height;
                const mid2x = (p2.x + p3.x) / 2 * width;
                const mid2y = (p2.y + p3.y) / 2 * height;

                // Draw the quadratic curve
                ctx.beginPath();
                ctx.moveTo(mid1x, mid1y);
                ctx.quadraticCurveTo(p2.x * width, p2.y * height, mid2x, mid2y);
                ctx.stroke();
            } else if (pts.length === 2) {
                // Fallback for very short strokes
                const p1 = pts[0];
                const p2 = pts[1];
                ctx.beginPath();
                ctx.moveTo(p1.x * width, p1.y * height);
                ctx.lineTo(p2.x * width, p2.y * height);
                ctx.stroke();
            }
            
            // Reset context
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
        }

        function finishAnnotationStroke(side) {
            const docId = state.view[side].docId;
            saveAnnotationsToDB(docId, state.annotations[docId]);
        }

        function distToSegmentSquared(p, v, w) {
            const l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 === 0) return (p.x - v.x)**2 + (p.y - v.y)**2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x)))**2 + 
                   (p.y - (v.y + t * (w.y - v.y)))**2;
        }

        function deleteStrokeAt(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            
            if (!state.annotations[docId] || !state.annotations[docId][pageNum]) return;

            const strokes = state.annotations[docId][pageNum].strokes;
            const threshold = 0.0002; 

            let foundIndex = -1;

            for (let i = strokes.length - 1; i >= 0; i--) {
                const stroke = strokes[i];
                if (stroke.tool === 'eraser-pixel') continue;

                for (let j = 0; j < stroke.points.length - 1; j++) {
                    const p1 = stroke.points[j];
                    const p2 = stroke.points[j+1];
                    if (distToSegmentSquared({x, y}, p1, p2) < threshold) {
                        foundIndex = i;
                        break;
                    }
                }
                if (foundIndex !== -1) break;
            }

            if (foundIndex !== -1) {
                strokes.splice(foundIndex, 1);
                renderAnnotations(side);
                return true; 
            }
            return false;
        }

        function handleKeyDown(e) {
            if ((e.key === 'Delete' || e.key === 'Backspace') && state.selection.active) {
                if(e.target.tagName !== 'INPUT' && !e.target.isContentEditable) {
                    e.preventDefault();
                    deleteSelection();
                }
            }
        }

        function undoLastStroke() {
            const docId = state.view.left.docId || state.view.right.docId;
            if (!docId) return;

            const leftPage = state.view.left.pageNum;
            const rightPage = state.view.right.pageNum;
            
            let changed = false;

            const undoOnView = (side, dId, pNum) => {
                const pageData = state.annotations[dId] && state.annotations[dId][pNum];
                if (pageData && pageData.strokes && pageData.strokes.length > 0) {
                    pageData.strokes.pop();
                    saveAnnotationsToDB(dId, state.annotations[dId]);
                    renderAnnotations(side);
                    changed = true;
                }
            };

            if (state.view.left.docId === docId) undoOnView('left', docId, leftPage);
            if (state.view.right.docId === docId) undoOnView('right', docId, rightPage);

            if (!changed) {
                 if(state.view.left.docId) undoOnView('left', state.view.left.docId, state.view.left.pageNum);
                 if(state.view.right.docId) undoOnView('right', state.view.right.docId, state.view.right.pageNum);
            }
        }

        function clearCurrentPageAnnotations() {
            if(!confirm("Clear all annotations and images on current page(s)?")) return;

            const clearView = (side, dId, pNum) => {
                if (dId && state.annotations[dId]) {
                    state.annotations[dId][pNum] = { strokes: [], images: [], textBoxes: [] };
                    saveAnnotationsToDB(dId, state.annotations[dId]);
                    renderAnnotations(side);
                    renderTextLayer(side);
                }
            };
            clearView('left', state.view.left.docId, state.view.left.pageNum);
            clearView('right', state.view.right.docId, state.view.right.pageNum);
        }

        async function insertPage(side, type) {
            const docId = state.view[side].docId;
            if (!docId) { showModal("Error", "No document loaded."); return; }

            const insertIndex = state.view[side].pageNum;
            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Processing PDF...";

            try {
                const originalDoc = state.documents[docId];
                const arrayBuffer = await originalDoc.file.arrayBuffer();
                const pdfLibDoc = await PDFDocument.load(arrayBuffer);

                const pages = pdfLibDoc.getPages();
                const refPageIndex = Math.max(0, Math.min(insertIndex - 1, pages.length - 1));
                const refPage = pages[refPageIndex];
                const { width, height } = refPage.getSize();

                if (type === 'blank') {
                    pdfLibDoc.insertPage(insertIndex, [width, height]);
                } else if (type === 'duplicate') {
                    const [copiedPage] = await pdfLibDoc.copyPages(pdfLibDoc, [refPageIndex]);
                    pdfLibDoc.insertPage(insertIndex, copiedPage);
                }

                const newPdfBytes = await pdfLibDoc.save();
                const newBlob = new Blob([newPdfBytes], { type: 'application/pdf' });

                if (state.annotations[docId]) {
                    const newAnnoMap = {};
                    Object.keys(state.annotations[docId]).forEach(key => {
                        const pageNum = parseInt(key);
                        if (pageNum > insertIndex) {
                            newAnnoMap[pageNum + 1] = state.annotations[docId][pageNum];
                        } else {
                            newAnnoMap[pageNum] = state.annotations[docId][pageNum];
                        }
                    });
                    state.annotations[docId] = newAnnoMap;
                    await saveAnnotationsToDB(docId, state.annotations[docId]);
                }

                state.embeddings.forEach(e => {
                    if (e.docId === docId && e.pageNum > insertIndex) {
                        e.pageNum += 1;
                    }
                });

                const updatedLinks = [];
                for (const link of state.links) {
                    const updatePoint = (pt) => {
                        if (pt.docId === docId && pt.page > insertIndex) {
                            return { ...pt, page: pt.page + 1 };
                        }
                        return pt;
                    };
                    const newLink = {
                        ...link,
                        source: updatePoint(link.source),
                        target: updatePoint(link.target)
                    };
                    updatedLinks.push(newLink);
                    await saveLinkToDB(newLink);
                }
                state.links = updatedLinks;

                const newPdfJsDoc = await pdfjsLib.getDocument(newPdfBytes).promise;

                state.documents[docId].file = newBlob;
                state.documents[docId].pdfDoc = newPdfJsDoc;
                state.documents[docId].pageCount = newPdfJsDoc.numPages;

                await saveDocumentToDB({
                    id: docId,
                    name: originalDoc.name,
                    pageCount: newPdfJsDoc.numPages,
                    thumbnail: originalDoc.thumbnail,
                    fileBlob: newBlob
                });

                state.view[side].pageNum = insertIndex + 1;
                
                renderPage(side);
                renderDocList();
                showModal("Success", `${type === 'blank' ? 'Blank' : 'Duplicated'} page added.`);

            } catch (err) {
                console.error(err);
                showModal("Error", "Failed to process PDF.");
            } finally {
                els.loadingSpinner.classList.add('hidden');
            }
        }

        // --- SQLite Export Logic ---
        window.exportProject = async function() {
            const docKeys = Object.keys(state.documents);
            if (docKeys.length === 0) { showModal("Export", "No documents loaded."); return; }

            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Creating SQLite Database...";

            try {
                const db = new window.SQL.Database();

                db.run(`
                    CREATE TABLE documents (
                        id TEXT PRIMARY KEY,
                        name TEXT,
                        pdf_blob BLOB,
                        thumbnail TEXT
                    );
                `);

                db.run(`
                    CREATE TABLE links (
                        id TEXT PRIMARY KEY,
                        source_json TEXT,
                        target_json TEXT
                    );
                `);

                db.run(`
                    CREATE TABLE annotations (
                        doc_id TEXT,
                        page_num INTEGER,
                        data_json TEXT,
                        PRIMARY KEY (doc_id, page_num)
                    );
                `);

                db.run(`
                    CREATE TABLE embeddings (
                        id TEXT PRIMARY KEY,
                        text TEXT,
                        vector_json TEXT,
                        doc_id TEXT,
                        page_num INTEGER
                    );
                `);

                db.run(`
                    CREATE TABLE chats (
                        id TEXT PRIMARY KEY,
                        title TEXT,
                        messages_json TEXT
                    );
                `);

                db.run(`
                    CREATE TABLE settings (
                        key TEXT PRIMARY KEY,
                        value TEXT
                    );
                `);

                const stmtDoc = db.prepare("INSERT INTO documents VALUES (?, ?, ?, ?)");
                for (const id of docKeys) {
                    const doc = state.documents[id];
                    const pdfArray = await blobToUint8Array(doc.file);
                    stmtDoc.run([id, doc.name, pdfArray, doc.thumbnail]);
                }
                stmtDoc.free();

                const stmtLink = db.prepare("INSERT INTO links VALUES (?, ?, ?)");
                for (const link of state.links) {
                    stmtLink.run([link.id, JSON.stringify(link.source), JSON.stringify(link.target)]);
                }
                stmtLink.free();

                const stmtAnno = db.prepare("INSERT INTO annotations VALUES (?, ?, ?)");
                for (const docId in state.annotations) {
                    for (const pageNum in state.annotations[docId]) {
                        stmtAnno.run([docId, pageNum, JSON.stringify(state.annotations[docId][pageNum])]);
                    }
                }
                stmtAnno.free();

                const stmtEmb = db.prepare("INSERT INTO embeddings VALUES (?, ?, ?, ?, ?)");
                for (const emb of state.embeddings) {
                    stmtEmb.run([emb.id, emb.text, JSON.stringify(emb.vector), emb.docId, emb.pageNum]);
                }
                stmtEmb.free();

                const stmtChat = db.prepare("INSERT INTO chats VALUES (?, ?, ?)");
                for (const chat of state.chats) {
                    stmtChat.run([chat.id, chat.title, JSON.stringify(chat.messages)]);
                }
                stmtChat.free();

                const settings = {
                    id: 'appState',
                    view: state.view,
                    splitRatio: state.splitRatio,
                    appMode: state.appMode,
                    annoTool: state.annoTool,
                    annoColor: state.annoColor,
                    annoThickness: state.annoThickness,
                    leftSidebarCollapsed: document.body.classList.contains('left-sidebar-collapsed'),
                    aiSidebarCollapsed: document.body.classList.contains('ai-sidebar-collapsed')
                };
                const stmtSet = db.prepare("INSERT INTO settings VALUES (?, ?)");
                stmtSet.run(['appState', JSON.stringify(settings)]);
                stmtSet.free();

                const data = db.export();
                const blob = new Blob([data], { type: 'application/x-sqlite3' });
                
                let handle = state.projectFileHandle;
                
                if (!handle) {
                    try {
                        if (window.showSaveFilePicker) {
                            handle = await window.showSaveFilePicker({
                                suggestedName: 'pdf_linker_project.sqlite',
                                types: [{ description: 'SQLite Database', accept: {'application/x-sqlite3': ['.sqlite']}}],
                            });
                        } else {
                            throw new Error("API not supported");
                        }
                    } catch (err) {
                        if (err.name === 'AbortError') {
                            els.loadingSpinner.classList.add('hidden');
                            return; 
                        }
                        throw new Error("Use Standard Download");
                    }
                }

                try {
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    state.projectFileHandle = handle;
                    showModal("Saved", "Project saved successfully as SQLite database!");
                } catch (writeErr) {
                    console.error(writeErr);
                    throw new Error("Write failed");
                }

            } catch (err) {
                console.error("Save Error:", err);
                try {
                    const data = db.export(); 
                    const blob = new Blob([data], { type: 'application/x-sqlite3' });
                    saveAs(blob, "pdf_linker_project.sqlite");
                    showModal("Download", "Project downloaded.");
                } catch (fallbackErr) {
                     showModal("Error", "Failed to save project.");
                }
            } finally {
                els.loadingSpinner.classList.add('hidden');
            }
        };

        // --- CORRECTED SQLite Import Logic ---
        async function handleProjectImport(e) {
            const file = e.target.files[0];
            if (!file) return;

            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Loading SQLite Project...";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const u8array = new Uint8Array(arrayBuffer);
                const db = new window.SQL.Database(u8array);

                // Load Documents
                const docRows = db.exec("SELECT * FROM documents");
                if (docRows.length > 0) {
                    const rows = docRows[0].values;
                    for (let i = 0; i < rows.length; i++) {
                        const [id, name, blobData, thumb] = rows[i];
                        
                        const blob = uint8ArrayToBlob(blobData, 'application/pdf');
                        const pdfArrayBuffer = await blob.arrayBuffer();
                        const pdfDoc = await pdfjsLib.getDocument(pdfArrayBuffer).promise;

                        state.documents[id] = {
                            id, name, file: blob, pdfDoc, 
                            pageCount: pdfDoc.numPages, thumbnail: thumb
                        };
                        await saveDocumentToDB({ id, name, pageCount: pdfDoc.numPages, thumbnail: thumb, fileBlob: blob });
                    }
                }

                // Load Annotations
                const annoRows = db.exec("SELECT * FROM annotations");
                if (annoRows.length > 0) {
                    const rows = annoRows[0].values;
                    for (let i = 0; i < rows.length; i++) {
                        const [docId, pageNum, json] = rows[i];
                        
                        if (!state.annotations[docId]) state.annotations[docId] = {};
                        const data = JSON.parse(json);
                        state.annotations[docId][pageNum] = data;
                        
                        // Rehydrate images
                        if (data.images) {
                            data.images.forEach(img => {
                                const imageObj = new Image();
                                imageObj.src = img.src;
                                state.imageCache[img.id] = imageObj;
                            });
                        }
                        if (!data.textBoxes) data.textBoxes = [];
                        
                        await saveAnnotationsToDB(docId, state.annotations[docId]);
                    }
                }

                // Load Links
                const linkRows = db.exec("SELECT * FROM links");
                if (linkRows.length > 0) {
                    const rows = linkRows[0].values;
                    for (let i = 0; i < rows.length; i++) {
                        const [id, srcJson, tgtJson] = rows[i];
                        state.links.push({
                            id,
                            source: JSON.parse(srcJson),
                            target: JSON.parse(tgtJson)
                        });
                        await saveLinkToDB(state.links[state.links.length-1]);
                    }
                }

                // --- RESTORED: Load Embeddings from SQLite ---
                // We load the saved vectors to avoid regenerating them every time.
                const embRows = db.exec("SELECT * FROM embeddings");
                if (embRows.length > 0) {
                    const rows = embRows[0].values;
                    for (let i = 0; i < rows.length; i++) {
                        const [id, text, vecJson, dId, pNum] = rows[i];
                        
                        // Safety check to ensure the document still exists
                        if (state.documents[dId]) {
                            try {
                                const vector = JSON.parse(vecJson);
                                state.embeddings.push({
                                    id,
                                    text,
                                    vector: vector,
                                    docId: dId,
                                    pageNum: pNum
                                });
                            } catch (err) {
                                console.error("Failed to parse embedding vector for", id, err);
                            }
                        }
                    }
                }

                // Load Chats
                const chatRows = db.exec("SELECT * FROM chats");
                if (chatRows.length > 0) {
                    const rows = chatRows[0].values;
                    state.chats = [];
                    for (let i = 0; i < rows.length; i++) {
                        const [id, title, msgsJson] = rows[i];
                        state.chats.push({
                            id,
                            title,
                            messages: JSON.parse(msgsJson)
                        });
                        await saveChatToDB(state.chats[i]);
                    }
                    if (state.chats.length > 0) state.currentChatId = state.chats[0].id;
                } else {
                    await createNewChat();
                }

                // Load Settings
                const setRows = db.exec("SELECT * FROM settings WHERE key='appState'");
                if (setRows.length > 0) {
                    const rows = setRows[0].values;
                    const s = JSON.parse(rows[0][1]);
                    state.view = s.view;
                    state.splitRatio = s.splitRatio;
                    state.appMode = s.appMode;
                    state.annoTool = s.annoTool;
                    state.annoColor = s.annoColor;
                    state.annoThickness = s.annoThickness;
                    
                    els.leftPanel.style.width = (state.splitRatio * 100) + '%';
                    els.rightPanel.style.width = ((1 - state.splitRatio) * 100) + '%';
                    
                    setAppMode(state.appMode, false);
                    setAnnoTool(state.annoTool, false);
                    els.colorPicker.value = state.annoColor;
                    els.thicknessPicker.value = s.annoThickness;

                    if (s.leftSidebarCollapsed) document.body.classList.add('left-sidebar-collapsed');
                    else document.body.classList.remove('left-sidebar-collapsed');
                    
                    if (s.aiSidebarCollapsed) document.body.classList.add('ai-sidebar-collapsed');
                    else document.body.classList.remove('ai-sidebar-collapsed');

                    saveSettings(); 
                }

                state.projectFileHandle = null;
                showModal("Import Success", "Project loaded from SQLite.");
                
                renderDocList();
                renderChatList();
                renderChatMessages();
                updateZoomIndicator('left');
                updateZoomIndicator('right');
                if (state.view.left.docId) renderPage('left');
                if (state.view.right.docId) renderPage('right');
                
                // --- SMART INDEXING ---
                // Pass false. This will check if any documents are missing embeddings
                // and only regenerate those. If all are loaded, it does nothing.
                indexDocuments(false);

            } catch (err) {
                console.error(err);
                showModal("Import Error", "Failed to load project. Ensure it is a valid .sqlite file.");
            } finally {
                els.loadingSpinner.classList.add('hidden');
            }
            e.target.value = '';
        }

        function getMousePosInViewport(evt, side) {
            const rect = els[side + 'Wrapper'].getBoundingClientRect();
            return {
                x: (evt.clientX - rect.left) / rect.width, 
                y: (evt.clientY - rect.top) / rect.height
            };
        }


        function handlePointerDown(e) {
            if (state.appMode === 'annotation' && state.annoTool === 'text') {
                const target = e.target;
                const tb = target.closest('.text-box');
                
                if (tb) {
                    const rect = tb.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const handleSize = 12;
                    
                    if (x >= -handleSize && x <= handleSize && y >= -handleSize && y <= handleSize) {
                        e.preventDefault();
                        startDirectTextManipulation(e, tb, 'move');
                        return;
                    }
                    if (x >= rect.width - handleSize && x <= rect.width + handleSize &&
                        y >= rect.height - handleSize && y <= rect.height + handleSize) {
                        e.preventDefault();
                        startDirectTextManipulation(e, tb, 'resize');
                        return;
                    }
                    
                    return; 
                }
            }

            if (e.target.closest('.link-marker')) {
                if (state.appMode === 'delete-link') {
                    e.preventDefault();
                    e.stopPropagation();
                    const markerEl = e.target.closest('.link-marker');
                    const linkId = markerEl.dataset.linkId;
                    if (linkId) deleteLink(linkId);
                    return;
                }
                return;
            }
            if (e.target.closest('#vertical-resizer') || e.target.closest('button') || e.target.closest('input')) return;

            e.target.setPointerCapture(e.pointerId);




            // --- ROBUST FIX: Determine side by checking actual panel rectangles ---
            // We use the visual boundaries of the panels directly instead of calculating ratios,
            // which prevents errors when sidebars or screen size change layout.
            
            const leftPanelRect = els.leftPanel.getBoundingClientRect();
            const rightPanelRect = els.rightPanel.getBoundingClientRect();
            let clickedSide = null;

            // Check if click is physically inside Left Panel
            if (e.clientX >= leftPanelRect.left && e.clientX <= leftPanelRect.right &&
                e.clientY >= leftPanelRect.top && e.clientY <= leftPanelRect.bottom) {
                clickedSide = 'left';
            }
            // Check if click is physically inside Right Panel
            else if (e.clientX >= rightPanelRect.left && e.clientX <= rightPanelRect.right &&
                     e.clientY >= rightPanelRect.top && e.clientY <= rightPanelRect.bottom) {
                clickedSide = 'right';
            }
            // ---------------------------------------------------------



            if (!clickedSide) return;
            if (!state.view[clickedSide].docId) return;

            state.lastActiveSide = clickedSide;

            if (state.appMode === 'linking') {
                state.drawing.active = true;
                state.drawing.pointerId = e.pointerId;
                state.drawing.startSide = clickedSide;
                const pos = getMousePosInViewport(e, clickedSide);
                state.drawing.startPoint = { x: e.clientX, y: e.clientY }; 
                state.drawing.startPointData = { 
                    docId: state.view[clickedSide].docId,
                    page: state.view[clickedSide].pageNum,
                    x: pos.x, y: pos.y
                };
                state.drawing.currentPoint = { x: e.clientX, y: e.clientY };
                els.currentPath.style.display = 'block';
                updatePathVisual();
            } 
            else if (state.appMode === 'annotation') {
                state.drawing.active = true;
                state.drawing.pointerId = e.pointerId;
                state.drawing.startSide = clickedSide;

                if (state.annoTool === 'select') {
                    const pos = getMousePosInViewport(e, clickedSide);
                    const pageData = state.annotations[state.view[clickedSide].docId]?.[state.view[clickedSide].pageNum];
                    let actionTaken = false;

                    if (state.selection.active && state.selection.side === clickedSide) {
                        const bbox = state.selection.boundingBox;
                        const handleSize = 0.02; 
                        const right = bbox.x + bbox.w;
                        const bottom = bbox.y + bbox.h;
                        
                        if (pos.x >= right - handleSize && pos.x <= right + handleSize &&
                            pos.y >= bottom - handleSize && pos.y <= bottom + handleSize) {
                            state.selection.mode = 'resizing';
                            state.selection.dragStartMouse = { x: pos.x, y: pos.y }; 
                            state.selection.dragStartPositions = {
                                bbox: { ...bbox },
                                images: state.selection.selectedImages.map(img => ({ ...img })),
                                strokes: state.selection.selectedStrokes.map(stk => ({ points: stk.points.map(p => ({...p})) })),
                                textBoxes: state.selection.selectedTextBoxes.map(tb => ({ ...tb }))
                            };
                            actionTaken = true;
                        } 
                        else if (pos.x >= bbox.x && pos.x <= bbox.x + bbox.w &&
                                 pos.y >= bbox.y && pos.y <= bbox.y + bbox.h) {
                            state.selection.mode = 'dragging';
                            state.selection.dragStartMouse = { x: pos.x, y: pos.y };
                            actionTaken = true;
                        }
                    }

                    if (!actionTaken && pageData) {
                        if (pageData.images) {
                            for (let i = pageData.images.length - 1; i >= 0; i--) {
                                const img = pageData.images[i];
                                if (pos.x >= img.x && pos.x <= img.x + img.w &&
                                    pos.y >= img.y && pos.y <= img.y + img.h) {
                                    clearSelection();
                                    state.selection = {
                                        active: true, side: clickedSide, mode: 'dragging',
                                        selectedImages: [img],
                                        selectedTextBoxes: [],
                                        selectedStrokes: [],
                                        boundingBox: { x: img.x, y: img.y, w: img.w, h: img.h },
                                        dragStartMouse: { x: pos.x, y: pos.y }
                                    };
                                    actionTaken = true;
                                    renderAnnotations(clickedSide);
                                    renderTextLayer(clickedSide);
                                    break;
                                }
                            }
                        }
                        if (!actionTaken && pageData.textBoxes) {
                            for (let i = pageData.textBoxes.length - 1; i >= 0; i--) {
                                const tb = pageData.textBoxes[i];
                                if (pos.x >= tb.x && pos.x <= tb.x + tb.w &&
                                    pos.y >= tb.y && pos.y <= tb.y + tb.h) {
                                    clearSelection();
                                    state.selection = {
                                        active: true, side: clickedSide, mode: 'dragging',
                                        selectedImages: [],
                                        selectedTextBoxes: [tb],
                                        selectedStrokes: [],
                                        boundingBox: { x: tb.x, y: tb.y, w: tb.w, h: tb.h },
                                        dragStartMouse: { x: pos.x, y: pos.y }
                                    };
                                    actionTaken = true;
                                    renderAnnotations(clickedSide);
                                    renderTextLayer(clickedSide);
                                    break;
                                }
                            }
                        }
                    }

                    if (!actionTaken) {
                        clearSelection();
                        state.selection = {
                            active: true,
                            side: clickedSide,
                            mode: 'marquee',
                            marqueeStart: pos,
                            marqueeCurrent: pos
                        };
                    }
                    
                    renderAnnotations(clickedSide);
                } else if (state.annoTool === 'text') {
                    const pos = getMousePosInViewport(e, clickedSide);
                    state.drawing.startPointData = { x: pos.x, y: pos.y };
                    
                    els.textCreationRect.style.left = e.clientX + 'px';
                    els.textCreationRect.style.top = e.clientY + 'px';
                    els.textCreationRect.style.width = '0px';
                    els.textCreationRect.style.height = '0px';
                    els.textCreationRect.style.display = 'block';
                }
                else if (e.pointerType === 'pen' || e.button === 0) {
                     if (state.annoTool === 'eraser-stroke') {
                        state.drawing.startSide = clickedSide;
                    } else {
                        const pos = getMousePosInViewport(e, clickedSide);
                        startAnnotationStroke(clickedSide, pos.x, pos.y);
                    }
                }
            }
        }



        function startDirectTextManipulation(e, domElement, type) {
            const side = state.lastActiveSide;
            const wrapper = els[side + 'Wrapper'];
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            
            if (!state.annotations[docId] || !state.annotations[docId][pageNum]) return;
            const pageData = state.annotations[docId][pageNum];
            const box = pageData.textBoxes.find(b => b.id === domElement.dataset.id);
            if (!box) return;

            state.drawing.active = true;
            state.drawing.pointerId = e.pointerId;
            state.drawing.mode = type === 'move' ? 'text-move' : 'text-resize';
            state.drawing.activeTextBox = box;
            state.drawing.activeSide = side;

            const rect = wrapper.getBoundingClientRect();
            state.drawing.startPoint = {
                x: box.x, y: box.y, w: box.w, h: box.h
            };
            state.drawing.startMouse = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }


        function handlePointerMove(e) {
            const cursorEl = document.getElementById('tool-cursor');
            const cursorIcon = document.getElementById('tool-cursor-icon');
            
            // 1. Check if mouse is INSIDE a PDF viewport (Left or Right)
            const isInsideViewport = e.target.closest('#left-canvas-wrapper') || e.target.closest('#right-canvas-wrapper');
            
            // 2. Check conditions to show custom cursor
            const showCustomCursor = (
                state.appMode === 'annotation' && 
                isInsideViewport &&
                ['pen', 'highlighter', 'eraser-pixel', 'eraser-stroke'].includes(state.annoTool)
            );

            if (showCustomCursor) {
                // HIDE DEFAULT MOUSE
                document.body.classList.add('cursor-none');

                // SHOW CUSTOM ICON
                cursorEl.classList.remove('hidden');
                cursorEl.style.left = e.clientX + 'px';
                cursorEl.style.top = e.clientY + 'px';

                // Reset classes
                cursorEl.className = 'fixed pointer-events-none z-[100] flex items-center justify-center';
                cursorIcon.className = 'fa-solid';

                // Set Icon and Style based on current tool
                if (state.annoTool === 'pen') {
                    cursorIcon.classList.add('fa-pen');
                    // <--- ADD THIS LINE --->
                    cursorEl.classList.add('mode-pen');
                } 
                else if (state.annoTool === 'highlighter') {
                    cursorIcon.classList.add('fa-highlighter');
                    cursorEl.classList.add('mode-highlighter');
                } 
                else if (state.annoTool === 'eraser-pixel' || state.annoTool === 'eraser-stroke') {
                    cursorIcon.classList.add('fa-eraser');
                    cursorEl.classList.add('mode-eraser');
                }
            } 
            else {
                // RESTORE DEFAULT MOUSE & HIDE CUSTOM ICON
                document.body.classList.remove('cursor-none');
                cursorEl.classList.add('hidden');
            }

            if (!state.drawing.active) return;
            if (state.drawing.pointerId !== e.pointerId) return;

            const side = state.drawing.startSide;
            if (!side) return;

            if (state.appMode === 'annotation' && state.annoTool === 'text') {
                if (state.drawing.mode === 'text-move' || state.drawing.mode === 'text-resize') {
                    const wrapper = els[side + 'Wrapper'];
                    const box = state.drawing.activeTextBox;
                    const startData = state.drawing.startPoint;
                    const startMouse = state.drawing.startMouse;
                    
                    const wrapperRect = wrapper.getBoundingClientRect();
                    const currentMouseX = e.clientX - wrapperRect.left;
                    const currentMouseY = e.clientY - wrapperRect.top;
                    
                    const dx = (currentMouseX - startMouse.x) / wrapperRect.width;
                    const dy = (currentMouseY - startMouse.y) / wrapperRect.height;

                    const domBox = wrapper.querySelector(`.text-box[data-id="${box.id}"]`);

                    if (state.drawing.mode === 'text-move') {
                        box.x = Math.max(0, Math.min(1 - box.w, startData.x + dx));
                        box.y = Math.max(0, Math.min(1 - box.h, startData.y + dy));
                        if (domBox) {
                            domBox.style.left = (box.x * 100) + '%';
                            domBox.style.top = (box.y * 100) + '%';
                        }
                    } else if (state.drawing.mode === 'text-resize') {
                        let newW = Math.max(0.05, startData.w + dx);
                        let newH = Math.max(0.02, startData.h + dy);
                        
                        if (box.x + newW > 1) newW = 1 - box.x;
                        if (box.y + newH > 1) newH = 1 - box.y;

                        box.w = newW;
                        box.h = newH;

                        if (domBox) {
                            domBox.style.width = (box.w * 100) + '%';
                            domBox.style.height = (box.h * 100) + '%';
                        }
                    }
                    return;
                }
                
                const pos = getMousePosInViewport(e, side);
                const start = state.drawing.startPointData;
                const dx = e.clientX - (els[side+'Wrapper'].getBoundingClientRect().left + start.x * els[side+'Wrapper'].offsetWidth);
                const dy = e.clientY - (els[side+'Wrapper'].getBoundingClientRect().top + start.y * els[side+'Wrapper'].offsetHeight);

                els.textCreationRect.style.width = Math.abs(dx) + 'px';
                els.textCreationRect.style.height = Math.abs(dy) + 'px';
                els.textCreationRect.style.left = (e.clientX - Math.max(0, dx)) + 'px';
                els.textCreationRect.style.top = (e.clientY - Math.max(0, dy)) + 'px';
            }
            else if (state.appMode === 'linking') {
                state.drawing.currentPoint = { x: e.clientX, y: e.clientY };
                updatePathVisual();
            } 
            else if (state.appMode === 'annotation') {
                const pos = getMousePosInViewport(e, side);

                if (state.annoTool === 'select') {
                    if (state.selection.mode === 'marquee') {
                        state.selection.marqueeCurrent = pos;
                        renderAnnotations(side);
                    }
                    else if (state.selection.mode === 'dragging') {
                        const dx = pos.x - state.selection.dragStartMouse.x;
                        const dy = pos.y - state.selection.dragStartMouse.y;
                        
                        state.selection.selectedImages.forEach(img => {
                            img.x += dx;
                            img.y += dy;
                        });
                        state.selection.selectedTextBoxes.forEach(tb => {
                            tb.x += dx;
                            tb.y += dy;
                        });
                        state.selection.selectedStrokes.forEach(stk => {
                            stk.points.forEach(p => {
                                p.x += dx;
                                p.y += dy;
                            });
                        });

                        state.selection.boundingBox.x += dx;
                        state.selection.boundingBox.y += dy;

                        state.selection.dragStartMouse = pos;
                        renderAnnotations(side);
                        renderTextLayer(side);
                    }
                    else if (state.selection.mode === 'resizing') {
                        const originalState = state.selection.dragStartPositions;
                        const originX = originalState.bbox.x;
                        const originY = originalState.bbox.y;
                        const newW = Math.max(0.01, pos.x - originX);
                        const scaleX = newW / originalState.bbox.w;
                        const scaleY = scaleX; 

                        state.selection.selectedImages.forEach((img, idx) => {
                            const oldImg = originalState.images[idx];
                            img.x = originX + (oldImg.x - originX) * scaleX;
                            img.y = originY + (oldImg.y - originY) * scaleY;
                            img.w = oldImg.w * scaleX;
                            img.h = oldImg.h * scaleY;
                        });

                        state.selection.selectedTextBoxes.forEach((tb, idx) => {
                            const oldTb = originalState.textBoxes[idx];
                            tb.x = originX + (oldTb.x - originX) * scaleX;
                            tb.y = originY + (oldTb.y - originY) * scaleY;
                            tb.w = oldTb.w * scaleX;
                            tb.h = oldTb.h * scaleY;
                        });

                        state.selection.selectedStrokes.forEach((stk, idx) => {
                            const oldStk = originalState.strokes[idx];
                            stk.points.forEach((p, pIdx) => {
                                const oldP = oldStk.points[pIdx];
                                p.x = originX + (oldP.x - originX) * scaleX;
                                p.y = originY + (oldP.y - originY) * scaleY;
                            });
                        });

                        state.selection.boundingBox.w = newW;
                        state.selection.boundingBox.h = originalState.bbox.h * scaleY;
                        
                        renderAnnotations(side);
                        renderTextLayer(side);
                    }
                } 
                else if (state.annoTool === 'eraser-stroke') {
                    deleteStrokeAt(side, pos.x, pos.y);
                } else {
                    continueAnnotationStroke(side, pos.x, pos.y);
                }
            }
        }

        async function handlePointerUp(e) {

        // --- HIDE TOOL CURSOR ---
            const cursorEl = document.getElementById('tool-cursor');
            if(cursorEl) cursorEl.classList.add('hidden');
            // RESTORE MOUSE CURSOR IMMEDIATELY
            document.body.classList.remove('cursor-none');
            // ------------------------


            if (!state.drawing.active) return;
            if (state.drawing.pointerId !== e.pointerId) return;

            const side = state.drawing.startSide;

            if (state.appMode === 'annotation' && state.annoTool === 'text') {
                if (state.drawing.mode === 'text-move' || state.drawing.mode === 'text-resize') {
                    const docId = state.view[side].docId;
                    saveAnnotationsToDB(docId, state.annotations[docId]);
                    state.drawing.active = false;
                    state.drawing.mode = null;
                    state.drawing.activeTextBox = null;
                    return;
                }

                els.textCreationRect.style.display = 'none';
                
                const startData = state.drawing.startPointData;
                const endPos = getMousePosInViewport(e, side);
                
                let w = endPos.x - startData.x;
                let h = endPos.y - startData.y;
                let x = startData.x;
                let y = startData.y;
                
                if (w < 0) { x += w; w = Math.abs(w); }
                if (h < 0) { y += h; h = Math.abs(h); }

                if (w > 0.01 && h > 0.01) {
                    const docId = state.view[side].docId;
                    const pageNum = state.view[side].pageNum;
                    
                    if (!state.annotations[docId]) state.annotations[docId] = {};
                    if (!state.annotations[docId][pageNum]) state.annotations[docId][pageNum] = { strokes: [], images: [], textBoxes: [] };

                    const newBox = {
                        id: 'tb_' + Date.now(),
                        x: x, y: y, w: w, h: h,
                        content: '',
                        color: state.annoColor,
                        fontSize: 14 
                    };

                    state.annotations[docId][pageNum].textBoxes.push(newBox);
                    await saveAnnotationsToDB(docId, state.annotations[docId]);
                    renderTextLayer(side);

                    setTimeout(() => {
                        const boxEl = els[side+'Wrapper'].querySelector(`.text-box[data-id="${newBox.id}"]`);
                        if(boxEl) boxEl.focus();
                    }, 0);
                }
            }

            if (state.appMode === 'linking') {
                const leftRect = els.leftWrapper.getBoundingClientRect();
                const rightRect = els.rightWrapper.getBoundingClientRect();
                let endSide = null;

                if (e.clientX >= leftRect.left && e.clientX <= leftRect.right && 
                    e.clientY >= leftRect.top && e.clientY <= leftRect.bottom) {
                    endSide = 'left';
                } else if (e.clientX >= rightRect.left && e.clientX <= rightRect.right && 
                           e.clientY >= rightRect.top && e.clientY <= rightRect.bottom) {
                    endSide = 'right';
                }

                let validLink = false;
                if (endSide && state.view[endSide].docId) {
                    const targetDoc = state.view[endSide].docId;
                    const targetPage = state.view[endSide].pageNum;
                    const sourceDoc = state.drawing.startPointData.docId;

                    if (endSide !== side || targetPage !== state.drawing.startPointData.page) {
                        const pos = getMousePosInViewport(e, endSide);
                        const newLink = {
                            id: 'link_' + Date.now(),
                            source: state.drawing.startPointData,
                            target: { docId: targetDoc, page: targetPage, x: pos.x, y: pos.y },
                            path: `M ${state.drawing.startPointData.x} ${state.drawing.startPointData.y} L ${pos.x} ${pos.y}`
                        };
                        state.links.push(newLink);
                        await saveLinkToDB(newLink);
                        validLink = true;
                        renderMarkersForView(side);
                        renderMarkersForView(endSide);
                    }
                }
                
                state.drawing.active = false;
                els.currentPath.style.display = 'none';
                els.currentPath.setAttribute('d', '');

                if (!validLink && endSide) showModal("Invalid Link", "Links must start and end on different pages.");
            } 
            else if (state.appMode === 'annotation') {
                if (state.annoTool === 'select') {
                    if (state.selection.mode === 'marquee') {
                        const start = state.selection.marqueeStart;
                        const curr = state.selection.marqueeCurrent;
                        
                        const selRect = {
                            x: Math.min(start.x, curr.x),
                            y: Math.min(start.y, curr.y),
                            w: Math.abs(curr.x - start.x),
                            h: Math.abs(curr.y - start.y)
                        };

                        if (selRect.w > 0.001 && selRect.h > 0.001) {
                            const docId = state.view[side].docId;
                            const pageNum = state.view[side].pageNum;
                            const pageData = state.annotations[docId]?.[pageNum];

                            if (pageData) {
                                const selectedImgs = [];
                                const selectedTbs = [];
                                const selectedStks = [];
                                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                                let hasSelection = false;

                                if (pageData.images) {
                                    pageData.images.forEach(img => {
                                        const bounds = { x: img.x, y: img.y, w: img.w, h: img.h };
                                        if (rectsIntersect(selRect, bounds)) {
                                            selectedImgs.push(img);
                                            hasSelection = true;
                                            if(img.x < minX) minX = img.x;
                                            if(img.y < minY) minY = img.y;
                                            if(img.x + img.w > maxX) maxX = img.x + img.w;
                                            if(img.y + img.h > maxY) maxY = img.y + img.h;
                                        }
                                    });
                                }

                                if (pageData.textBoxes) {
                                    pageData.textBoxes.forEach(tb => {
                                        const bounds = { x: tb.x, y: tb.y, w: tb.w, h: tb.h };
                                        if (rectsIntersect(selRect, bounds)) {
                                            selectedTbs.push(tb);
                                            hasSelection = true;
                                            if(tb.x < minX) minX = tb.x;
                                            if(tb.y < minY) minY = tb.y;
                                            if(tb.x + tb.w > maxX) maxX = tb.x + tb.w;
                                            if(tb.y + tb.h > maxY) maxY = tb.y + tb.h;
                                        }
                                    });
                                }

                                if (pageData.strokes) {
                                    pageData.strokes.forEach(stk => {
                                        if (stk.tool === 'eraser-pixel') return;
                                        const bounds = getStrokeBounds(stk);
                                        if (rectsIntersect(selRect, bounds)) {
                                            selectedStks.push(stk);
                                            hasSelection = true;
                                            if(bounds.x < minX) minX = bounds.x;
                                            if(bounds.y < minY) minY = bounds.y;
                                            if(bounds.x + bounds.w > maxX) maxX = bounds.x + bounds.w;
                                            if(bounds.y + bounds.h > maxY) maxY = bounds.y + bounds.h;
                                        }
                                    });
                                }

                                if (hasSelection) {
                                    state.selection.selectedImages = selectedImgs;
                                    state.selection.selectedTextBoxes = selectedTbs;
                                    state.selection.selectedStrokes = selectedStks;
                                    state.selection.boundingBox = {
                                        x: minX,
                                        y: minY,
                                        w: maxX - minX,
                                        h: maxY - minY
                                    };
                                    state.selection.mode = 'idle'; 
                                } else {
                                    clearSelection();
                                }
                            } else {
                                clearSelection();
                            }
                        } else {
                            clearSelection();
                        }
                    } else {
                        clearSelection();
                    }
                } else {
                    clearSelection();
                    state.selection.mode = 'idle';
                    const docId = state.view[side].docId;
                    saveAnnotationsToDB(docId, state.annotations[docId]);
                }
                renderAnnotations(side);
                renderTextLayer(side);
            } else if (state.annoTool !== 'text' && state.annoTool !== 'eraser-stroke') {
                finishAnnotationStroke(side);
            } else {
                const docId = state.view[side].docId;
                if(docId) saveAnnotationsToDB(docId, state.annotations[docId]);
            }
            state.drawing.active = false;
            e.target.releasePointerCapture(e.pointerId);
        }

        function updatePathVisual() {
            const start = state.drawing.startPoint;
            const end = state.drawing.currentPoint;
            const svgRect = els.drawingLayer.getBoundingClientRect();
            const x1 = start.x - svgRect.left;
            const y1 = start.y - svgRect.top;
            const x2 = end.x - svgRect.left;
            const y2 = end.y - svgRect.top;
            const d = `M ${x1} ${y1} L ${x2} ${y2}`;
            els.currentPath.setAttribute('d', d);
        }

        function renderMarkersForView(side) {
            const container = document.getElementById(side + '-markers-layer');
            container.innerHTML = ''; 
            const viewState = state.view[side];
            if (!viewState.docId) return;

            const relevantLinks = state.links.filter(link => 
                (link.source.docId === viewState.docId && link.source.page === viewState.pageNum) ||
                (link.target.docId === viewState.docId && link.target.page === viewState.pageNum)
            );

            let targetMarkerElement = null;

            relevantLinks.forEach(link => {
                let isSource = (link.source.docId === viewState.docId && link.source.page === viewState.pageNum);
                let pointData = isSource ? link.source : link.target;

                const btn = document.createElement('div');
                btn.className = 'link-marker';
                btn.dataset.linkId = link.id; 
                
                const targetDocName = state.documents[isSource ? link.target.docId : link.source.docId]?.name || 'Unknown';
                const targetPage = isSource ? link.target.page : link.source.page;
                btn.title = `Jump to: ${targetDocName} (Page ${targetPage})`;
                
                const wrapper = els[side + 'Wrapper'];
                const x = pointData.x * wrapper.offsetWidth;
                const y = pointData.y * wrapper.offsetHeight;

                btn.style.left = `${x}px`;
                btn.style.top = `${y}px`;
                btn.innerHTML = '<i class="fa-solid fa-link"></i>';

                if (state.highlightRequest && 
                    state.highlightRequest.side === side && 
                    state.highlightRequest.linkId === link.id) {
                    
                    btn.classList.add('marker-active');
                    targetMarkerElement = btn;
                    setTimeout(() => {
                        state.highlightRequest = null;
                        btn.classList.remove('marker-active');
                    }, 3000);
                }

                btn.onclick = (e) => {
                    e.stopPropagation();
                    e.preventDefault(); 
                    if(state.appMode === 'delete-link') {
                        deleteLink(link.id);
                    } else {
                        followLink(link, side);
                    }
                };

                container.appendChild(btn);
            });

            if (targetMarkerElement) {
                const viewport = els[side + 'Viewport'];
                const elementTop = targetMarkerElement.offsetTop;
                const viewportHeight = viewport.clientHeight;
                const elementHeight = targetMarkerElement.clientHeight;
                const scrollTo = elementTop - (viewportHeight / 2) + (elementHeight / 2);
                viewport.scrollTo({ top: scrollTo, behavior: 'smooth' });
            }
        }

        function followLink(link, fromSide) {
            const isFromSource = (link.source.docId === state.view[fromSide].docId);
            const targetData = isFromSource ? link.target : link.source;
            const otherSide = fromSide === 'left' ? 'right' : 'left';

            state.highlightRequest = { side: otherSide, linkId: link.id };
            state.view[otherSide].docId = targetData.docId;
            state.view[otherSide].pageNum = targetData.page;
            state.view[otherSide].scrollTop = 0; 
            
            clearSelection();
            saveSettings(); 
            renderPage(otherSide);
        }

        function showModal(title, body, isPrompt = false) {
            els.modalTitle.innerText = title;
            els.modalBody.innerHTML = body.replace(/\n/g, '<br>');
            
            if (isPrompt) {
                els.modalBody.classList.add('hidden');
                els.modalInput.classList.remove('hidden');
                els.modalInput.value = '';
                els.modalInput.focus();
                els.modalConfirmBtn.classList.remove('hidden');
            } else {
                els.modalBody.classList.remove('hidden');
                els.modalInput.classList.add('hidden');
                els.modalConfirmBtn.classList.add('hidden');
            }
            
            els.modal.classList.remove('hidden');
        }

        function showPromptModal(title, defaultValue = '') {
            return new Promise((resolve) => {
                modalResolve = resolve;
                showModal(title, '', true);
                if(defaultValue) els.modalInput.value = defaultValue;
            });
        }

        function closeModal(result = false) {
            if (modalResolve) {
                const val = result ? els.modalInput.value : null;
                modalResolve(val);
                modalResolve = null;
            }
            els.modal.classList.add('hidden');
        }

        init();

    </script>
</body>
</html>
