        async function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            for (const file of files) {
                const id = 'doc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                    const page = await pdfDoc.getPage(1);
                    const viewport = page.getViewport({ scale: 0.2 }); 
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    const thumbData = canvas.toDataURL();

                    const docObj = { id, file, pdfDoc, name: file.name, pageCount: pdfDoc.numPages, thumbnail: thumbData };
                    state.documents[id] = docObj;
                    await saveDocumentToDB({ id: docObj.id, name: docObj.name, pageCount: docObj.pageCount, thumbnail: docObj.thumbnail, fileBlob: file });

                    if (!state.view.left.docId) setActiveDocument('left', id);
                    else if (!state.view.right.docId) setActiveDocument('right', id);

                } catch (err) {
                    console.error("Error loading PDF:", err);
                    showModal("Error", `Could not load ${file.name}`);
                }
            }
            
            indexDocuments();
            renderDocList();
            els.uploadInput.value = ''; 
        }

        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            addImageToSide(file, state.lastActiveSide);
            e.target.value = '';
        }

        function handlePaste(e) {
            if (state.appMode !== 'annotation') return;
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    let targetSide = state.lastActiveSide; 
                    const wrapper = e.target.closest('.pdf-canvas-container') || e.target.closest('#left-canvas-wrapper') || e.target.closest('#right-canvas-wrapper');
                    if (wrapper) {
                        if (wrapper.id === 'left-canvas-wrapper' || wrapper.id === 'left-viewport') targetSide = 'left';
                        else if (wrapper.id === 'right-canvas-wrapper' || wrapper.id === 'right-viewport') targetSide = 'right';
                    }
                    if (state.view[targetSide] && state.view[targetSide].docId) addImageToSide(blob, targetSide);
                    else {
                        const otherSide = targetSide === 'left' ? 'right' : 'left';
                        if (state.view[otherSide].docId) addImageToSide(blob, otherSide);
                    }
                    e.preventDefault();
                    return;
                }
            }
        }

        async function addImageToSide(fileOrBlob, side) {
            if (!side || !state.view[side].docId) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result;
                const id = 'img_' + Date.now();
                
                const imgObj = new Image();
                imgObj.src = base64;
                imgObj.onload = () => {
                    const canvasWidth = els[side + 'Canvas'].width;
                    const newW = 0.3;
                    const aspect = imgObj.height / imgObj.width;
                    const newH = newW * aspect;

                    const newImage = {
                        id,
                        src: base64,
                        x: 0.35, 
                        y: 0.35,
                        w: newW,
                        h: newH
                    };

                    const docId = state.view[side].docId;
                    const pageNum = state.view[side].pageNum;
                    if (!state.annotations[docId]) state.annotations[docId] = {};
                    if (!state.annotations[docId][pageNum]) state.annotations[docId][pageNum] = { strokes: [], images: [], textBoxes: [] };
                    
                    state.annotations[docId][pageNum].images.push(newImage);
                    state.imageCache[id] = imgObj;
                    
                    clearSelection();
                    state.selection = {
                        active: true,
                        side: side,
                        mode: 'idle',
                        selectedImages: [newImage],
                        selectedTextBoxes: [],
                        selectedStrokes: [],
                        boundingBox: { x: newImage.x, y: newImage.y, w: newImage.w, h: newImage.h }
                    };

                    saveAnnotationsToDB(docId, state.annotations[docId]);
                    renderAnnotations(side);
                }
            };
            reader.readAsDataURL(fileOrBlob);
        }

            if (docIds.length === 0) {

                }`;
                
                let badges = '';

                if (isActiveRight) badges += `<span class="text-[10px] bg-green-500 text-white px-1.5 py-0.5 rounded ml-auto">R</span>`;

                item.innerHTML = `
