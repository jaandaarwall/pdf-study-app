<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Linker Studio (Overwrite Support)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- PDF-Lib (For Editing) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- JSZip (For Bundling) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver.js (Fallback) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        /* Canvas Styles */
        .pdf-canvas {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
        }

        /* Annotation Canvas Layer */
        .annotation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 55; 
            pointer-events: none; 
            touch-action: none; 
        }
        
        /* Cursor styles */
        body.annotation-mode .annotation-canvas {
            pointer-events: auto;
        }
        body.anno-pen .annotation-canvas { cursor: crosshair; }
        body.anno-pixel-eraser .annotation-canvas { cursor: crosshair; }
        body.anno-stroke-eraser .annotation-canvas { cursor: grab; }
        body.anno-stroke-eraser .annotation-canvas:active { cursor: grabbing; }

        /* Link Button Marker */
        .link-marker {
            position: absolute;
            width: 28px;
            height: 28px;
            background-color: #ef4444; 
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto !important; 
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            z-index: 60; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        
        .link-marker:hover {
            background-color: #dc2626; 
            transform: translate(-50%, -50%) scale(1.15);
            z-index: 61;
            box-shadow: 0 6px 8px rgba(0,0,0,0.5);
        }

        /* Active Highlight Animation */
        @keyframes markerPulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.4); box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .marker-active {
            background-color: #3b82f6 !important; 
            z-index: 100;
            animation: markerPulse 2s infinite;
        }

        /* Drawing Layer (For Links) */
        #drawing-layer {
            pointer-events: none; 
        }
        body.linking-mode #drawing-layer {
            pointer-events: auto;
            cursor: crosshair;
        }
        body.linking-mode .pdf-canvas-container {
            cursor: crosshair;
        }
        body.linking-mode .link-marker {
            pointer-events: none; 
            opacity: 0.5;
        }

        /* Modal */
        .modal-backdrop {
            background-color: rgba(0,0,0,0.5);
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument } = PDFLib;
    </script>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden text-gray-800 font-sans">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-file-pdf text-red-500 text-2xl"></i>
            <div>
                <h1 class="text-xl font-bold text-gray-800 leading-tight">PDF Linker Studio</h1>
                <p class="text-[10px] text-green-600 font-medium"><i class="fa-solid fa-check-circle"></i> Ready</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <!-- Mode Switcher -->
            <div class="flex bg-gray-100 rounded-lg p-1">
                <button id="mode-nav-btn" class="px-3 py-1.5 rounded-md text-sm font-medium bg-white shadow-sm text-gray-800 transition-all" onclick="setAppMode('navigation')" title="Navigate Mode">
                    <i class="fa-solid fa-arrow-pointer"></i>
                </button>
                <button id="mode-link-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" onclick="setAppMode('linking')" title="Draw Link Mode">
                    <i class="fa-solid fa-link"></i>
                </button>
                <button id="mode-anno-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" onclick="setAppMode('annotation')" title="Annotation Mode">
                    <i class="fa-solid fa-pen"></i>
                </button>
            </div>

            <!-- Annotation Sub-Tools -->
            <div id="anno-tools" class="hidden flex items-center gap-1 bg-white border border-gray-200 rounded-lg px-2 py-1 shadow-sm">
                <!-- Tools -->
                <button id="tool-pen" class="w-8 h-8 rounded flex items-center justify-center text-blue-600 bg-blue-50 transition-colors" onclick="setAnnoTool('pen')" title="Pen">
                    <i class="fa-solid fa-pen-nib"></i>
                </button>
                <button id="tool-eraser-pixel" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('eraser-pixel')" title="Pixel Eraser">
                    <i class="fa-solid fa-eraser"></i>
                </button>
                <button id="tool-eraser-stroke" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('eraser-stroke')" title="Stroke Eraser (Swipe to Delete)">
                    <i class="fa-solid fa-ban"></i>
                </button>
                
                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <!-- Color & Thickness -->
                <div class="relative w-8 h-8 overflow-hidden rounded-full border border-gray-300 shadow-sm cursor-pointer" title="Pen Color">
                    <input type="color" id="color-picker" class="absolute -top-2 -left-2 w-12 h-12 p-0 border-0 cursor-pointer" value="#ef4444">
                </div>

                <div class="flex items-center gap-1 mx-1 w-24" title="Pen Thickness">
                    <i class="fa-solid fa-circle text-[8px] text-gray-400"></i>
                    <input type="range" id="thickness-picker" min="1" max="20" value="5" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <i class="fa-solid fa-circle text-sm text-gray-400"></i>
                </div>

                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <!-- Actions -->
                <button onclick="undoLastStroke()" class="w-8 h-8 rounded flex items-center justify-center text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors" title="Undo Last Line">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
                <button onclick="clearCurrentPageAnnotations()" class="w-8 h-8 rounded flex items-center justify-center text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors" title="Clear Page">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>

            <div class="h-8 w-px bg-gray-300 mx-2"></div>
            
            <button onclick="exportProject()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-3 py-1.5 rounded shadow-sm flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <label class="text-gray-600 hover:text-blue-600 font-medium text-sm flex items-center gap-2 cursor-pointer border border-gray-200 hover:border-blue-300 px-3 py-1.5 rounded bg-white transition-colors">
                <i class="fa-solid fa-folder-open"></i> Open
                <input type="file" id="import-project-input" class="hidden" accept=".zip,.json">
            </label>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Left Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0 z-10">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Documents</h2>
                <label class="flex items-center justify-center w-full h-12 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-colors group">
                    <span class="text-sm text-gray-500 group-hover:text-blue-500">
                        <i class="fa-solid fa-plus mr-1"></i> Import PDFs
                    </span>
                    <input type="file" id="pdf-upload-input" class="hidden" accept=".pdf" multiple>
                </label>
            </div>
            
            <div id="doc-list" class="flex-1 overflow-y-auto p-2 space-y-2">
                <div id="loading-spinner" class="hidden flex flex-col items-center justify-center mt-10">
                    <div class="spinner mb-2"></div>
                    <span class="text-xs text-gray-500">Processing...</span>
                </div>
                <div class="text-center mt-10 text-gray-400 text-sm italic" id="empty-state-msg">
                    No PDFs imported yet.
                </div>
            </div>

            <div class="p-4 bg-gray-50 border-t border-gray-200">
                <button onclick="clearAllData()" class="w-full py-2 text-xs font-bold text-red-600 border border-red-200 rounded bg-red-50 hover:bg-red-100 transition-colors">
                    <i class="fa-solid fa-trash mr-1"></i> Clear All Data
                </button>
            </div>
        </aside>

        <!-- Workspace (Split View) -->
        <main class="flex-1 flex bg-gray-200 overflow-hidden relative">
            
            <!-- Left Viewport -->
            <div class="flex-1 flex flex-col border-r border-gray-300 relative min-w-0 group">
                <div class="h-10 bg-white border-b border-gray-300 flex items-center justify-between px-4 shrink-0 z-10">
                    <span class="text-sm font-bold text-gray-600 truncate w-32" id="left-view-title">None</span>
                    
                    <div class="flex items-center gap-2">
                        <!-- Navigation Controls -->
                        <button onclick="navigatePage('left', -1)" class="p-1 hover:bg-gray-100 rounded text-gray-600"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="left-page-indicator" class="text-xs text-gray-500 w-16 text-center">-- / --</span>
                        <button onclick="navigatePage('left', 1)" class="p-1 hover:bg-gray-100 rounded text-gray-600"><i class="fa-solid fa-chevron-right"></i></button>
                        
                        <div class="w-px h-4 bg-gray-300 mx-1"></div>

                        <!-- Page Tools (Left) -->
                        <button onclick="insertPage('left', 'blank')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Insert Blank Page After Current">
                            <i class="fa-regular fa-file-circle-plus text-sm"></i>
                        </button>
                        <button onclick="insertPage('left', 'duplicate')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Duplicate Current Page">
                            <i class="fa-regular fa-clone text-sm"></i>
                        </button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto relative flex justify-center p-4 bg-gray-500/10 pdf-canvas-container" id="left-viewport">
                    <div id="left-canvas-wrapper" class="relative shadow-lg">
                        <canvas id="left-canvas" class="pdf-canvas bg-white block"></canvas>
                        <canvas id="left-anno-canvas" class="annotation-canvas"></canvas>
                        <div id="left-markers-layer" class="absolute inset-0 pointer-events-none"></div>
                    </div>
                </div>
            </div>

            <!-- Right Viewport -->
            <div class="flex-1 flex flex-col relative min-w-0">
                <div class="h-10 bg-white border-b border-gray-300 flex items-center justify-between px-4 shrink-0 z-10">
                    <span class="text-sm font-bold text-gray-600 truncate w-32" id="right-view-title">None</span>
                    
                    <div class="flex items-center gap-2">
                        <!-- Navigation Controls -->
                        <button onclick="navigatePage('right', -1)" class="p-1 hover:bg-gray-100 rounded text-gray-600"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="right-page-indicator" class="text-xs text-gray-500 w-16 text-center">-- / --</span>
                        <button onclick="navigatePage('right', 1)" class="p-1 hover:bg-gray-100 rounded text-gray-600"><i class="fa-solid fa-chevron-right"></i></button>
                        
                        <div class="w-px h-4 bg-gray-300 mx-1"></div>

                        <!-- Page Tools (Right) -->
                        <button onclick="insertPage('right', 'blank')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Insert Blank Page After Current">
                            <i class="fa-regular fa-file-circle-plus text-sm"></i>
                        </button>
                        <button onclick="insertPage('right', 'duplicate')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Duplicate Current Page">
                            <i class="fa-regular fa-clone text-sm"></i>
                        </button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto relative flex justify-center p-4 bg-gray-500/10 pdf-canvas-container" id="right-viewport">
                    <div id="right-canvas-wrapper" class="relative shadow-lg">
                        <canvas id="right-canvas" class="pdf-canvas bg-white block"></canvas>

                    </div>
                </div>
            </div>

            <svg id="drawing-layer" class="absolute inset-0 w-full h-full z-40 overflow-visible">
                <path id="current-draw-path" d="" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" style="display:none;"></path>
            </svg>

        </main>
    </div>

    <div id="modal" class="fixed inset-0 modal-backdrop hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full">
            <h3 id="modal-title" class="text-lg font-bold mb-2">Alert</h3>
            <p id="modal-body" class="text-gray-600 mb-4">Message</p>
            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">Close</button>
            </div>
        </div>
    </div>

    <script>
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        const DB_NAME = 'PDFLinkerStudioDB';
        const DB_VERSION = 4; 
        let db;

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('documents')) db.createObjectStore('documents', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('links')) db.createObjectStore('links', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('annotations')) db.createObjectStore('annotations', { keyPath: 'docId' });
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject('IndexedDB error: ' + e.target.errorCode);
            });
        }

        async function saveDocumentToDB(docData) {
            const tx = db.transaction(['documents'], 'readwrite');
            tx.objectStore('documents').put(docData);
        }

        async function saveLinkToDB(linkData) {
            const tx = db.transaction(['links'], 'readwrite');
            tx.objectStore('links').put(linkData);
        }

        async function saveAnnotationsToDB(docId, data) {
            const tx = db.transaction(['annotations'], 'readwrite');
            tx.objectStore('annotations').put({ docId, data });
        }

        async function saveSettings() {
            if (!db) return;
            const settings = {
                id: 'appState',
                view: state.view,
                appMode: state.appMode,
                annoTool: state.annoTool,
                annoColor: state.annoColor,
                annoThickness: state.annoThickness
            };
            const tx = db.transaction(['settings'], 'readwrite');
            tx.objectStore('settings').put(settings);
        }

        async function clearDB() {
            const tx = db.transaction(['documents', 'links', 'settings', 'annotations'], 'readwrite');
            tx.objectStore('documents').clear();
            tx.objectStore('links').clear();
            tx.objectStore('settings').clear();
            tx.objectStore('annotations').clear();
        }

        async function loadStateFromDB() {
            return new Promise((resolve, reject) => {
                const result = { documents: [], links: [], settings: null, annotations: {} };
                const tx = db.transaction(['documents', 'links', 'settings', 'annotations'], 'readonly');
                
                tx.objectStore('documents').getAll().onsuccess = (e) => result.documents = e.target.result;
                tx.objectStore('links').getAll().onsuccess = (e) => result.links = e.target.result;
                tx.objectStore('settings').get('appState').onsuccess = (e) => result.settings = e.target.result;
                tx.objectStore('annotations').getAll().onsuccess = (e) => {
                    e.target.result.forEach(item => result.annotations[item.docId] = item.data);
                };

                tx.oncomplete = () => resolve(result);
                tx.onerror = () => reject(tx.error);
            });
        }

        const state = {
            documents: {}, 
            view: {
                left: { docId: null, pageNum: 1, scale: 1.0, scrollTop: 0 },
                right: { docId: null, pageNum: 1, scale: 1.0, scrollTop: 0 }
            },
            links: [], 
            appMode: 'navigation', 
            annoTool: 'pen', 
            annoColor: '#ef4444',
            annoThickness: 5, 
            annotations: {}, 
            drawing: {
                active: false,
                startSide: null, 
                startPoint: { x: 0, y: 0 }, 
                startPointData: null, 
                currentPoint: { x: 0, y: 0 },
                pointerId: null 
            },
            highlightRequest: null,
            projectFileHandle: null // NEW: Stores the reference to the saved file
        };

        const els = {
            uploadInput: document.getElementById('pdf-upload-input'),
            docList: document.getElementById('doc-list'),
            emptyMsg: document.getElementById('empty-state-msg'),
            loadingSpinner: document.getElementById('loading-spinner'),
            leftCanvas: document.getElementById('left-canvas'),
            rightCanvas: document.getElementById('right-canvas'),
            leftAnnoCanvas: document.getElementById('left-anno-canvas'),
            rightAnnoCanvas: document.getElementById('right-anno-canvas'),
            leftWrapper: document.getElementById('left-canvas-wrapper'),
            rightWrapper: document.getElementById('right-canvas-wrapper'),
            leftViewport: document.getElementById('left-viewport'),
            rightViewport: document.getElementById('right-viewport'),
            drawingLayer: document.getElementById('drawing-layer'),
            currentPath: document.getElementById('current-draw-path'),
            modeNavBtn: document.getElementById('mode-nav-btn'),
            modeLinkBtn: document.getElementById('mode-link-btn'),
            modeAnnoBtn: document.getElementById('mode-anno-btn'),
            annoTools: document.getElementById('anno-tools'),
            toolPen: document.getElementById('tool-pen'),
            toolEraserPixel: document.getElementById('tool-eraser-pixel'),
            toolEraserStroke: document.getElementById('tool-eraser-stroke'),
            colorPicker: document.getElementById('color-picker'),
            thicknessPicker: document.getElementById('thickness-picker'),
            importInput: document.getElementById('import-project-input'),
            modal: document.getElementById('modal'),
            modalTitle: document.getElementById('modal-title'),
            modalBody: document.getElementById('modal-body'),
            leftTitle: document.getElementById('left-view-title'),
            rightTitle: document.getElementById('right-view-title'),
            leftPageInd: document.getElementById('left-page-indicator'),
            rightPageInd: document.getElementById('right-page-indicator'),
        };

        const handleScroll = debounce((side) => {
            const viewport = els[side + 'Viewport'];
            state.view[side].scrollTop = viewport.scrollTop;
            saveSettings();
            renderMarkersForView(side);
        }, 200);

        async function init() {
            try {
                await initDB();
                const savedData = await loadStateFromDB();
                
                if (savedData.documents.length > 0 || savedData.links.length > 0) {
                    els.loadingSpinner.classList.remove('hidden');
                    els.emptyMsg.style.display = 'none';
                    
                    state.links = savedData.links;
                    state.annotations = savedData.annotations || {};

                    for (const dbDoc of savedData.documents) {
                        try {
                            const arrayBuffer = await dbDoc.fileBlob.arrayBuffer();
                            const pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                            state.documents[dbDoc.id] = {
                                id: dbDoc.id,
                                file: dbDoc.fileBlob, 
                                pdfDoc: pdfDoc,
                                name: dbDoc.name,
                                pageCount: pdfDoc.numPages,
                                thumbnail: dbDoc.thumbnail
                            };
                        } catch (err) {
                            console.error("Failed to restore doc:", dbDoc.name, err);
                        }
                    }

                    if (savedData.settings) {
                        const sView = savedData.settings.view;
                        if (sView.left.docId && state.documents[sView.left.docId]) {
                            state.view.left = { ...sView.left, scale: 1.0, scrollTop: sView.left.scrollTop || 0 };
                        }
                        if (sView.right.docId && state.documents[sView.right.docId]) {
                            state.view.right = { ...sView.right, scale: 1.0, scrollTop: sView.right.scrollTop || 0 };
                        }
                        if (savedData.settings.appMode) setAppMode(savedData.settings.appMode, false);
                        if (savedData.settings.annoTool) setAnnoTool(savedData.settings.annoTool, false);
                        if (savedData.settings.annoColor) {
                            state.annoColor = savedData.settings.annoColor;
                            els.colorPicker.value = savedData.settings.annoColor;
                        }
                        if (savedData.settings.annoThickness) {
                            state.annoThickness = savedData.settings.annoThickness;
                            els.thicknessPicker.value = savedData.settings.annoThickness;
                        }
                    }

                    renderDocList();
                    if (state.view.left.docId) renderPage('left');
                    if (state.view.right.docId) renderPage('right');
                }

                els.loadingSpinner.classList.add('hidden');

            } catch (err) {
                console.error("DB Init failed:", err);
            }

            els.uploadInput.addEventListener('change', handleFileUpload);
            els.importInput.addEventListener('change', handleProjectImport);
            
            window.addEventListener('pointerdown', handlePointerDown);
            window.addEventListener('pointermove', handlePointerMove);
            window.addEventListener('pointerup', handlePointerUp);
            els.leftViewport.addEventListener('scroll', () => handleScroll('left'));
            els.rightViewport.addEventListener('scroll', () => handleScroll('right'));
            
            els.colorPicker.addEventListener('input', (e) => {
                state.annoColor = e.target.value;
                if (state.annoTool === 'pen') setAnnoTool('pen', false); 
                saveSettings();
            });
            els.thicknessPicker.addEventListener('input', (e) => {
                state.annoThickness = parseInt(e.target.value);
                saveSettings();
            });
        }

        function setAppMode(mode, save = true) {
            state.appMode = mode;
            if (save) saveSettings();

            document.body.classList.remove('linking-mode', 'annotation-mode', 'anno-pen', 'anno-pixel-eraser', 'anno-stroke-eraser');

            [els.modeNavBtn, els.modeLinkBtn, els.modeAnnoBtn].forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
                btn.classList.add('text-gray-500');
            });
            els.annoTools.classList.add('hidden');

            if (mode === 'navigation') {
                els.modeNavBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeNavBtn.classList.remove('text-gray-500');
            } else if (mode === 'linking') {
                document.body.classList.add('linking-mode');
                els.modeLinkBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeLinkBtn.classList.remove('text-gray-500');

            } else if (mode === 'annotation') {
                document.body.classList.add('annotation-mode');
                els.modeAnnoBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeAnnoBtn.classList.remove('text-gray-500');
                els.annoTools.classList.remove('hidden');
                setAnnoTool(state.annoTool, false); 
            }
        }

        function setAnnoTool(tool, save = true) {
            state.annoTool = tool;
            if (save) saveSettings();

            [els.toolPen, els.toolEraserPixel, els.toolEraserStroke].forEach(btn => {
                btn.classList.remove('bg-blue-50', 'text-blue-600');
                btn.classList.add('text-gray-500');
            });
            document.body.classList.remove('anno-pen', 'anno-pixel-eraser', 'anno-stroke-eraser');

            if (tool === 'pen') {
                els.toolPen.classList.add('bg-blue-50', 'text-blue-600');
                els.toolPen.classList.remove('text-gray-500');
                document.body.classList.add('anno-pen');
            } else if (tool === 'eraser-pixel') {
                els.toolEraserPixel.classList.add('bg-blue-50', 'text-blue-600');
                els.toolEraserPixel.classList.remove('text-gray-500');
                document.body.classList.add('anno-pixel-eraser');
            } else if (tool === 'eraser-stroke') {
                els.toolEraserStroke.classList.add('bg-blue-50', 'text-blue-600');
                els.toolEraserStroke.classList.remove('text-gray-500');
                document.body.classList.add('anno-stroke-eraser');
            }
        }

        async function clearAllData() {
            if (confirm("Are you sure? This will delete all uploaded PDFs, links, and annotations permanently.")) {
                await clearDB();
                state.documents = {};
                state.links = [];
                state.annotations = {};
                state.view.left = { docId: null, pageNum: 1, scale: 1.0, scrollTop: 0 };
                state.view.right = { docId: null, pageNum: 1, scale: 1.0, scrollTop: 0 };
                renderDocList();
                renderPage('left');
                renderPage('right');
                els.emptyMsg.style.display = 'block';
                showModal("Success", "All data cleared.");

        }

        async function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            for (const file of files) {
                const id = 'doc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                    const page = await pdfDoc.getPage(1);
                    const viewport = page.getViewport({ scale: 0.2 }); 
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    const thumbData = canvas.toDataURL();

                    const docObj = { id, file, pdfDoc, name: file.name, pageCount: pdfDoc.numPages, thumbnail: thumbData };
                    state.documents[id] = docObj;
                    await saveDocumentToDB({ id: docObj.id, name: docObj.name, pageCount: docObj.pageCount, thumbnail: docObj.thumbnail, fileBlob: file });

                    if (!state.view.left.docId) setActiveDocument('left', id);
                    else if (!state.view.right.docId) setActiveDocument('right', id);

                } catch (err) {
                    console.error("Error loading PDF:", err);
                    showModal("Error", `Could not load ${file.name}`);
                }
            }
            renderDocList();
            els.uploadInput.value = ''; 
        }

        function renderDocList() {
            els.docList.innerHTML = '';
            const docIds = Object.keys(state.documents);
            
            if (docIds.length === 0) {
                els.emptyMsg.style.display = 'block';
                return;
            }
            els.emptyMsg.style.display = 'none';

            docIds.forEach(id => {
                const doc = state.documents[id];
                const isActiveLeft = state.view.left.docId === id;
                const isActiveRight = state.view.right.docId === id;

                const item = document.createElement('div');
                item.className = `p-2 rounded-lg cursor-pointer border transition-all flex items-center gap-3 ${
                    (isActiveLeft || isActiveRight) ? 'bg-blue-50 border-blue-200' : 'hover:bg-gray-50 border-transparent bg-white'
                }`;
                
                let badges = '';
                if (isActiveLeft) badges += `<span class="text-[10px] bg-blue-500 text-white px-1.5 py-0.5 rounded ml-auto">L</span>`;
                if (isActiveRight) badges += `<span class="text-[10px] bg-green-500 text-white px-1.5 py-0.5 rounded ml-auto">R</span>`;

                item.innerHTML = `
                    <img src="${doc.thumbnail}" class="w-10 h-12 object-cover rounded border border-gray-200 bg-gray-100">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium text-gray-800 truncate">${doc.name}</div>
                        <div class="text-xs text-gray-500">${doc.pageCount} pages</div>
                    </div>
                    ${badges}
                `;

                item.onclick = () => {
                    if (isActiveLeft) setActiveDocument('right', id);
                    else if (isActiveRight) setActiveDocument('left', id);
                    else {
                        if (!state.view.left.docId) setActiveDocument('left', id);
                        else setActiveDocument('right', id);
                    }
                    renderDocList();
                };
                els.docList.appendChild(item);
            });
        }

        function setActiveDocument(side, docId, render = true) {
            state.view[side].docId = docId;
            state.view[side].pageNum = 1;
            state.view[side].scrollTop = 0; 
            saveSettings(); 
            if (render) {
                renderPage(side);
                renderDocList();
            }
        }

        async function renderPage(side) {
            const viewState = state.view[side];
            const docId = viewState.docId;
            const canvas = els[side + 'Canvas'];
            const ctx = canvas.getContext('2d');
            const annoCanvas = els[side + 'AnnoCanvas'];
            const annoCtx = annoCanvas.getContext('2d');

            if (!docId || !state.documents[docId]) {
                canvas.width = 0; canvas.height = 0;
                annoCanvas.width = 0; annoCanvas.height = 0;
                els[side + 'Title'].innerText = 'None';
                els[side + 'PageInd'].innerText = '-- / --';
                document.getElementById(side + '-markers-layer').innerHTML = '';
                return;
            }

            const doc = state.documents[docId];
            els[side + 'Title'].innerText = doc.name;
            els[side + 'PageInd'].innerText = `${viewState.pageNum} / ${doc.pageCount}`;

            try {
                const page = await doc.pdfDoc.getPage(viewState.pageNum);
                const viewport = page.getViewport({ scale: 1.5 }); 

                canvas.width = viewport.width; canvas.height = viewport.height;
                annoCanvas.width = viewport.width; annoCanvas.height = viewport.height;

                const wrapper = els[side + 'Wrapper'];
                wrapper.style.width = `${viewport.width}px`;
                wrapper.style.height = `${viewport.height}px`;

                const renderContext = { canvasContext: ctx, viewport: viewport };
                await page.render(renderContext).promise;

                const viewportEl = els[side + 'Viewport'];
                if (viewState.scrollTop) viewportEl.scrollTop = viewState.scrollTop;

                renderMarkersForView(side);
                renderAnnotations(side); 
            } catch (err) {
                console.error("Error rendering page:", err);
            }
        }

        function navigatePage(side, delta) {
            const viewState = state.view[side];
            if (!viewState.docId) return;
            const doc = state.documents[viewState.docId];
            const newPage = viewState.pageNum + delta;
            if (newPage >= 1 && newPage <= doc.pageCount) {
                viewState.pageNum = newPage;
                viewState.scrollTop = 0; 
                saveSettings(); 
                renderPage(side);
            }
        }

        // --- Annotation Logic ---

        function renderAnnotations(side) {
            const viewState = state.view[side];
            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            if (!state.annotations[viewState.docId]) return;
            const strokes = state.annotations[viewState.docId][viewState.pageNum] || [];

            strokes.forEach(stroke => {
                ctx.beginPath();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (stroke.tool === 'eraser-pixel') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = stroke.size * width; 
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = stroke.color;
                    ctx.lineWidth = stroke.size * width; 
                }

                if (stroke.points.length > 0) {
                    const p0 = stroke.points[0];
                    ctx.moveTo(p0.x * width, p0.y * height);
                    for (let i = 1; i < stroke.points.length; i++) {
                        const p = stroke.points[i];
                        ctx.lineTo(p.x * width, p.y * height);
                    }
                }
                ctx.stroke();
            });
            ctx.globalCompositeOperation = 'source-over';
        }

        function startAnnotationStroke(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            
            if (!state.annotations[docId]) state.annotations[docId] = {};
            if (!state.annotations[docId][pageNum]) state.annotations[docId][pageNum] = [];

            const normalizedSize = state.annoThickness / 1000; 

            const newStroke = {
                tool: state.annoTool,
                color: state.annoColor,
                size: normalizedSize,
                points: [{ x, y }]
            };

            state.annotations[docId][pageNum].push(newStroke);
            
            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.beginPath();
            ctx.lineCap = 'round';
            if (state.annoTool === 'eraser-pixel') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = normalizedSize * width;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = state.annoColor;
                ctx.lineWidth = normalizedSize * width;
            }
            ctx.moveTo(x * width, y * height);
            ctx.lineTo(x * width, y * height);
            ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';
        }

        function continueAnnotationStroke(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            const strokes = state.annotations[docId][pageNum];
            const currentStroke = strokes[strokes.length - 1];
            
            currentStroke.points.push({ x, y });

            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const pts = currentStroke.points;

            ctx.beginPath();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (state.annoTool === 'eraser-pixel') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = currentStroke.size * width;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentStroke.color;
                ctx.lineWidth = currentStroke.size * width;
            }

            const prev = pts[pts.length - 2];
            ctx.moveTo(prev.x * width, prev.y * height);
            ctx.lineTo(x * width, y * height);
            ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';
        }

        function finishAnnotationStroke(side) {
            const docId = state.view[side].docId;
            saveAnnotationsToDB(docId, state.annotations[docId]);
        }

        // --- Stroke Eraser Logic ---

        function distToSegmentSquared(p, v, w) {
            const l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 === 0) return (p.x - v.x)**2 + (p.y - v.y)**2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x)))**2 + 
                   (p.y - (v.y + t * (w.y - v.y)))**2;
        }

        function deleteStrokeAt(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            
            if (!state.annotations[docId] || !state.annotations[docId][pageNum]) return;

            const strokes = state.annotations[docId][pageNum];
            const threshold = 0.0002; 

            let foundIndex = -1;

            for (let i = strokes.length - 1; i >= 0; i--) {
                const stroke = strokes[i];
                if (stroke.tool === 'eraser-pixel') continue;

                for (let j = 0; j < stroke.points.length - 1; j++) {
                    const p1 = stroke.points[j];
                    const p2 = stroke.points[j+1];
                    if (distToSegmentSquared({x, y}, p1, p2) < threshold) {
                        foundIndex = i;
                        break;
                    }
                }
                if (foundIndex !== -1) break;
            }

            if (foundIndex !== -1) {
                strokes.splice(foundIndex, 1);
                renderAnnotations(side);
                return true; 
            }
            return false;
        }

        // --- Undo / Clear Logic ---
        
        function undoLastStroke() {
            const docId = state.view.left.docId || state.view.right.docId;
            if (!docId) return;

            const leftPage = state.view.left.pageNum;
            const rightPage = state.view.right.pageNum;
            
            let changed = false;

            const undoOnView = (side, dId, pNum) => {
                if (state.annotations[dId] && state.annotations[dId][pNum] && state.annotations[dId][pNum].length > 0) {
                    state.annotations[dId][pNum].pop();
                    saveAnnotationsToDB(dId, state.annotations[dId]);
                    renderAnnotations(side);
                    changed = true;
                }
            };

            if (state.view.left.docId === docId) undoOnView('left', docId, leftPage);
            if (state.view.right.docId === docId) undoOnView('right', docId, rightPage);

            if (!changed) {
                 if(state.view.left.docId) undoOnView('left', state.view.left.docId, state.view.left.pageNum);
                 if(state.view.right.docId) undoOnView('right', state.view.right.docId, state.view.right.pageNum);
            }
        }

        function clearCurrentPageAnnotations() {
            if(!confirm("Clear all annotations on the current page(s)?")) return;

            const clearView = (side, dId, pNum) => {
                if (dId && state.annotations[dId]) {
                    state.annotations[dId][pNum] = [];
                    saveAnnotationsToDB(dId, state.annotations[dId]);
                    renderAnnotations(side);
                }
            };
            clearView('left', state.view.left.docId, state.view.left.pageNum);
            clearView('right', state.view.right.docId, state.view.right.pageNum);
        }

        // --- PDF Manipulation (Insert/Duplicate) ---

        async function insertPage(side, type) {
            const docId = state.view[side].docId;
            
            if (!docId) { 
                showModal("Error", "No document loaded in this viewport."); 
                return; 
            }

            const insertIndex = state.view[side].pageNum; // Insert AFTER this page

            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Processing PDF...";

            try {
                const originalDoc = state.documents[docId];
                const arrayBuffer = await originalDoc.file.arrayBuffer();
                const pdfLibDoc = await PDFDocument.load(arrayBuffer);

                const pages = pdfLibDoc.getPages();
                const refPageIndex = Math.max(0, Math.min(insertIndex - 1, pages.length - 1));
                const refPage = pages[refPageIndex];
                const { width, height } = refPage.getSize();

                if (type === 'blank') {
                    pdfLibDoc.insertPage(insertIndex, [width, height]);
                } else if (type === 'duplicate') {
                    const [copiedPage] = await pdfLibDoc.copyPages(pdfLibDoc, [refPageIndex]);
                    pdfLibDoc.insertPage(insertIndex, copiedPage);
                }

                const newPdfBytes = await pdfLibDoc.save();
                const newBlob = new Blob([newPdfBytes], { type: 'application/pdf' });

                // 1. Shift Annotations
                if (state.annotations[docId]) {
                    const newAnnoMap = {};
                    Object.keys(state.annotations[docId]).forEach(key => {
                        const pageNum = parseInt(key);
                        if (pageNum > insertIndex) {
                            newAnnoMap[pageNum + 1] = state.annotations[docId][pageNum];
                        } else {
                            newAnnoMap[pageNum] = state.annotations[docId][pageNum];
                        }
                    });
                    state.annotations[docId] = newAnnoMap;
                    await saveAnnotationsToDB(docId, state.annotations[docId]);
                }

                // 2. Shift Links
                const updatedLinks = [];
                for (const link of state.links) {
                    const updatePoint = (pt) => {
                        if (pt.docId === docId && pt.page > insertIndex) {
                            return { ...pt, page: pt.page + 1 };
                        }
                        return pt;
                    };
                    const newLink = {
                        ...link,
                        source: updatePoint(link.source),
                        target: updatePoint(link.target)
                    };
                    updatedLinks.push(newLink);
                    await saveLinkToDB(newLink);
                }
                state.links = updatedLinks;

                // 3. Reload Document
                const newPdfJsDoc = await pdfjsLib.getDocument(newPdfBytes).promise;

                state.documents[docId].file = newBlob;
                state.documents[docId].pdfDoc = newPdfJsDoc;
                state.documents[docId].pageCount = newPdfJsDoc.numPages;

                await saveDocumentToDB({
                    id: docId,
                    name: originalDoc.name,
                    pageCount: newPdfJsDoc.numPages,
                    thumbnail: originalDoc.thumbnail,
                    fileBlob: newBlob
                });

                // Switch to new page for convenience
                state.view[side].pageNum = insertIndex + 1;
                
                renderPage(side);
                renderDocList();

                showModal("Success", `${type === 'blank' ? 'Blank' : 'Duplicated'} page added at position ${insertIndex + 1}.`);

            } catch (err) {
                console.error(err);
                showModal("Error", "Failed to process PDF: " + err.message);
            } finally {
                els.loadingSpinner.classList.add('hidden');
            }
        }

        // --- Project Save/Load (Smart Overwrite) ---

        async function exportProject() {
            const docKeys = Object.keys(state.documents);
            if (docKeys.length === 0) {
                showModal("Export", "No documents loaded.");
                return;
            }

            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Creating ZIP...";

            try {
                const zip = new JSZip();

                // Create metadata file
                const metadata = {
                    version: "2.0",
                    timestamp: Date.now(),
                    links: state.links,
                    annotations: state.annotations,
                    settings: {
                        id: 'appState',
                        view: state.view,
                        appMode: state.appMode,
                        annoTool: state.annoTool,
                        annoColor: state.annoColor,
                        annoThickness: state.annoThickness
                    },
                    documents: {}
                };

                // Add PDFs to ZIP
                for (const id of docKeys) {
                    const doc = state.documents[id];
                    const safeFilename = `${id}.pdf`;
                    
                    metadata.documents[id] = {
                        id: doc.id,
                        name: doc.name,
                        pageCount: doc.pageCount,
                        thumbnail: doc.thumbnail,
                        filename: safeFilename
                    };

                    zip.file(safeFilename, doc.file);
                }

                zip.file("project.json", JSON.stringify(metadata, null, 2));

                // Generate ZIP blob in memory
                const content = await zip.generateAsync({type:"blob"});
                
                // --- SMART SAVE LOGIC ---
                let handle = state.projectFileHandle;
                
                // If we don't have a handle, ask user where to save (allow overwriting existing file)
                if (!handle) {
                    try {
                        // Check browser support
                        if (window.showSaveFilePicker) {
                            handle = await window.showSaveFilePicker({
                                suggestedName: 'pdf_linker_project.zip',
                                types: [{
                                    description: 'Project Archive',
                                    accept: {'application/zip': ['.zip']},
                                }],
                            });
                        } else {
                            throw new Error("API not supported");
                        }
                    } catch (err) {
                        // User canceled or API not supported
                        if (err.name === 'AbortError') {
                            els.loadingSpinner.classList.add('hidden');
                            return; 
                        }
                        // Fallback to standard download if API fails or missing
                        throw new Error("Use Standard Download");
                    }
                }

                // Try to write to the handle
                try {
                    const writable = await handle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    
                    // Remember this handle for instant saves next time
                    state.projectFileHandle = handle;
                    
                    showModal("Saved", "Project saved successfully!");
                } catch (writeErr) {
                    console.error(writeErr);
                    throw new Error("Write failed");
                }

            } catch (err) {
                console.error("Save Error:", err);
                // Fallback: Standard Download (FileSaver.js)
                saveAs(content, "pdf_linker_project.zip");
                
                let msg = "Project downloaded as new file.";
                if (err.message === "Use Standard Download") {
                    msg += " (Your browser doesn't support file overwriting. Please manually replace the old file.)";
                } else {
                    msg += " (Error writing to selected file. Downloaded instead.)";
                }
                showModal("Download Complete", msg);
            } finally {
                els.loadingSpinner.classList.add('hidden');
            }
        }

        async function handleProjectImport(e) {
            const file = e.target.files[0];
            if (!file) return;

            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Loading Project...";

            try {
                // Check if ZIP or JSON (old format)
                const isZip = file.name.endsWith('.zip');

                if (isZip) {
                    const zip = await JSZip.loadAsync(file);
                    
                    // 1. Load Metadata
                    const metaFile = zip.file("project.json");
                    if (!metaFile) throw new Error("Invalid ZIP: project.json not found.");
                    
                    const metaString = await metaFile.async("string");
                    const metadata = JSON.parse(metaString);

                    // 2. Load Documents from ZIP
                    for (const [id, docInfo] of Object.entries(metadata.documents)) {
                        const pdfFile = zip.file(docInfo.filename);
                        if (pdfFile) {
                            const blob = await pdfFile.async("blob");
                            
                            const arrayBuffer = await blob.arrayBuffer();
                            const pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;

                            state.documents[id] = {
                                id: id,
                                file: blob,
                                pdfDoc: pdfDoc,
                                name: docInfo.name,
                                pageCount: pdfDoc.numPages,
                                thumbnail: docInfo.thumbnail
                            };

                            await saveDocumentToDB({
                                id: id,
                                name: docInfo.name,
                                pageCount: docInfo.pageCount,
                                thumbnail: docInfo.thumbnail,
                                fileBlob: blob
                            });
                        }
                    }

                    // 3. Restore Links
                    if (metadata.links) {
                        state.links = metadata.links;
                        for (const link of state.links) {
                            await saveLinkToDB(link);
                        }
                    }

                    // 4. Restore Annotations
                    if (metadata.annotations) {
                        state.annotations = metadata.annotations;
                        for (const [docId, data] of Object.entries(state.annotations)) {
                            saveAnnotationsToDB(docId, data);
                        }
                    }

                    // 5. Restore Settings
                    if (metadata.settings) {
                        const s = metadata.settings;
                        state.view = s.view;
                        state.appMode = s.appMode;
                        state.annoTool = s.annoTool;
                        state.annoColor = s.annoColor;
                        state.annoThickness = s.annoThickness;
                        
                        setAppMode(state.appMode, false);
                        setAnnoTool(state.annoTool, false);
                        els.colorPicker.value = state.annoColor;
                        els.thicknessPicker.value = state.annoThickness;
                        
                        saveSettings(); 
                    }
                    
                    // NOTE: We cannot get a FileHandle from a standard <input> in all browsers easily,
                    // so we reset the projectFileHandle. The user will have to re-select the file 
                    // on first save, enabling overwrite.
                    state.projectFileHandle = null;

                    showModal("Import Success", "Project loaded. Click Save to overwrite or create new file.");

                } else {
                    // Fallback for old JSON format
                    const reader = new FileReader();
                    reader.onload = async function(event) {
                        try {
                            const project = JSON.parse(event.target.result);
                            if (!project.links || !project.documents) throw new Error("Invalid format");

                            project.links.forEach(async link => {
                                state.links.push(link);
                                await saveLinkToDB(link);
                            });
                            
                            if (project.annotations) {
                                state.annotations = { ...state.annotations, ...project.annotations };
                                Object.keys(project.annotations).forEach(docId => {
                                    saveAnnotationsToDB(docId, project.annotations[docId]);
                                });
                            }
                            
                            let msg = "Legacy JSON Project loaded!\n\nPlease re-upload PDFs to activate them:\n";
                            project.documents.forEach(d => msg += `- ${d.name}\n`);
                            showModal("Project Imported", msg);
                            renderMarkersForView('left');
                            renderMarkersForView('right');

                        } catch (err) {
                            showModal("Import Error", "Failed to parse file.");
                        }
                    };
                    reader.readAsText(file);
                }

                if (isZip) {
                    renderDocList();
                    if (state.view.left.docId) renderPage('left');
                    if (state.view.right.docId) renderPage('right');
                }

            } catch (err) {
                console.error(err);
                showModal("Import Error", "Failed to load project: " + err.message);
            } finally {
                els.loadingSpinner.classList.add('hidden');
            }
            e.target.value = '';
        }

        // --- Interaction / Global Mouse Handlers ---

        function getMousePosInViewport(evt, side) {
            const rect = els[side + 'Wrapper'].getBoundingClientRect();
            return {
                x: (evt.clientX - rect.left) / rect.width, 
                y: (evt.clientY - rect.top) / rect.height
            };
        }

        function handlePointerDown(e) {
            if (e.target.closest('.link-marker')) return;
            if (e.target.closest('button') || e.target.closest('input')) return;

            e.target.setPointerCapture(e.pointerId);

            const leftRect = els.leftWrapper.getBoundingClientRect();
            const rightRect = els.rightWrapper.getBoundingClientRect();
            let clickedSide = null;

            if (e.clientX >= leftRect.left && e.clientX <= leftRect.right && 
                e.clientY >= leftRect.top && e.clientY <= leftRect.bottom) {
                clickedSide = 'left';
            } else if (e.clientX >= rightRect.left && e.clientX <= rightRect.right && 
                       e.clientY >= rightRect.top && e.clientY <= rightRect.bottom) {
                clickedSide = 'right';
            }

            if (!clickedSide) return;
            if (!state.view[clickedSide].docId) return;

            if (state.appMode === 'linking') {
                state.drawing.active = true;
                state.drawing.pointerId = e.pointerId;
                state.drawing.startSide = clickedSide;
                const pos = getMousePosInViewport(e, clickedSide);
                state.drawing.startPoint = { x: e.clientX, y: e.clientY }; 
                state.drawing.startPointData = { 
                    docId: state.view[clickedSide].docId,
                    page: state.view[clickedSide].pageNum,
                    x: pos.x, y: pos.y
                };
                state.drawing.currentPoint = { x: e.clientX, y: e.clientY };
                els.currentPath.style.display = 'block';
                updatePathVisual();
            } 
            else if (state.appMode === 'annotation') {
                if (e.pointerType === 'pen' || e.button === 0) {
                     if (state.annoTool === 'eraser-stroke') {
                        state.drawing.active = true;
                        state.drawing.pointerId = e.pointerId;
                        state.drawing.startSide = clickedSide;
                    } else {
                        state.drawing.active = true;
                        state.drawing.pointerId = e.pointerId;
                        state.drawing.startSide = clickedSide;
                        const pos = getMousePosInViewport(e, clickedSide);
                        startAnnotationStroke(clickedSide, pos.x, pos.y);
                    }
                }
            }
        }

        function handlePointerMove(e) {
            if (!state.drawing.active) return;
            if (state.drawing.pointerId !== e.pointerId) return;

            const side = state.drawing.startSide;
            if (!side) return;

            if (state.appMode === 'linking') {
                state.drawing.currentPoint = { x: e.clientX, y: e.clientY };
                updatePathVisual();
            } 
            else if (state.appMode === 'annotation') {
                if (state.annoTool === 'eraser-stroke') {
                    const pos = getMousePosInViewport(e, side);
                    deleteStrokeAt(side, pos.x, pos.y);
                } else {
                    const pos = getMousePosInViewport(e, side);
                    continueAnnotationStroke(side, pos.x, pos.y);
                }
            }
        }

        async function handlePointerUp(e) {
            if (!state.drawing.active) return;
            if (state.drawing.pointerId !== e.pointerId) return;

            const side = state.drawing.startSide;

            if (state.appMode === 'linking') {
                const leftRect = els.leftWrapper.getBoundingClientRect();
                const rightRect = els.rightWrapper.getBoundingClientRect();
                let endSide = null;

                if (e.clientX >= leftRect.left && e.clientX <= leftRect.right && 
                    e.clientY >= leftRect.top && e.clientY <= leftRect.bottom) {
                    endSide = 'left';
                } else if (e.clientX >= rightRect.left && e.clientX <= rightRect.right && 
                           e.clientY >= rightRect.top && e.clientY <= rightRect.bottom) {
                    endSide = 'right';
                }

                let validLink = false;
                if (endSide && state.view[endSide].docId) {
                    const targetDoc = state.view[endSide].docId;
                    const targetPage = state.view[endSide].pageNum;
                    const sourceDoc = state.drawing.startPointData.docId;

                    if (endSide !== side || targetPage !== state.drawing.startPointData.page) {
                        const pos = getMousePosInViewport(e, endSide);
                        const newLink = {
                            id: 'link_' + Date.now(),
                            source: state.drawing.startPointData,
                            target: { docId: targetDoc, page: targetPage, x: pos.x, y: pos.y },
                            path: `M ${state.drawing.startPointData.x} ${state.drawing.startPointData.y} L ${pos.x} ${pos.y}`
                        };
                        state.links.push(newLink);
                        await saveLinkToDB(newLink);
                        validLink = true;
                        renderMarkersForView(side);
                        renderMarkersForView(endSide);
                    }
                }
                state.drawing.active = false;
                els.currentPath.style.display = 'none';
                els.currentPath.setAttribute('d', '');
                if (!validLink && endSide) showModal("Invalid Link", "Links must start and end on different pages.");
            } 
            else if (state.appMode === 'annotation') {
                if (state.annoTool !== 'eraser-stroke') {
                    finishAnnotationStroke(side);
                } else {
                    const docId = state.view[side].docId;
                    if(docId) saveAnnotationsToDB(docId, state.annotations[docId]);
                }
                state.drawing.active = false;
            }
            
            e.target.releasePointerCapture(e.pointerId);
        }

        function updatePathVisual() {
            const start = state.drawing.startPoint;
            const end = state.drawing.currentPoint;
            const svgRect = els.drawingLayer.getBoundingClientRect();
            const x1 = start.x - svgRect.left;
            const y1 = start.y - svgRect.top;
            const x2 = end.x - svgRect.left;
            const y2 = end.y - svgRect.top;
            const d = `M ${x1} ${y1} L ${x2} ${y2}`;
            els.currentPath.setAttribute('d', d);
        }

        function renderMarkersForView(side) {
            const container = document.getElementById(side + '-markers-layer');
            container.innerHTML = ''; 
            const viewState = state.view[side];
            if (!viewState.docId) return;

            const relevantLinks = state.links.filter(link => 
                (link.source.docId === viewState.docId && link.source.page === viewState.pageNum) ||
                (link.target.docId === viewState.docId && link.target.page === viewState.pageNum)
            );

            let targetMarkerElement = null;

            relevantLinks.forEach(link => {
                let isSource = (link.source.docId === viewState.docId && link.source.page === viewState.pageNum);
                let pointData = isSource ? link.source : link.target;

                const btn = document.createElement('div');
                btn.className = 'link-marker';
                const targetDocName = state.documents[isSource ? link.target.docId : link.source.docId]?.name || 'Unknown';
                const targetPage = isSource ? link.target.page : link.source.page;
                btn.title = `Jump to: ${targetDocName} (Page ${targetPage})`;
                
                const wrapper = els[side + 'Wrapper'];
                const x = pointData.x * wrapper.offsetWidth;
                const y = pointData.y * wrapper.offsetHeight;

                btn.style.left = `${x}px`;
                btn.style.top = `${y}px`;
                btn.innerHTML = '<i class="fa-solid fa-link"></i>';

                if (state.highlightRequest && 
                    state.highlightRequest.side === side && 
                    state.highlightRequest.linkId === link.id) {
                    
                    btn.classList.add('marker-active');
                    targetMarkerElement = btn;
                    setTimeout(() => {
                        state.highlightRequest = null;
                        btn.classList.remove('marker-active');
                    }, 3000);
                }

                btn.onclick = (e) => {
                    e.stopPropagation();
                    e.preventDefault(); 
                    followLink(link, side);
                };

                container.appendChild(btn);
            });

            if (targetMarkerElement) {
                const viewport = els[side + 'Viewport'];
                const elementTop = targetMarkerElement.offsetTop;
                const viewportHeight = viewport.clientHeight;
                const elementHeight = targetMarkerElement.clientHeight;
                const scrollTo = elementTop - (viewportHeight / 2) + (elementHeight / 2);
                viewport.scrollTo({ top: scrollTo, behavior: 'smooth' });
            }
        }

        function followLink(link, fromSide) {
            const isFromSource = (link.source.docId === state.view[fromSide].docId);
            const targetData = isFromSource ? link.target : link.source;
            const otherSide = fromSide === 'left' ? 'right' : 'left';

            state.highlightRequest = { side: otherSide, linkId: link.id };
            state.view[otherSide].docId = targetData.docId;
            state.view[otherSide].pageNum = targetData.page;
            state.view[otherSide].scrollTop = 0; 
            
            saveSettings(); 
            renderPage(otherSide);
        }

        function showModal(title, body) {
            els.modalTitle.innerText = title;
            els.modalBody.innerHTML = body.replace(/\n/g, '<br>');
            els.modal.classList.remove('hidden');
        }

        function closeModal() {
            els.modal.classList.add('hidden');
        }

        init();

    </script>
</body>
