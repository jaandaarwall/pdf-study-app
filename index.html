<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Linker Studio (Full Search)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- PDF-Lib (For Editing) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- JSZip (For Bundling) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver.js (Fallback) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        /* Canvas Styles */
        .pdf-canvas {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
            display: block;
        }

        /* --- Text Layer (Selectable Text) --- */
        .textLayer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            line-height: 1.0;
            opacity: 1;
            z-index: 20; 
            mix-blend-mode: multiply;
        }
        
        .textLayer > span {
            color: transparent;
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
            font-family: sans-serif; 
        }

        /* Text Selection Color */
        .textLayer ::selection {
            background: rgba(59, 130, 246, 0.3); 
            color: transparent;
        }
        
        /* --- Search Highlights --- */
        .search-highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 25;
            pointer-events: none; 
        }

        .search-highlight {
            background-color: rgba(255, 255, 0, 0.4);
            position: absolute;
            border: 1px solid rgba(255, 200, 0, 0.6);
        }

        .search-highlight.active {
            background-color: rgba(255, 100, 0, 0.5);
            border: 2px solid rgb(255, 69, 0);
            z-index: 26;
        }

        /* Annotation Canvas Layer */
        .annotation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 55; 
            pointer-events: none; 
            touch-action: none; 
        }
        
        /* Cursor styles */
        body.annotation-mode .annotation-canvas {
            pointer-events: auto;
        }
        body.anno-pen .annotation-canvas { cursor: crosshair; }
        body.anno-pixel-eraser .annotation-canvas { cursor: crosshair; }
        body.anno-stroke-eraser .annotation-canvas { cursor: grab; }
        body.anno-stroke-eraser .annotation-canvas:active { cursor: grabbing; }
        body.anno-select .annotation-canvas { cursor: default; }
        body.anno-select .annotation-canvas:active { cursor: grabbing; }
        
        body:not(.annotation-mode) .textLayer span {
            cursor: text;
        }
        body.annotation-mode .textLayer {
            pointer-events: none;
        }

        /* Link Button Marker */
        .link-marker {
            position: absolute;
            width: 28px;
            height: 28px;
            background-color: #ef4444; 
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto !important; 
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            z-index: 60; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        
        .link-marker:hover {
            background-color: #dc2626; 
            transform: translate(-50%, -50%) scale(1.15);
            z-index: 61;
            box-shadow: 0 6px 8px rgba(0,0,0,0.5);
        }

        /* Active Highlight Animation */
        @keyframes markerPulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.4); box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .marker-active {
            background-color: #3b82f6 !important; 
            z-index: 100;
            animation: markerPulse 2s infinite;
        }

        /* Drawing Layer (For Links) */
        #drawing-layer {
            pointer-events: none; 
        }
        body.linking-mode #drawing-layer {
            pointer-events: auto;
            cursor: crosshair;
        }
        body.linking-mode .pdf-canvas-container {
            cursor: crosshair;
        }
        body.linking-mode .link-marker {
            pointer-events: none; 
            opacity: 0.5;
        }

        /* Modal */
        .modal-backdrop {
            background-color: rgba(0,0,0,0.5);
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Resizer Styles */
        #vertical-resizer {
            background-color: #e5e7eb;
            width: 6px;
            cursor: col-resize;
            transition: background-color 0.2s;
            z-index: 30;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #vertical-resizer:hover, #vertical-resizer.resizing {
            background-color: #3b82f6;
        }
        #vertical-resizer::after {
            content: '';
            width: 2px;
            height: 20px;
            background-color: #9ca3af;
            border-radius: 1px;
        }
        #vertical-resizer:hover::after {
            background-color: white;
        }
        
        body.resizing-active {
            user-select: none;
            cursor: col-resize;
        }
        body.resizing-active * {
            cursor: col-resize !important;
        }

        /* Search Result Item */
        .search-result-item {
            cursor: pointer;
        }
        .search-result-item:hover {
            background-color: #f3f4f6;
        }
    </style>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument } = PDFLib;
    </script>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden text-gray-800 font-sans">

            </div>
        </div>
        
        <div class="flex items-center gap-2">

                <button id="mode-anno-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" onclick="setAppMode('annotation')" title="Annotation Mode">

                </button>
            </div>

            <!-- Annotation Sub-Tools -->
            <div id="anno-tools" class="hidden flex items-center gap-1 bg-white border border-gray-200 rounded-lg px-2 py-1 shadow-sm">
                <!-- Tools -->
                <button id="tool-select" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('select')" title="Select / Group / Move / Resize">
                    <i class="fa-solid fa-object-group"></i>
                </button>
                <button id="tool-pen" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('pen')" title="Pen">
                    <i class="fa-solid fa-pen-nib"></i>
                </button>
                <button id="tool-eraser-pixel" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('eraser-pixel')" title="Pixel Eraser">
                    <i class="fa-solid fa-eraser"></i>
                </button>

                    <i class="fa-solid fa-ban"></i>
                </button>
                
                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <!-- Image Tool -->

                    <i class="fa-regular fa-image"></i>
                </button>
                <input type="file" id="image-upload" class="hidden" accept="image/*">
                
                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <!-- Color & Thickness -->
                <div class="relative w-8 h-8 overflow-hidden rounded-full border border-gray-300 shadow-sm cursor-pointer" title="Pen Color">
                    <input type="color" id="color-picker" class="absolute -top-2 -left-2 w-12 h-12 p-0 border-0 cursor-pointer" value="#ef4444">
                </div>

                <div class="flex items-center gap-1 mx-1 w-24" title="Pen Thickness">
                    <i class="fa-solid fa-circle text-[8px] text-gray-400"></i>
                    <input type="range" id="thickness-picker" min="1" max="20" value="5" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <i class="fa-solid fa-circle text-sm text-gray-400"></i>
                </div>

                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <!-- Actions -->
                <button onclick="undoLastStroke()" class="w-8 h-8 rounded flex items-center justify-center text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors" title="Undo Last Line">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
                <button onclick="clearCurrentPageAnnotations()" class="w-8 h-8 rounded flex items-center justify-center text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors" title="Clear Page">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>

            <div class="h-8 w-px bg-gray-300 mx-2"></div>
            
            <button onclick="exportProject()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-3 py-1.5 rounded shadow-sm flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-floppy-disk"></i> Save

            <label class="text-gray-600 hover:text-blue-600 font-medium text-sm flex items-center gap-2 cursor-pointer border border-gray-200 hover:border-blue-300 px-3 py-1.5 rounded bg-white transition-colors">
                <i class="fa-solid fa-folder-open"></i> Open
                <input type="file" id="import-project-input" class="hidden" accept=".zip,.json">
            </label>
        </div>
    </header>

            </div>

        <!-- Workspace (Split View) -->

                        <span class="text-sm font-bold text-gray-600 truncate w-24" id="left-view-title">None</span>
                        <!-- Viewport Search -->
                        <div class="relative group/search">

                            <div id="left-search-nav" class="hidden absolute right-0 top-6 bg-white shadow-md border rounded flex p-1 z-50">

                            <button onclick="resetZoom('left')" class="px-1.5 py-0.5 hover:bg-blue-100 text-blue-600 rounded text-xs" title="Fit Width"><i class="fa-solid fa-expand"></i></button>
                        </div>

                        <div class="w-px h-4 bg-gray-300 mx-1"></div>

                        <!-- Navigation Controls -->

                        <!-- Page Tools (Left) -->

                            <i class="fa-regular fa-file-circle-plus text-sm"></i>

                        <!-- Viewport Search -->

                                <span id="right-search-count" class="text-[10px] self-center px-1 text-gray-500">0/0</span>
                                <button onclick="navigateSearchResult('right', 1)" class="p-1 hover:bg-gray-100 rounded text-gray-600 text-xs"><i class="fa-solid fa-chevron-down"></i></button>
                                <button onclick="closeViewportSearch('right')" class="ml-1 p-1 hover:bg-red-50 text-red-500 rounded text-xs"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>

                    <div class="flex items-center gap-2">
                         <!-- Zoom Controls -->
                        <div class="flex items-center bg-gray-50 rounded border border-gray-200">
                            <button onclick="zoomViewport('right', -0.25)" class="px-1.5 py-0.5 hover:bg-gray-200 rounded text-gray-600 text-xs" title="Zoom Out"><i class="fa-solid fa-minus"></i></button>
                            <span id="right-zoom-level" class="text-[10px] w-8 text-center font-mono text-gray-500">100%</span>

                        <span id="right-page-indicator" class="text-xs text-gray-500 w-16 text-center">-- / --</span>

                            <i class="fa-regular fa-file-circle-plus text-sm"></i>
                        </button>
                        <button onclick="insertPage('right', 'duplicate')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Duplicate Current Page">
                            <i class="fa-regular fa-clone text-sm"></i>
                        </button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto relative flex justify-center p-4 bg-gray-500/10 pdf-canvas-container" id="right-viewport">
                    <div id="right-canvas-wrapper" class="relative shadow-lg">
                        <canvas id="right-canvas" class="pdf-canvas bg-white block"></canvas>

                </div>

            <svg id="drawing-layer" class="absolute inset-0 w-full h-full z-40 overflow-visible pointer-events-none">
                <path id="current-draw-path" d="" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" style="display:none;"></path>
            </svg>

        </main>
    </div>

    <div id="modal" class="fixed inset-0 modal-backdrop hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full">
            <h3 id="modal-title" class="text-lg font-bold mb-2">Alert</h3>
            <p id="modal-body" class="text-gray-600 mb-4">Message</p>
            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">Close</button>
            </div>
        </div>
    </div>

    <script>
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        const DB_NAME = 'PDFLinkerStudioDB';
        const DB_VERSION = 6; 
        let db;

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('documents')) db.createObjectStore('documents', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('links')) db.createObjectStore('links', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('annotations')) db.createObjectStore('annotations', { keyPath: 'docId' });
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject('IndexedDB error: ' + e.target.errorCode);
            });
        }

        async function saveDocumentToDB(docData) {
            const tx = db.transaction(['documents'], 'readwrite');
            tx.objectStore('documents').put(docData);
        }

        async function saveLinkToDB(linkData) {
            const tx = db.transaction(['links'], 'readwrite');
            tx.objectStore('links').put(linkData);
        }

        async function saveAnnotationsToDB(docId, data) {
            const tx = db.transaction(['annotations'], 'readwrite');
            tx.objectStore('annotations').put({ docId, data });
        }

        async function saveSettings() {
            if (!db) return;
            const settings = {
                id: 'appState',
                view: state.view,
                splitRatio: state.splitRatio,
                appMode: state.appMode,
                annoTool: state.annoTool,
                annoColor: state.annoColor,
                annoThickness: state.annoThickness
            };
            const tx = db.transaction(['settings'], 'readwrite');
            tx.objectStore('settings').put(settings);
        }

        async function clearDB() {
            const tx = db.transaction(['documents', 'links', 'settings', 'annotations'], 'readwrite');
            tx.objectStore('documents').clear();
            tx.objectStore('links').clear();
            tx.objectStore('settings').clear();
            tx.objectStore('annotations').clear();
        }

        async function loadStateFromDB() {
            return new Promise((resolve, reject) => {
                const result = { documents: [], links: [], settings: null, annotations: {} };
                const tx = db.transaction(['documents', 'links', 'settings', 'annotations'], 'readonly');
                
                tx.objectStore('documents').getAll().onsuccess = (e) => result.documents = e.target.result;
                tx.objectStore('links').getAll().onsuccess = (e) => result.links = e.target.result;
                tx.objectStore('settings').get('appState').onsuccess = (e) => result.settings = e.target.result;
                tx.objectStore('annotations').getAll().onsuccess = (e) => {
                    e.target.result.forEach(item => result.annotations[item.docId] = item.data);
                };

                tx.oncomplete = () => resolve(result);
                tx.onerror = () => reject(tx.error);
            });
        }

        const state = {
            documents: {}, 
            view: {
                left: { docId: null, pageNum: 1, scale: 1.5, scrollTop: 0 },
                right: { docId: null, pageNum: 1, scale: 1.5, scrollTop: 0 }
            },
            splitRatio: 0.5,
            links: [], 
            appMode: 'navigation', 
            annoTool: 'pen', 
            annoColor: '#ef4444',
            annoThickness: 5, 
            annotations: {}, 
            imageCache: {}, 
            lastActiveSide: 'left',
            drawing: {
                active: false,
                startSide: null, 
                startPoint: { x: 0, y: 0 }, 
                startPointData: null, 
                currentPoint: { x: 0, y: 0 },
                pointerId: null 
            },
            selection: {
                active: false,
                side: null,
                mode: 'idle',
                marqueeStart: null,
                marqueeCurrent: null,
                selectedImages: [],
                selectedStrokes: [],
                boundingBox: null,
                dragStartMouse: null,
                dragStartPositions: null,
            },
            highlightRequest: null,
            projectFileHandle: null,
            search: {
                left: { query: '', results: [], index: -1, abortController: null },
                right: { query: '', results: [], index: -1, abortController: null }
            },
            // Reusable canvas for text measurement (performance)
            measureCanvas: document.createElement('canvas')
        };

        const els = {
            uploadInput: document.getElementById('pdf-upload-input'),
            imageInput: document.getElementById('image-upload'),
            docList: document.getElementById('doc-list'),
            emptyMsg: document.getElementById('empty-state-msg'),
            loadingSpinner: document.getElementById('loading-spinner'),
            leftPanel: document.getElementById('left-panel'),
            rightPanel: document.getElementById('right-panel'),
            resizer: document.getElementById('vertical-resizer'),
            workspaceMain: document.getElementById('workspace-main'),
            leftCanvas: document.getElementById('left-canvas'),
            rightCanvas: document.getElementById('right-canvas'),
            leftTextLayer: document.getElementById('left-text-layer'),
            rightTextLayer: document.getElementById('right-text-layer'),
            leftAnnoCanvas: document.getElementById('left-anno-canvas'),
            rightAnnoCanvas: document.getElementById('right-anno-canvas'),
            leftWrapper: document.getElementById('left-canvas-wrapper'),
            rightWrapper: document.getElementById('right-canvas-wrapper'),
            leftViewport: document.getElementById('left-viewport'),
            rightViewport: document.getElementById('right-viewport'),
            leftSearchLayer: document.getElementById('left-search-layer'),
            rightSearchLayer: document.getElementById('right-search-layer'),
            drawingLayer: document.getElementById('drawing-layer'),
            currentPath: document.getElementById('current-draw-path'),
            modeNavBtn: document.getElementById('mode-nav-btn'),
            modeLinkBtn: document.getElementById('mode-link-btn'),
            modeAnnoBtn: document.getElementById('mode-anno-btn'),
            annoTools: document.getElementById('anno-tools'),
            toolSelect: document.getElementById('tool-select'),
            toolPen: document.getElementById('tool-pen'),
            toolEraserPixel: document.getElementById('tool-eraser-pixel'),
            toolEraserStroke: document.getElementById('tool-eraser-stroke'),
            colorPicker: document.getElementById('color-picker'),
            thicknessPicker: document.getElementById('thickness-picker'),
            importInput: document.getElementById('import-project-input'),
            modal: document.getElementById('modal'),
            modalTitle: document.getElementById('modal-title'),
            modalBody: document.getElementById('modal-body'),
            leftTitle: document.getElementById('left-view-title'),
            rightTitle: document.getElementById('right-view-title'),
            leftPageInd: document.getElementById('left-page-indicator'),
            rightPageInd: document.getElementById('right-page-indicator'),
            leftZoomLevel: document.getElementById('left-zoom-level'),
            rightZoomLevel: document.getElementById('right-zoom-level'),
            globalSearchInput: document.getElementById('global-search-input'),
            globalSearchResults: document.getElementById('global-search-results'),
        };

        const handleScroll = debounce((side) => {
            const viewport = els[side + 'Viewport'];
            state.view[side].scrollTop = viewport.scrollTop;
            state.lastActiveSide = side;
            saveSettings();
            renderMarkersForView(side);
        }, 200);

        // --- Resizer Logic ---
        function initResizer() {
            const resizer = els.resizer;
            const leftSide = els.leftPanel;
            const rightSide = els.rightPanel;
            const container = els.workspaceMain;
            
            let x = 0;
            let leftWidth = 0;

            const mouseDownHandler = function(e) {
                x = e.clientX;
                const rect = leftSide.getBoundingClientRect();
                leftWidth = rect.width;

                document.body.classList.add('resizing-active');
                resizer.classList.add('resizing');

                document.addEventListener('pointermove', mouseMoveHandler);
                document.addEventListener('pointerup', mouseUpHandler);
            };

            const mouseMoveHandler = function(e) {
                const dx = e.clientX - x;
                const newLeftWidth = ((leftWidth + dx) * 100) / container.getBoundingClientRect().width;
                if (newLeftWidth > 10 && newLeftWidth < 90) {
                    leftSide.style.width = `${newLeftWidth}%`;
                    rightSide.style.width = `${100 - newLeftWidth}%`;
                    state.splitRatio = newLeftWidth / 100;
                }
            };

            const mouseUpHandler = function() {
                document.body.classList.remove('resizing-active');
                resizer.classList.remove('resizing');
                document.removeEventListener('pointermove', mouseMoveHandler);
                document.removeEventListener('pointerup', mouseUpHandler);
                saveSettings();
                renderMarkersForView('left');
                renderMarkersForView('right');
            };

            resizer.addEventListener('pointerdown', mouseDownHandler);
        }

        // --- Zoom Logic ---
        function updateZoomIndicator(side) {
            const percentage = Math.round(state.view[side].scale * 100);
            els[side + 'ZoomLevel'].innerText = percentage + '%';
        }

        function zoomViewport(side, delta) {
            const currentScale = state.view[side].scale;
            let newScale = currentScale + delta;
            if (newScale < 0.25) newScale = 0.25;
            if (newScale > 5.0) newScale = 5.0;
            state.view[side].scale = newScale;
            updateZoomIndicator(side);
            renderPage(side);
            saveSettings();
        }

        function resetZoom(side) {
            state.view[side].scale = 1.0;
            updateZoomIndicator(side);
            renderPage(side);
            saveSettings();
        }

        // --- Text Layer Logic ---
        function renderTextLayerCustom(textContent, textLayerDiv, viewport) {
            textLayerDiv.innerHTML = '';
            const textItems = textContent.items;
            for (let item of textItems) {
                if (item.str.length === 0) continue;
                const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                const fontSize = Math.sqrt((tx[0] * tx[0]) + (tx[1] * tx[1]));
                const div = document.createElement('span');
                div.textContent = item.str;
                const left = tx[4];
                const top = tx[5] - fontSize; 
                const width = tx[0] * item.width; 
                div.style.left = `${left}px`;
                div.style.top = `${top}px`;
                div.style.fontSize = `${fontSize}px`;
                div.style.fontFamily = item.fontName || 'sans-serif';
                div.style.width = `${width}px`;
                textLayerDiv.appendChild(div);
            }
        }

        // --- Helper: Map PDF Font Name to CSS Font Family ---
        function getCssFontFamily(pdfFontName) {
            if (!pdfFontName) return 'sans-serif';
            const n = pdfFontName.toLowerCase();
            if (n.includes('times')) return 'Times New Roman, serif';
            if (n.includes('helvetica')) return 'Helvetica, Arial, sans-serif';
            if (n.includes('courier')) return 'Courier New, monospace';
            return 'sans-serif'; 
        }

        // --- Search Logic (Precise Highlighting using measureText) ---
        
        function toggleViewportSearch(side) {
            const input = document.getElementById(`${side}-search-input`);
            const nav = document.getElementById(`${side}-search-nav`);
            if (input.classList.contains('hidden')) {
                input.classList.remove('hidden');
                nav.classList.remove('hidden');
                input.focus();
            } else {
                input.focus();
            }
        }

        function closeViewportSearch(side) {
            const input = document.getElementById(`${side}-search-input`);
            const nav = document.getElementById(`${side}-search-nav`);
            input.classList.add('hidden');
            nav.classList.add('hidden');
            input.value = '';
            clearSearchHighlights(side);
            state.search[side] = { query: '', results: [], index: -1, abortController: null };
        }

        async function performViewportSearch(side, targetPageNum = null) {
            const input = document.getElementById(`${side}-search-input`);
            const query = input.value.trim().toLowerCase();
            const docId = state.view[side].docId;

            if (!query || !docId) {
                clearSearchHighlights(side);
                state.search[side] = { query: '', results: [], index: -1, abortController: null };
                updateSearchCount(side);
                return;
            }

            // If same query, don't re-search (unless targetPageNum is specific)
            if (state.search[side].query === query && !targetPageNum) {
                renderSearchHighlights(side);
                return;
            }

            // Cancel previous search
            if (state.search[side].abortController) {
                state.search[side].abortController.abort();
            }

            const abortController = new AbortController();
            state.search[side].abortController = abortController;
            state.search[side].query = query;

            const doc = state.documents[docId];
            const allMatches = [];
            
            // Limit search to 100 pages for performance, or all if smaller
            const maxPage = Math.min(doc.pageCount, 500); 
            const measureCtx = state.measureCanvas.getContext('2d');

            for (let i = 1; i <= maxPage; i++) {
                if (abortController.signal.aborted) break;

                try {
                    const page = await doc.pdfDoc.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    // Use current zoom for coordinates
                    const viewport = page.getViewport({ scale: state.view[side].scale });

                    // Iterate through text items to find matches
                    // We must loop to find multiple matches within a single item
                    for (let itemIdx = 0; itemIdx < textContent.items.length; itemIdx++) {
                        const item = textContent.items[itemIdx];
                        const textStr = item.str.toLowerCase();
                        
                        if (textStr.includes(query)) {
                            // Calculate base geometry for the text item
                            const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                            
                            // Item dimensions
                            const left = tx[4];
                            const bottom = tx[5];
                            const fontSize = Math.sqrt((tx[0] * tx[0]) + (tx[1] * tx[1]));
                            const top = bottom - fontSize;
                            
                            // Find all occurrences of query in this item
                            let searchIndex = 0;
                            let matchIndex;
                            while ((matchIndex = textStr.indexOf(query, searchIndex)) !== -1) {
                                // --- Precise Highlight Calculation using measureText ---
                                
                                // 1. Get Font Info
                                const cssFontFamily = getCssFontFamily(item.fontName);
                                
                                // 2. Configure Measurement Context
                                measureCtx.font = `${fontSize}px ${cssFontFamily}`;
                                
                                // 3. Measure the prefix (text before the match)
                                // This gives us the EXACT pixel offset of where the match starts
                                const prefixStr = item.str.substring(0, matchIndex);
                                const prefixWidth = measureCtx.measureText(prefixStr).width;
                                
                                // 4. Measure the match string itself
                                const matchStr = item.str.substring(matchIndex, matchIndex + query.length);
                                const matchWidth = measureCtx.measureText(matchStr).width;

                                // 5. Calculate absolute positions
                                const matchLeft = left + prefixWidth;
                                
                                allMatches.push({
                                    page: i,
                                    index: itemIdx, 
                                    x: matchLeft,
                                    y: top,
                                    w: matchWidth,
                                    h: fontSize
                                });

                                searchIndex = matchIndex + 1; // Find next occurrence
                            }
                        }
                    }
                } catch (e) { /* ignore page errors */ }
            }

            state.search[side].results = allMatches;
            
            // Determine starting index
            let startIndex = 0;
            if (targetPageNum) {
                // If jumping from global search, find the first match on that specific page
                startIndex = allMatches.findIndex(m => m.page === targetPageNum);
            } else {
                // Else, find the first match on current page
                const currentMatches = allMatches.filter(m => m.page === state.view[side].pageNum);
                if (currentMatches.length > 0) {
                    startIndex = allMatches.indexOf(currentMatches[0]);
                } else if (allMatches.length > 0) {
                    // If no match on current page, go to first overall match
                    startIndex = 0;
                }
            }
            
            if (startIndex === -1) startIndex = 0; // Fallback
            state.search[side].index = startIndex;
            
            // If a target page was requested and we are not on it, switch page
            const targetMatch = allMatches[startIndex];
            if (targetPageNum && targetMatch && targetMatch.page !== state.view[side].pageNum) {
                state.view[side].pageNum = targetMatch.page;
                renderPage(side); // This will trigger renderSearchHighlights
            } else {
                renderSearchHighlights(side);
            }
            
            updateSearchCount(side);
        }

        function clearSearchHighlights(side) {
            document.getElementById(`${side}-search-layer`).innerHTML = '';
        }

        function renderSearchHighlights(side) {
            const container = document.getElementById(`${side}-search-layer`);
            container.innerHTML = '';
            
            // Filter results for current page only
            const currentPage = state.view[side].pageNum;
            const pageMatches = state.search[side].results.filter(m => m.page === currentPage);
            
            // Find which one is active based on global index
            const activeGlobalIndex = state.search[side].index;
            
            pageMatches.forEach((res) => {
                const globalIdx = state.search[side].results.indexOf(res);
                const div = document.createElement('div');
                div.className = 'search-highlight' + (globalIdx === activeGlobalIndex ? ' active' : '');
                div.style.left = `${res.x}px`;
                div.style.top = `${res.y}px`;
                div.style.width = `${res.w}px`;
                div.style.height = `${res.h}px`;
                container.appendChild(div);
            });
        }

        function updateSearchCount(side) {
            const total = state.search[side].results.length;
            const current = total > 0 ? state.search[side].index + 1 : 0;
            document.getElementById(`${side}-search-count`).innerText = `${current}/${total}`;
        }

        function navigateSearchResult(side, dir) {
            const results = state.search[side].results;
            if (results.length === 0) return;
            
            let newIndex = state.search[side].index + dir;
            if (newIndex < 0) newIndex = results.length - 1;
            if (newIndex >= results.length) newIndex = 0;
            
            state.search[side].index = newIndex;
            const match = results[newIndex];
            
            // Check if we need to change page
            if (match.page !== state.view[side].pageNum) {
                state.view[side].pageNum = match.page;
                renderPage(side);
            } else {
                renderSearchHighlights(side);
            }
            updateSearchCount(side);
        }

        // Global Search
        async function performGlobalSearch() {
            const query = els.globalSearchInput.value.trim().toLowerCase();
            const container = els.globalSearchResults;
            container.innerHTML = '';

            if (!query) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            container.innerHTML = '<div class="text-xs text-gray-400 p-2 text-center">Searching...</div>';

            let allMatches = [];

            for (const docId of Object.keys(state.documents)) {
                const doc = state.documents[docId];
                const maxPage = Math.min(doc.pageCount, 100); 
                
                for (let i = 1; i <= maxPage; i++) {
                    try {
                        const page = await doc.pdfDoc.getPage(i);
                        const textContent = await page.getTextContent();
                        const foundOnPage = textContent.items.some(item => item.str.toLowerCase().includes(query));
                        if (foundOnPage) {
                            allMatches.push({
                                docId: docId,
                                docName: doc.name,
                                page: i
                            });
                        }
                    } catch(e) { /* ignore */ }
                }
            }

            container.innerHTML = '';
            if (allMatches.length === 0) {
                container.innerHTML = '<div class="text-xs text-gray-500 p-2">No matches found.</div>';
                return;
            }

            allMatches.forEach(match => {
                const div = document.createElement('div');
                div.className = 'p-2 border-b border-gray-100 search-result-item hover:bg-blue-50';
                div.innerHTML = `
                    <div class="font-bold text-xs text-gray-700 truncate">${match.docName}</div>
                    <div class="text-[10px] text-blue-600">Page ${match.page}</div>
                `;
                div.onclick = async () => {
                    const side = state.lastActiveSide;
                    state.view[side].docId = match.docId;
                    state.view[side].pageNum = match.page;
                    state.view[side].scrollTop = 0;
                    
                    // Open Search UI
                    const input = document.getElementById(`${side}-search-input`);
                    input.value = query;
                    input.classList.remove('hidden');
                    document.getElementById(`${side}-search-nav`).classList.remove('hidden');

                    // Run Full Doc Search and Highlight
                    await performViewportSearch(side, match.page);
                    
                    renderPage(side);
                    renderDocList();
                };
                container.appendChild(div);
            });
        }

        async function init() {
            try {
                await initDB();
                const savedData = await loadStateFromDB();
                
                if (savedData.documents.length > 0 || savedData.links.length > 0) {
                    els.loadingSpinner.classList.remove('hidden');
                    els.emptyMsg.style.display = 'none';
                    
                    state.links = savedData.links;
                    state.annotations = savedData.annotations || {};

                    Object.values(state.annotations).forEach(pages => {
                        Object.values(pages).forEach(pageData => {
                            if(pageData.images) {
                                pageData.images.forEach(img => {
                                    const imageObj = new Image();
                                    imageObj.src = img.src;
                                    state.imageCache[img.id] = imageObj;
                                });
                            }
                        });
                    });

                    for (const dbDoc of savedData.documents) {
                        try {
                            const arrayBuffer = await dbDoc.fileBlob.arrayBuffer();
                            const pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                            state.documents[dbDoc.id] = {
                                id: dbDoc.id,
                                file: dbDoc.fileBlob, 
                                pdfDoc: pdfDoc,
                                name: dbDoc.name,
                                pageCount: pdfDoc.numPages,
                                thumbnail: dbDoc.thumbnail
                            };
                        } catch (err) {
                            console.error("Failed to restore doc:", dbDoc.name, err);
                        }
                    }

                    if (savedData.settings) {
                        const sView = savedData.settings.view;
                        if (sView.left.docId && state.documents[sView.left.docId]) {
                            state.view.left = { ...sView.left, scrollTop: sView.left.scrollTop || 0 };
                            if(state.view.left.docId) state.lastActiveSide = 'left';
                        }
                        if (sView.right.docId && state.documents[sView.right.docId]) {
                            state.view.right = { ...sView.right, scrollTop: sView.right.scrollTop || 0 };
                        }
                        if (savedData.settings.splitRatio) {
                            state.splitRatio = savedData.settings.splitRatio;
                            els.leftPanel.style.width = (state.splitRatio * 100) + '%';
                            els.rightPanel.style.width = ((1 - state.splitRatio) * 100) + '%';
                        }
                        if (savedData.settings.appMode) setAppMode(savedData.settings.appMode, false);
                        if (savedData.settings.annoTool) setAnnoTool(savedData.settings.annoTool, false);
                        if (savedData.settings.annoColor) {
                            state.annoColor = savedData.settings.annoColor;
                            els.colorPicker.value = savedData.settings.annoColor;
                        }
                        if (savedData.settings.annoThickness) {
                            state.annoThickness = savedData.settings.annoThickness;
                            els.thicknessPicker.value = savedData.settings.annoThickness;
                        }
                    }

                    renderDocList();
                    updateZoomIndicator('left');
                    updateZoomIndicator('right');
                    if (state.view.left.docId) renderPage('left');
                    if (state.view.right.docId) renderPage('right');
                }

                els.loadingSpinner.classList.add('hidden');

            } catch (err) {
                console.error("DB Init failed:", err);
            }

            els.uploadInput.addEventListener('change', handleFileUpload);
            els.imageInput.addEventListener('change', handleImageUpload);
            els.importInput.addEventListener('change', handleProjectImport);
            
            // Search Listeners
            els.globalSearchInput.addEventListener('input', debounce(performGlobalSearch, 300));
            ['left', 'right'].forEach(side => {
                document.getElementById(`${side}-search-input`).addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') performViewportSearch(side);
                    if (e.key === 'Escape') closeViewportSearch(side);
                });
                document.getElementById(`${side}-search-input`).addEventListener('input', debounce(() => performViewportSearch(side), 500));
            });

            window.addEventListener('paste', handlePaste);
            window.addEventListener('pointerdown', handlePointerDown);
            window.addEventListener('pointermove', handlePointerMove);
            window.addEventListener('pointerup', handlePointerUp);
            window.addEventListener('keydown', handleKeyDown);
            els.leftViewport.addEventListener('scroll', () => handleScroll('left'));
            els.rightViewport.addEventListener('scroll', () => handleScroll('right'));
            
            els.colorPicker.addEventListener('input', (e) => {
                state.annoColor = e.target.value;
                if (state.annoTool === 'pen') setAnnoTool('pen', false); 
                saveSettings();
            });
            els.thicknessPicker.addEventListener('input', (e) => {
                state.annoThickness = parseInt(e.target.value);
                saveSettings();
            });

            initResizer();
        }

        function setAppMode(mode, save = true) {
            state.appMode = mode;
            if (save) saveSettings();

            document.body.classList.remove('linking-mode', 'annotation-mode', 'anno-pen', 'anno-pixel-eraser', 'anno-stroke-eraser', 'anno-select');

            [els.modeNavBtn, els.modeLinkBtn, els.modeAnnoBtn].forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
                btn.classList.add('text-gray-500');
            });
            els.annoTools.classList.add('hidden');

            if (mode === 'navigation') {
                els.modeNavBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeNavBtn.classList.remove('text-gray-500');
            } else if (mode === 'linking') {
                document.body.classList.add('linking-mode');
                els.modeLinkBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeLinkBtn.classList.remove('text-gray-500');
                if(save) showModal("Link Mode", "Click and drag from one document to another to create a link.");
            } else if (mode === 'annotation') {
                document.body.classList.add('annotation-mode');
                els.modeAnnoBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeAnnoBtn.classList.remove('text-gray-500');
                els.annoTools.classList.remove('hidden');
                setAnnoTool(state.annoTool, false); 
            }
        }

        function setAnnoTool(tool, save = true) {
            state.annoTool = tool;
            if (save) saveSettings();

            [els.toolSelect, els.toolPen, els.toolEraserPixel, els.toolEraserStroke].forEach(btn => {
                btn.classList.remove('bg-blue-50', 'text-blue-600', 'bg-purple-50', 'text-purple-600');
                btn.classList.add('text-gray-500');
            });
            document.body.classList.remove('anno-pen', 'anno-pixel-eraser', 'anno-stroke-eraser', 'anno-select');

            if (tool === 'select') {
                els.toolSelect.classList.add('bg-purple-50', 'text-purple-600');
                els.toolSelect.classList.remove('text-gray-500');
                document.body.classList.add('anno-select');
            } else if (tool === 'pen') {
                els.toolPen.classList.add('bg-blue-50', 'text-blue-600');
                els.toolPen.classList.remove('text-gray-500');
                document.body.classList.add('anno-pen');
            } else if (tool === 'eraser-pixel') {
                els.toolEraserPixel.classList.add('bg-blue-50', 'text-blue-600');
                els.toolEraserPixel.classList.remove('text-gray-500');
                document.body.classList.add('anno-pixel-eraser');
            } else if (tool === 'eraser-stroke') {
                els.toolEraserStroke.classList.add('bg-blue-50', 'text-blue-600');
                els.toolEraserStroke.classList.remove('text-gray-500');
                document.body.classList.add('anno-stroke-eraser');
            }
        }

        async function clearAllData() {
            if (confirm("Are you sure? This will delete all uploaded PDFs, links, and annotations permanently.")) {
                await clearDB();
                state.documents = {};
                state.links = [];
                state.annotations = {};
                state.imageCache = {};
                state.view.left = { docId: null, pageNum: 1, scale: 1.5, scrollTop: 0 };
                state.view.right = { docId: null, pageNum: 1, scale: 1.5, scrollTop: 0 };
                state.lastActiveSide = 'left';
                renderDocList();
                renderPage('left');
                renderPage('right');
                els.emptyMsg.style.display = 'block';
                showModal("Success", "All data cleared.");
            }
        }

        async function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            for (const file of files) {
                const id = 'doc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                    const page = await pdfDoc.getPage(1);
                    const viewport = page.getViewport({ scale: 0.2 }); 
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    const thumbData = canvas.toDataURL();

                    const docObj = { id, file, pdfDoc, name: file.name, pageCount: pdfDoc.numPages, thumbnail: thumbData };
                    state.documents[id] = docObj;
                    await saveDocumentToDB({ id: docObj.id, name: docObj.name, pageCount: docObj.pageCount, thumbnail: docObj.thumbnail, fileBlob: file });

                    if (!state.view.left.docId) setActiveDocument('left', id);
                    else if (!state.view.right.docId) setActiveDocument('right', id);

                } catch (err) {
                    console.error("Error loading PDF:", err);
                    showModal("Error", `Could not load ${file.name}`);
                }
            }
            renderDocList();
            els.uploadInput.value = ''; 
        }

        // --- Image Handling ---

        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            addImageToSide(file, state.lastActiveSide);
            e.target.value = '';
        }

        function handlePaste(e) {
            if (state.appMode !== 'annotation') return;
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    let targetSide = state.lastActiveSide; 
                    const wrapper = e.target.closest('.pdf-canvas-container') || e.target.closest('#left-canvas-wrapper') || e.target.closest('#right-canvas-wrapper');
                    if (wrapper) {
                        if (wrapper.id === 'left-canvas-wrapper' || wrapper.id === 'left-viewport') targetSide = 'left';
                        else if (wrapper.id === 'right-canvas-wrapper' || wrapper.id === 'right-viewport') targetSide = 'right';
                    }
                    if (state.view[targetSide] && state.view[targetSide].docId) addImageToSide(blob, targetSide);
                    else {
                        const otherSide = targetSide === 'left' ? 'right' : 'left';
                        if (state.view[otherSide].docId) addImageToSide(blob, otherSide);
                    }
                    e.preventDefault();
                    return;
                }
            }
        }

        async function addImageToSide(fileOrBlob, side) {
            if (!side || !state.view[side].docId) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result;
                const id = 'img_' + Date.now();
                
                const imgObj = new Image();
                imgObj.src = base64;
                imgObj.onload = () => {
                    const canvasWidth = els[side + 'Canvas'].width;
                    const newW = 0.3;
                    const aspect = imgObj.height / imgObj.width;
                    const newH = newW * aspect;

                    const newImage = {
                        id,
                        src: base64,
                        x: 0.35, 
                        y: 0.35,
                        w: newW,
                        h: newH
                    };

                    const docId = state.view[side].docId;
                    const pageNum = state.view[side].pageNum;
                    if (!state.annotations[docId]) state.annotations[docId] = {};
                    if (!state.annotations[docId][pageNum]) state.annotations[docId][pageNum] = { strokes: [], images: [] };
                    
                    state.annotations[docId][pageNum].images.push(newImage);
                    state.imageCache[id] = imgObj;
                    
                    clearSelection();
                    state.selection = {
                        active: true,
                        side: side,
                        mode: 'idle',
                        selectedImages: [newImage],
                        selectedStrokes: [],
                        boundingBox: { x: newImage.x, y: newImage.y, w: newImage.w, h: newImage.h }
                    };

                    saveAnnotationsToDB(docId, state.annotations[docId]);
                    renderAnnotations(side);
                }
            };
            reader.readAsDataURL(fileOrBlob);
        }

        function renderDocList() {
            els.docList.innerHTML = '';
            const docIds = Object.keys(state.documents);
            
            if (docIds.length === 0) {
                els.emptyMsg.style.display = 'block';
                return;
            }
            els.emptyMsg.style.display = 'none';

            docIds.forEach(id => {
                const doc = state.documents[id];
                const isActiveLeft = state.view.left.docId === id;
                const isActiveRight = state.view.right.docId === id;

                const item = document.createElement('div');
                item.className = `p-2 rounded-lg cursor-pointer border transition-all flex items-center gap-3 ${
                    (isActiveLeft || isActiveRight) ? 'bg-blue-50 border-blue-200' : 'hover:bg-gray-50 border-transparent bg-white'
                }`;
                
                let badges = '';
                if (isActiveLeft) badges += `<span class="text-[10px] bg-blue-500 text-white px-1.5 py-0.5 rounded ml-auto">L</span>`;
                if (isActiveRight) badges += `<span class="text-[10px] bg-green-500 text-white px-1.5 py-0.5 rounded ml-auto">R</span>`;

                item.innerHTML = `
                    <img src="${doc.thumbnail}" class="w-10 h-12 object-cover rounded border border-gray-200 bg-gray-100">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium text-gray-800 truncate">${doc.name}</div>
                        <div class="text-xs text-gray-500">${doc.pageCount} pages</div>
                    </div>
                    ${badges}
                `;

                item.onclick = () => {
                    if (isActiveLeft) setActiveDocument('right', id);
                    else if (isActiveRight) setActiveDocument('left', id);
                    else {
                        if (!state.view.left.docId) setActiveDocument('left', id);
                        else setActiveDocument('right', id);
                    }
                    renderDocList();
                };
                els.docList.appendChild(item);
            });
        }

        function setActiveDocument(side, docId, render = true) {
            state.view[side].docId = docId;
            state.view[side].pageNum = 1;
            state.view[side].scrollTop = 0; 
            state.lastActiveSide = side;
            clearSelection();
            closeViewportSearch(side); 
            saveSettings(); 
            if (render) {
                renderPage(side);
                renderDocList();
            }
        }

        async function renderPage(side) {
            const viewState = state.view[side];
            const docId = viewState.docId;
            const canvas = els[side + 'Canvas'];
            const ctx = canvas.getContext('2d');
            const annoCanvas = els[side + 'AnnoCanvas'];
            const annoCtx = annoCanvas.getContext('2d');
            const textLayer = els[side + 'TextLayer'];

            if (!docId || !state.documents[docId]) {
                canvas.width = 0; canvas.height = 0;
                annoCanvas.width = 0; annoCanvas.height = 0;
                textLayer.innerHTML = '';
                els[side + 'Title'].innerText = 'None';
                els[side + 'PageInd'].innerText = '-- / --';
                document.getElementById(side + '-markers-layer').innerHTML = '';
                return;
            }

            const doc = state.documents[docId];
            els[side + 'Title'].innerText = doc.name;
            els[side + 'PageInd'].innerText = `${viewState.pageNum} / ${doc.pageCount}`;

            try {
                const page = await doc.pdfDoc.getPage(viewState.pageNum);
                const scale = viewState.scale || 1.5;
                const viewport = page.getViewport({ scale: scale }); 

                canvas.width = viewport.width; canvas.height = viewport.height;
                annoCanvas.width = viewport.width; annoCanvas.height = viewport.height;

                const wrapper = els[side + 'Wrapper'];
                wrapper.style.width = `${viewport.width}px`;
                wrapper.style.height = `${viewport.height}px`;

                // Render PDF
                const renderContext = { canvasContext: ctx, viewport: viewport };
                await page.render(renderContext).promise;

                // Render Text Layer
                const textContent = await page.getTextContent();
                renderTextLayerCustom(textContent, textLayer, viewport);

                // Re-run search if query exists
                const searchInput = document.getElementById(`${side}-search-input`);
                if (!searchInput.classList.contains('hidden') && searchInput.value) {
                    renderSearchHighlights(side);
                }

                const viewportEl = els[side + 'Viewport'];
                if (viewState.scrollTop) viewportEl.scrollTop = viewState.scrollTop;

                renderMarkersForView(side);
                renderAnnotations(side); 
            } catch (err) {
                console.error("Error rendering page:", err);
            }
        }

        function navigatePage(side, delta) {
            const viewState = state.view[side];
            if (!viewState.docId) return;
            const doc = state.documents[viewState.docId];
            const newPage = viewState.pageNum + delta;
            if (newPage >= 1 && newPage <= doc.pageCount) {
                viewState.pageNum = newPage;
                viewState.scrollTop = 0; 
                state.lastActiveSide = side;
                clearSelection();
                saveSettings(); 
                renderPage(side);
            }
        }

        // --- Selection & Group Logic ---

        function clearSelection() {
            state.selection = {
                active: false,
                side: null,
                mode: 'idle',
                marqueeStart: null,
                marqueeCurrent: null,
                selectedImages: [],
                selectedStrokes: [],
                boundingBox: null
            };
        }

        function getStrokeBounds(stroke) {
            if (!stroke.points || stroke.points.length === 0) return { x: 0, y: 0, w: 0, h: 0 };
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            stroke.points.forEach(p => {
                if(p.x < minX) minX = p.x;
                if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y;
                if(p.y > maxY) maxY = p.y;
            });
            return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
        }

        function rectsIntersect(r1, r2) {
            return !(r2.x > r1.x + r1.w || 
                     r2.x + r2.w < r1.x || 
                     r2.y > r1.y + r1.h || 
                     r2.y + r2.h < r1.y);
        }

        // --- Annotation & Image Rendering Logic ---

        function renderAnnotations(side) {
            const viewState = state.view[side];
            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            const pageData = (state.annotations[viewState.docId] && state.annotations[viewState.docId][viewState.pageNum]) || { strokes: [], images: [] };
            
            // 1. Draw Images
            pageData.images.forEach(img => {
                const imgObj = state.imageCache[img.id];
                if (imgObj) {
                    ctx.drawImage(imgObj, img.x * width, img.y * height, img.w * width, img.h * height);
                }
            });

            // 2. Draw Strokes
            pageData.strokes.forEach(stroke => {
                ctx.beginPath();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (stroke.tool === 'eraser-pixel') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = stroke.size * width; 
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = stroke.color;
                    ctx.lineWidth = stroke.size * width; 
                }

                if (stroke.points.length > 0) {
                    const p0 = stroke.points[0];
                    ctx.moveTo(p0.x * width, p0.y * height);
                    for (let i = 1; i < stroke.points.length; i++) {
                        const p = stroke.points[i];
                        ctx.lineTo(p.x * width, p.y * height);
                    }
                }
                ctx.stroke();
            });
            ctx.globalCompositeOperation = 'source-over';

            // 3. Draw Marquee Selection (Dotted Blue Line)
            if (state.selection.active && state.selection.side === side && state.selection.mode === 'marquee') {
                const start = state.selection.marqueeStart;
                const curr = state.selection.marqueeCurrent;
                const x = Math.min(start.x, curr.x) * width;
                const y = Math.min(start.y, curr.y) * height;
                const w = Math.abs(curr.x - start.x) * width;
                const h = Math.abs(curr.y - start.y) * height;

                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = 'rgba(59, 130, 246, 0.1)';
                ctx.fillRect(x, y, w, h);
                ctx.setLineDash([]);
            }

            // 4. Draw Group Selection Bounding Box
            if (state.selection.active && state.selection.side === side && (state.selection.mode === 'idle' || state.selection.mode === 'dragging' || state.selection.mode === 'resizing')) {
                const bbox = state.selection.boundingBox;
                if (bbox) {
                    const sx = bbox.x * width;
                    const sy = bbox.y * height;
                    const sw = bbox.w * width;
                    const sh = bbox.h * height;

                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([]);
                    ctx.strokeRect(sx, sy, sw, sh);

                    ctx.fillStyle = '#3b82f6';
                    ctx.fillRect(sx + sw - 8, sy + sh - 8, 16, 16);
                }
            }
        }

        function startAnnotationStroke(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            
            if (!state.annotations[docId]) state.annotations[docId] = {};
            if (!state.annotations[docId][pageNum]) state.annotations[docId][pageNum] = { strokes: [], images: [] };

            const normalizedSize = state.annoThickness / 1000; 

            const newStroke = {
                tool: state.annoTool,
                color: state.annoColor,
                size: normalizedSize,
                points: [{ x, y }]
            };

            state.annotations[docId][pageNum].strokes.push(newStroke);
            
            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.beginPath();
            ctx.lineCap = 'round';
            if (state.annoTool === 'eraser-pixel') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = normalizedSize * width;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = state.annoColor;
                ctx.lineWidth = normalizedSize * width;
            }
            ctx.moveTo(x * width, y * height);
            ctx.lineTo(x * width, y * height);
            ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';
        }

        function continueAnnotationStroke(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            const strokes = state.annotations[docId][pageNum].strokes;
            const currentStroke = strokes[strokes.length - 1];
            
            currentStroke.points.push({ x, y });

            const canvas = els[side + 'AnnoCanvas'];
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const pts = currentStroke.points;

            ctx.beginPath();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (state.annoTool === 'eraser-pixel') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = currentStroke.size * width;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentStroke.color;
                ctx.lineWidth = currentStroke.size * width;
            }

            const prev = pts[pts.length - 2];
            ctx.moveTo(prev.x * width, prev.y * height);
            ctx.lineTo(x * width, y * height);
            ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';
        }

        function finishAnnotationStroke(side) {
            const docId = state.view[side].docId;
            saveAnnotationsToDB(docId, state.annotations[docId]);
        }

        // --- Stroke Eraser Logic ---

        function distToSegmentSquared(p, v, w) {
            const l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 === 0) return (p.x - v.x)**2 + (p.y - v.y)**2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x)))**2 + 
                   (p.y - (v.y + t * (w.y - v.y)))**2;
        }

        function deleteStrokeAt(side, x, y) {
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            
            if (!state.annotations[docId] || !state.annotations[docId][pageNum]) return;

            const strokes = state.annotations[docId][pageNum].strokes;
            const threshold = 0.0002; 

            let foundIndex = -1;

            for (let i = strokes.length - 1; i >= 0; i--) {
                const stroke = strokes[i];
                if (stroke.tool === 'eraser-pixel') continue;

                for (let j = 0; j < stroke.points.length - 1; j++) {
                    const p1 = stroke.points[j];
                    const p2 = stroke.points[j+1];
                    if (distToSegmentSquared({x, y}, p1, p2) < threshold) {
                        foundIndex = i;
                        break;
                    }
                }
                if (foundIndex !== -1) break;
            }

            if (foundIndex !== -1) {
                strokes.splice(foundIndex, 1);
                renderAnnotations(side);
                return true; 
            }
            return false;
        }

        function handleKeyDown(e) {
            if ((e.key === 'Delete' || e.key === 'Backspace') && state.selection.active) {
                const side = state.selection.side;
                const docId = state.view[side].docId;
                const pageNum = state.view[side].pageNum;
                
                if (!state.annotations[docId] || !state.annotations[docId][pageNum]) return;
                const pageData = state.annotations[docId][pageNum];

                state.selection.selectedImages.forEach(imgObj => {
                    const idx = pageData.images.indexOf(imgObj);
                    if(idx > -1) {
                        pageData.images.splice(idx, 1);
                        delete state.imageCache[imgObj.id];
                    }
                });

                state.selection.selectedStrokes.forEach(strokeObj => {
                    const idx = pageData.strokes.indexOf(strokeObj);
                    if(idx > -1) pageData.strokes.splice(idx, 1);
                });

                clearSelection();
                saveAnnotationsToDB(docId, state.annotations[docId]);
                renderAnnotations(side);
            }
        }

        function undoLastStroke() {
            const docId = state.view.left.docId || state.view.right.docId;
            if (!docId) return;

            const leftPage = state.view.left.pageNum;
            const rightPage = state.view.right.pageNum;
            
            let changed = false;

            const undoOnView = (side, dId, pNum) => {
                const pageData = state.annotations[dId] && state.annotations[dId][pNum];
                if (pageData && pageData.strokes && pageData.strokes.length > 0) {
                    pageData.strokes.pop();
                    saveAnnotationsToDB(dId, state.annotations[dId]);
                    renderAnnotations(side);
                    changed = true;
                }
            };

            if (state.view.left.docId === docId) undoOnView('left', docId, leftPage);
            if (state.view.right.docId === docId) undoOnView('right', docId, rightPage);

            if (!changed) {
                 if(state.view.left.docId) undoOnView('left', state.view.left.docId, state.view.left.pageNum);
                 if(state.view.right.docId) undoOnView('right', state.view.right.docId, state.view.right.pageNum);
            }
        }

        function clearCurrentPageAnnotations() {
            if(!confirm("Clear all annotations and images on the current page(s)?")) return;

            const clearView = (side, dId, pNum) => {
                if (dId && state.annotations[dId]) {
                    state.annotations[dId][pNum] = { strokes: [], images: [] };
                    saveAnnotationsToDB(dId, state.annotations[dId]);
                    renderAnnotations(side);
                }
            };
            clearView('left', state.view.left.docId, state.view.left.pageNum);
            clearView('right', state.view.right.docId, state.view.right.pageNum);
        }

        // --- PDF Manipulation ---

        async function insertPage(side, type) {
            const docId = state.view[side].docId;
            if (!docId) { showModal("Error", "No document loaded."); return; }

            const insertIndex = state.view[side].pageNum;
            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Processing PDF...";

            try {
                const originalDoc = state.documents[docId];
                const arrayBuffer = await originalDoc.file.arrayBuffer();
                const pdfLibDoc = await PDFDocument.load(arrayBuffer);

                const pages = pdfLibDoc.getPages();
                const refPageIndex = Math.max(0, Math.min(insertIndex - 1, pages.length - 1));
                const refPage = pages[refPageIndex];
                const { width, height } = refPage.getSize();

                if (type === 'blank') {
                    pdfLibDoc.insertPage(insertIndex, [width, height]);
                } else if (type === 'duplicate') {
                    const [copiedPage] = await pdfLibDoc.copyPages(pdfLibDoc, [refPageIndex]);
                    pdfLibDoc.insertPage(insertIndex, copiedPage);
                }

                const newPdfBytes = await pdfLibDoc.save();
                const newBlob = new Blob([newPdfBytes], { type: 'application/pdf' });

                // Shift Annotations
                if (state.annotations[docId]) {
                    const newAnnoMap = {};
                    Object.keys(state.annotations[docId]).forEach(key => {
                        const pageNum = parseInt(key);
                        if (pageNum > insertIndex) {
                            newAnnoMap[pageNum + 1] = state.annotations[docId][pageNum];
                        } else {
                            newAnnoMap[pageNum] = state.annotations[docId][pageNum];
                        }
                    });
                    state.annotations[docId] = newAnnoMap;
                    await saveAnnotationsToDB(docId, state.annotations[docId]);
                }

                // Shift Links
                const updatedLinks = [];
                for (const link of state.links) {
                    const updatePoint = (pt) => {
                        if (pt.docId === docId && pt.page > insertIndex) {
                            return { ...pt, page: pt.page + 1 };
                        }
                        return pt;
                    };
                    const newLink = {
                        ...link,
                        source: updatePoint(link.source),
                        target: updatePoint(link.target)
                    };
                    updatedLinks.push(newLink);
                    await saveLinkToDB(newLink);
                }
                state.links = updatedLinks;

                // Reload Document
                const newPdfJsDoc = await pdfjsLib.getDocument(newPdfBytes).promise;

                state.documents[docId].file = newBlob;
                state.documents[docId].pdfDoc = newPdfJsDoc;
                state.documents[docId].pageCount = newPdfJsDoc.numPages;

                await saveDocumentToDB({
                    id: docId,
                    name: originalDoc.name,
                    pageCount: newPdfJsDoc.numPages,
                    thumbnail: originalDoc.thumbnail,
                    fileBlob: newBlob
                });

                state.view[side].pageNum = insertIndex + 1;
                
                renderPage(side);
                renderDocList();
                showModal("Success", `${type === 'blank' ? 'Blank' : 'Duplicated'} page added.`);

            } catch (err) {
                console.error(err);
                showModal("Error", "Failed to process PDF.");
            } finally {
                els.loadingSpinner.classList.add('hidden');
            }
        }

        // --- Project Save/Load ---

        async function exportProject() {
            const docKeys = Object.keys(state.documents);
            if (docKeys.length === 0) {
                showModal("Export", "No documents loaded.");
                return;
            }

            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Creating ZIP...";

            try {
                const zip = new JSZip();

                const metadata = {
                    version: "2.3", 
                    timestamp: Date.now(),
                    links: state.links,
                    annotations: state.annotations,
                    splitRatio: state.splitRatio,
                    settings: {
                        id: 'appState',
                        view: state.view,
                        appMode: state.appMode,
                        annoTool: state.annoTool,
                        annoColor: state.annoColor,
                        annoThickness: state.annoThickness
