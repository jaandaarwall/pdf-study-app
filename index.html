<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Linker Studio (AI + SQLite Storage)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- PDF-Lib (For Editing) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- SQL.js (For Project Storage) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <!-- FileSaver.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Scrollbar & Layout Styles --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        .pdf-canvas {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
            display: block;
        }

        /* --- Text Layer --- */
        .textLayer {
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden; line-height: 1.0; opacity: 1; z-index: 20; mix-blend-mode: multiply;
        }
        .textLayer > span {
            color: transparent; position: absolute; white-space: pre; cursor: text;
            transform-origin: 0% 0%; font-family: sans-serif;
        }
        .textLayer ::selection { background: rgba(59, 130, 246, 0.3); color: transparent; }

        body:not(.linking-mode):not(.annotation-mode):not(.delete-link-mode) .textLayer { user-select: text; }
        body.linking-mode .textLayer, body.annotation-mode .textLayer, body.delete-link-mode .textLayer { user-select: none; }
        body.linking-mode .textLayer span { cursor: crosshair !important; }
        body.annotation-mode .textLayer { pointer-events: none; }
        body:not(.annotation-mode) .textLayer span { cursor: text; }

        /* --- Search Highlights --- */
        .search-highlight-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 25; pointer-events: none; }
        .search-highlight {
            background-color: rgba(255, 255, 0, 0.4); position: absolute;
            border: 1px solid rgba(255, 200, 0, 0.6);
        }
        .search-highlight.active {
            background-color: rgba(255, 100, 0, 0.5); border: 2px solid rgb(255, 69, 0); z-index: 26;
        }

        /* Citation Highlight Style */
        .citation-highlight {
            background-color: rgba(236, 72, 153, 0.4); /* Pink-500 */
            border: 2px solid rgba(219, 39, 119, 0.8);
            position: absolute;
            pointer-events: none;
            z-index: 27;
        }

        /* --- Annotation Canvas --- */
        .annotation-canvas { position: absolute; top: 0; left: 0; z-index: 55; pointer-events: none; touch-action: none; }
        body.annotation-mode .annotation-canvas { pointer-events: auto; }
        body.anno-pen .annotation-canvas, body.anno-pixel-eraser .annotation-canvas { cursor: crosshair; }
        body.anno-stroke-eraser .annotation-canvas { cursor: grab; }
        body.anno-stroke-eraser .annotation-canvas:active { cursor: grabbing; }
        body.anno-select .annotation-canvas { cursor: default; }
        body.anno-select .annotation-canvas:active { cursor: grabbing; }

        /* --- Text Box Styles --- */
        .text-box {
            position: absolute; background: transparent; border: 1px dashed #9ca3af; z-index: 60;
            cursor: text; overflow: hidden; padding: 4px; font-family: sans-serif;
            line-height: 1.2; word-wrap: break-word; white-space: pre-wrap; box-sizing: border-box;
        }
        .text-box:focus { outline: none; border: 1px solid #3b82f6; }
        
        body.anno-text .text-box:hover::before, body.anno-text .text-box:focus::before,
        body.anno-text .text-box:hover::after, body.anno-text .text-box:focus::after { opacity: 1; }

        .text-box::before {
            content: ''; position: absolute; top: -6px; left: -6px; width: 12px; height: 12px;
            background-color: #3b82f6; border: 1px solid white; border-radius: 50%;
            cursor: move; opacity: 0; transition: opacity 0.2s; pointer-events: auto; z-index: 61;
        }
        .text-box::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 0; height: 0;
            border-style: solid; border-width: 0 0 12px 12px;
            border-color: transparent transparent #3b82f6 transparent;
            cursor: nwse-resize; opacity: 0; transition: opacity 0.2s; pointer-events: auto; z-index: 61;
        }

        body.anno-select .text-box.selected { border: 2px solid #3b82f6; cursor: move; }
        body.anno-select .text-box.selected::after { opacity: 1; background-color: #3b82f6; }

        /* --- Link Styles --- */
        body.delete-link-mode .link-marker { cursor: pointer !important; }
        body.delete-link-mode .link-marker:hover {
            background-color: #dc2626 !important; border-color: #991b1b !important;
            transform: translate(-50%, -50%) scale(1.2) rotate(45deg);
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.8);
        }
        .link-marker {
            position: absolute; width: 28px; height: 28px; background-color: #ef4444;
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: auto !important; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            z-index: 59; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: white; transition: all 0.2s ease-in-out;
        }
        .link-marker:hover { background-color: #dc2626; transform: translate(-50%, -50%) scale(1.15); z-index: 61; }
        
        @keyframes markerPulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.4); box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .marker-active { background-color: #3b82f6 !important; z-index: 100; animation: markerPulse 2s infinite; }

        /* --- Sidebar & UI Elements --- */
        .doc-item-actions { opacity: 0; transition: opacity 0.2s; display: flex; gap: 4px; }
        .group:hover .doc-item-actions { opacity: 1; }
        .action-btn { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .action-rename { background: #e0f2fe; color: #0369a1; }
        .action-rename:hover { background: #bae6fd; }
        .action-delete { background: #fee2e2; color: #b91c1c; }
        .action-delete:hover { background: #fecaca; }
        .rename-input { width: 100%; padding: 2px 4px; font-size: 0.875rem; border: 1px solid #3b82f6; border-radius: 4px; outline: none; background-color: white; }
        .modal-backdrop { background-color: rgba(0,0,0,0.5); }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #09f; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #vertical-resizer { background-color: #e5e7eb; width: 6px; cursor: col-resize; transition: background-color 0.2s; z-index: 30; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        #vertical-resizer:hover, #vertical-resizer.resizing { background-color: #3b82f6; }
        #vertical-resizer::after { content: ''; width: 2px; height: 20px; background-color: #9ca3af; border-radius: 1px; }
        #vertical-resizer:hover::after { background-color: white; }
        body.resizing-active { user-select: none; cursor: col-resize; }
        body.resizing-active * { cursor: col-resize !important; }
        .search-result-item { cursor: pointer; }
        .search-result-item:hover { background-color: #f3f4f6; }
        body.anno-text .annotation-canvas { cursor: text; }

        /* --- Sidebar Toggles --- */
        #left-sidebar {
            width: 16rem; /* w-64 */
            transition: width 0.3s ease-in-out, padding 0.3s ease;
            position: relative;
        }
        body.left-sidebar-collapsed #left-sidebar {
            width: 0 !important;
            min-width: 0 !important;
            padding: 0 !important;
            border: none !important;
            overflow: hidden;
        }
        body.left-sidebar-collapsed .toggle-left-btn i { transform: rotate(180deg); }

        /* --- AI Sidebar Styles --- */
        #ai-sidebar {
            width: 320px;
            transition: width 0.3s ease-in-out;
            display: flex; flex-direction: column;
        }
        body.ai-sidebar-collapsed #ai-sidebar { width: 0 !important; overflow: hidden; padding: 0; border: none; }
        body.ai-sidebar-collapsed .toggle-ai-btn i { transform: rotate(180deg); }

        #chat-history { scroll-behavior: smooth; flex: 1; overflow-y: auto; }
        .ai-message { display: flex; flex-direction: column; max-width: 90%; animation: fadeIn 0.3s ease; margin-bottom: 12px; }
        .ai-message.user { align-self: flex-end; align-items: flex-end; }
        .ai-message.assistant { align-self: flex-start; align-items: flex-start; }
        .ai-bubble { padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; line-height: 1.4; word-wrap: break-word; }
        .ai-message.user .ai-bubble { background-color: #3b82f6; color: white; border-bottom-right-radius: 0; }
        .ai-message.assistant .ai-bubble { background-color: #f3f4f6; color: #1f2937; border-bottom-left-radius: 0; border: 1px solid #e5e7eb; }
        
        /* Citation Buttons in Chat */
        .citation-chip {
            display: inline-block; background-color: #eff6ff; color: #2563eb;
            font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; cursor: pointer;
            margin: 0 2px; vertical-align: middle; text-decoration: none;
            border: 1px solid #bfdbfe; transition: all 0.2s; font-weight: bold;
        }
        .citation-chip:hover { background-color: #2563eb; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Chat List Styles */
        .chat-list-item {
            padding: 8px 12px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.85rem;
            color: #374151;
            position: relative;
        }
        .chat-list-item:hover { background-color: #f9fafb; }
        .chat-list-item.active { background-color: #eff6ff; color: #2563eb; font-weight: 600; border-left: 3px solid #2563eb; }
        .chat-item-actions {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            opacity: 0; transition: opacity 0.2s; display: flex; gap: 4px;
        }
        .chat-list-item:hover .chat-item-actions { opacity: 1; }                
        /* --- Tool Cursor Styles --- */
        #tool-cursor {
            font-size: 24px;
            color: #374151; /* Default gray-700 */
            /* Offset to align tip with mouse cursor point */
            transform: translate(-5px, -20px) rotate(-45deg); 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            transition: opacity 0.1s ease;
        }

        /* Highlighter specific styling */
        #tool-cursor.mode-highlighter {
            color: #ca8a04; /* Yellow-600 */
            transform: translate(-1px, -2px) rotate(-270deg); 
        }

        /* Eraser specific styling */
        #tool-cursor.mode-eraser {
            color: #9ca3af; /* Gray-400 */
            transform: translate(-1px, -2px) rotate(-270deg); 
        }

        /* Hide default cursor when tool is active */
        .cursor-none { 
            cursor: none !important; 
        }
        /* Pen specific styling */
        #tool-cursor.mode-pen {
            transform: translate(-1px, -2px) rotate(-270deg); 
        }
        /* --- Fix for double cursor (Pen/Eraser Crosshair) --- */
        /* Force hide default cursor on all canvas layers when 'cursor-none' class is active */
        body.cursor-none .pdf-canvas,
        body.cursor-none .annotation-canvas,
        body.cursor-none .textLayer,
        body.cursor-none .pdf-canvas-container {
            cursor: none !important;
        }

    </style>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument } = PDFLib;
    </script>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden text-gray-800 font-sans">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-4 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <!-- Left Sidebar Toggle -->
            <button onclick="toggleLeftSidebar()" class="toggle-left-btn w-8 h-8 rounded hover:bg-gray-100 text-gray-500 transition-transform" title="Toggle Documents Sidebar">
                <i class="fa-solid fa-bars"></i>
            </button>

            <i class="fa-solid fa-file-pdf text-red-500 text-2xl"></i>
            <div>
                <h1 class="text-xl font-bold text-gray-800 leading-tight">PDF Linker Studio</h1>
                <p class="text-[10px] text-green-600 font-medium"><i class="fa-solid fa-check-circle"></i> Ready</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <!-- Mode Switcher -->
            <div class="flex bg-gray-100 rounded-lg p-1">
                <button id="mode-nav-btn" class="px-3 py-1.5 rounded-md text-sm font-medium bg-white shadow-sm text-gray-800 transition-all" onclick="setAppMode('navigation')" title="Navigate Mode">
                    <i class="fa-solid fa-arrow-pointer"></i>
                </button>
                <button id="mode-link-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" onclick="setAppMode('linking')" title="Draw Link Mode">
                    <i class="fa-solid fa-link"></i>
                </button>
                <button id="mode-del-link-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all relative" onclick="setAppMode('delete-link')" title="Delete Link Mode (Click links to delete)">
                    <i class="fa-solid fa-eraser"></i>
                    <i class="fa-solid fa-link absolute -bottom-0.5 -right-0.5 text-[8px] text-red-500 bg-white rounded-full"></i>
                </button>
                <button id="mode-anno-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" onclick="setAppMode('annotation')" title="Annotation Mode">
                    <i class="fa-solid fa-pen"></i>
                </button>
            </div>

            <!-- Annotation Sub-Tools -->
            <div id="anno-tools" class="hidden flex items-center gap-1 bg-white border border-gray-200 rounded-lg px-2 py-1 shadow-sm">
                <button id="tool-select" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('select')" title="Select / Group / Move / Resize">
                    <i class="fa-solid fa-object-group"></i>
                </button>
                <button id="tool-pen" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('pen')" title="Pen">
                    <i class="fa-solid fa-pen-nib"></i>
                </button>
                <button id="tool-text" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('text')" title="Add Text Box">
                    <i class="fa-solid fa-font"></i>
                </button>
                <button id="tool-eraser-pixel" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('eraser-pixel')" title="Pixel Eraser">
                    <i class="fa-solid fa-eraser"></i>
                </button>
                <button id="tool-eraser-stroke" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('eraser-stroke')" title="Stroke Eraser (Swipe to Delete)">
                    <i class="fa-solid fa-ban"></i>
                </button>
                <button id="tool-highlighter" class="w-8 h-8 rounded flex items-center justify-center text-yellow-600 hover:bg-yellow-50 transition-colors" onclick="setAnnoTool('highlighter')" title="Highlighter">
                    <i class="fa-solid fa-highlighter"></i>
                </button>
                
                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <button onclick="document.getElementById('image-upload').click()" class="w-8 h-8 rounded flex items-center justify-center text-purple-600 hover:bg-purple-50 transition-colors" title="Add Image">
                    <i class="fa-regular fa-image"></i>
                </button>
                <input type="file" id="image-upload" class="hidden" accept="image/*">
                
                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <div class="relative w-8 h-8 overflow-hidden rounded-full border border-gray-300 shadow-sm cursor-pointer" title="Pen Color">
                    <input type="color" id="color-picker" class="absolute -top-2 -left-2 w-12 h-12 p-0 border-0 cursor-pointer" value="#ef4444">
                </div>

                <div class="flex items-center gap-1 mx-1 w-auto" title="Pen Thickness">
                    <i class="fa-solid fa-circle text-[8px] text-gray-400"></i>
                    <input type="range" id="thickness-picker" min="1" max="20" value="5" class="w-20 h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <i class="fa-solid fa-circle text-sm text-gray-400"></i>
                    <span id="thickness-val" class="text-xs font-mono text-gray-600 w-6 text-center">5</span>
                </div>

                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <button onclick="deleteSelection()" class="w-8 h-8 rounded flex items-center justify-center text-red-600 hover:bg-red-50 hover:text-red-700 transition-colors" title="Delete Selection">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
                <button onclick="undoLastStroke()" class="w-8 h-8 rounded flex items-center justify-center text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors" title="Undo Last Line">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
                <button onclick="clearCurrentPageAnnotations()" class="w-8 h-8 rounded flex items-center justify-center text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors" title="Clear Page">
                    <i class="fa-solid fa-file-circle-xmark"></i>
                </button>
            </div>

            <div class="h-8 w-px bg-gray-300 mx-2"></div>
            
            <button onclick="exportProject()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-3 py-1.5 rounded shadow-sm flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <label class="text-gray-600 hover:text-blue-600 font-medium text-sm flex items-center gap-2 cursor-pointer border border-gray-200 hover:border-blue-300 px-3 py-1.5 rounded bg-white transition-colors">
                <i class="fa-solid fa-folder-open"></i> Open
                <input type="file" id="import-project-input" class="hidden" accept=".sqlite">
            </label>

            <div class="h-8 w-px bg-gray-300 mx-2"></div>

            <!-- AI Toggle in Header -->
            <button onclick="toggleAiSidebar()" class="toggle-ai-btn bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-200 px-3 py-1.5 rounded shadow-sm flex items-center gap-2 transition-transform font-medium text-sm" title="Toggle AI Sidebar">
                <i class="fa-solid fa-robot"></i> <span>AI</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Left Sidebar -->
        <aside id="left-sidebar" class="bg-white border-r border-gray-200 flex flex-col shrink-0 z-10 w-64">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Documents</h2>
                <label class="flex items-center justify-center w-full h-12 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-colors group">
                    <span class="text-sm text-gray-500 group-hover:text-blue-500">
                        <i class="fa-solid fa-plus mr-1"></i> Import PDFs
                    </span>
                    <input type="file" id="pdf-upload-input" class="hidden" accept=".pdf" multiple>
                </label>
            </div>

            <!-- Global Search -->
            <div class="px-3 py-2 border-b border-gray-100 bg-gray-50/50">
                <div class="relative">
                    <input type="text" id="global-search-input" placeholder="Search all docs..." class="w-full pl-8 pr-2 py-1.5 text-xs border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <i class="fa-solid fa-magnifying-glass absolute left-2.5 top-2 text-gray-400 text-xs"></i>
                </div>
                <div id="global-search-results" class="mt-2 max-h-40 overflow-y-auto hidden"></div>
            </div>
            
            <div id="doc-list" class="flex-1 overflow-y-auto p-2 space-y-2">
                <div id="loading-spinner" class="hidden flex flex-col items-center justify-center mt-10">
                    <div class="spinner mb-2"></div>
                    <span class="text-xs text-gray-500">Processing...</span>
                </div>
                <div class="text-center mt-10 text-gray-400 text-sm italic" id="empty-state-msg">
                    No PDFs imported yet.
                </div>
            </div>

            <div class="p-4 bg-gray-50 border-t border-gray-200">
                <button onclick="clearAllData()" class="w-full py-2 text-xs font-bold text-red-600 border border-red-200 rounded bg-red-50 hover:bg-red-100 transition-colors">
                    <i class="fa-solid fa-trash mr-1"></i> Clear All Data
                </button>
            </div>
        </aside>

        <!-- Workspace (Split View) -->
        <main class="flex-1 flex bg-gray-200 overflow-hidden relative" id="workspace-main">
            
            <!-- Left Viewport -->
            <div id="left-panel" class="flex flex-col border-r border-gray-300 relative min-w-0 group" style="width: 50%;">
                <div class="h-10 bg-white border-b border-gray-300 flex items-center justify-between px-4 shrink-0 z-10">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-gray-600 truncate w-24" id="left-view-title">None</span>
                        <div class="relative group/search">
                            <input type="text" id="left-search-input" placeholder="Find..." class="hidden pl-6 pr-2 py-0.5 text-[10px] border border-gray-300 rounded w-24 focus:w-32 transition-all focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <button id="left-search-toggle" onclick="toggleViewportSearch('left')" class="w-6 h-6 rounded hover:bg-gray-100 flex items-center justify-center text-gray-500 text-xs">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                            <div id="left-search-nav" class="hidden absolute right-0 top-6 bg-white shadow-md border rounded flex p-1 z-50">
                                <button onclick="navigateSearchResult('left', -1)" class="p-1 hover:bg-gray-100 rounded text-gray-600 text-xs"><i class="fa-solid fa-chevron-up"></i></button>
                                <span id="left-search-count" class="text-[10px] self-center px-1 text-gray-500">0/0</span>
                                <button onclick="navigateSearchResult('left', 1)" class="p-1 hover:bg-gray-100 rounded text-gray-600 text-xs"><i class="fa-solid fa-chevron-down"></i></button>
                                <button onclick="closeViewportSearch('left')" class="ml-1 p-1 hover:bg-red-50 text-red-500 rounded text-xs"><i class="fa-solid fa-xmark"></i></button>
                            </div>

    <script>
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        const DB_NAME = 'PDFLinkerStudioDB';
        const DB_VERSION = 16; // Incremented version
        let db;
        let SqlDb; // Global SQL.js instance
        let modalResolve = null;

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('documents')) db.createObjectStore('documents', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('links')) db.createObjectStore('links', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('annotations')) db.createObjectStore('annotations', { keyPath: 'docId' });
                    if (!db.objectStoreNames.contains('chats')) db.createObjectStore('chats', { keyPath: 'id' });
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject('IndexedDB error: ' + e.target.errorCode);
            });
        }

        async function saveDocumentToDB(docData) {
            const tx = db.transaction(['documents'], 'readwrite');
            tx.objectStore('documents').put(docData);
        }

        async function saveLinkToDB(linkData) {
            const tx = db.transaction(['links'], 'readwrite');
            tx.objectStore('links').put(linkData);
        }

        async function deleteLinkFromDB(linkId) {
            const tx = db.transaction(['links'], 'readwrite');
            tx.objectStore('links').delete(linkId);
        }

        async function saveAnnotationsToDB(docId, data) {
            const tx = db.transaction(['annotations'], 'readwrite');
            tx.objectStore('annotations').put({ docId, data });
        }

        async function saveChatToDB(chatData) {
            const tx = db.transaction(['chats'], 'readwrite');
            tx.objectStore('chats').put(chatData);
        }

        async function deleteChatFromDB(chatId) {
            const tx = db.transaction(['chats'], 'readwrite');
            tx.objectStore('chats').delete(chatId);
        }

        async function saveSettings() {
            if (!db) return;
            const settings = {
                id: 'appState',
                view: state.view,
                splitRatio: state.splitRatio,
                appMode: state.appMode,
                annoTool: state.annoTool,
                annoColor: state.annoColor,
                annoThickness: state.annoThickness,
                leftSidebarCollapsed: document.body.classList.contains('left-sidebar-collapsed'),
                aiSidebarCollapsed: document.body.classList.contains('ai-sidebar-collapsed')
            };
            const tx = db.transaction(['settings'], 'readwrite');
            tx.objectStore('settings').put(settings);
        }

        async function clearDB() {
            const tx = db.transaction(['documents', 'links', 'settings', 'annotations', 'chats'], 'readwrite');
            tx.objectStore('documents').clear();
            tx.objectStore('links').clear();
            tx.objectStore('settings').clear();
            tx.objectStore('annotations').clear();
            tx.objectStore('chats').clear();
        }

        async function loadStateFromDB() {
            return new Promise((resolve, reject) => {
                const result = { documents: [], links: [], settings: null, annotations: {}, chats: [] };
                const tx = db.transaction(['documents', 'links', 'settings', 'annotations', 'chats'], 'readonly');
                
                tx.objectStore('documents').getAll().onsuccess = (e) => result.documents = e.target.result;
                tx.objectStore('links').getAll().onsuccess = (e) => result.links = e.target.result;
                tx.objectStore('settings').get('appState').onsuccess = (e) => result.settings = e.target.result;
                tx.objectStore('annotations').getAll().onsuccess = (e) => {
                    e.target.result.forEach(item => result.annotations[item.docId] = item.data);
                };
                tx.objectStore('chats').getAll().onsuccess = (e) => result.chats = e.target.result;

                tx.oncomplete = () => resolve(result);
                tx.onerror = () => reject(tx.error);
            });
        }

        // --- Chat Management Logic ---

        function generateId() {
            return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        async function createNewChat() {
            const newId = generateId();
            const newChat = {
                id: newId,
                title: 'New Chat',
                messages: []
            };
            state.chats.unshift(newChat);
            state.currentChatId = newId;
            await saveChatToDB(newChat);
            renderChatList();
            renderChatMessages();
            els.chatInput.focus();
        }

        async function switchChat(chatId) {
            state.currentChatId = chatId;
            renderChatList();
            renderChatMessages();
        }

        async function deleteChat(chatId, event) {
            if(event) event.stopPropagation();
            if(!confirm("Delete this chat history?")) return;

            state.chats = state.chats.filter(c => c.id !== chatId);
            await deleteChatFromDB(chatId);

            if (state.currentChatId === chatId) {
                if (state.chats.length > 0) {
                    state.currentChatId = state.chats[0].id;
                } else {
                    createNewChat();
                    return; // createNewChat handles render
                }
            }
            renderChatList();
            renderChatMessages();
        }

        async function renameChat(chatId, currentTitle, event) {
            if(event) event.stopPropagation();
            
            const newTitle = await showPromptModal("Rename Chat", currentTitle);
            if (newTitle && newTitle.trim() !== "") {
                const chat = state.chats.find(c => c.id === chatId);
                if (chat) {
                    chat.title = newTitle.trim();
                    await saveChatToDB(chat);
                    renderChatList();
                }
            }
        }

        function renderChatList() {
            els.chatList.innerHTML = '';
            state.chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-list-item ${chat.id === state.currentChatId ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="truncate pr-6">${chat.title}</div>
                    <div class="chat-item-actions">
                        <div class="action-btn action-rename" onclick="renameChat('${chat.id}', '${escapeHtml(chat.title)}', event)" title="Rename"><i class="fa-solid fa-pen"></i></div>
                        <div class="action-btn action-delete" onclick="deleteChat('${chat.id}', event)" title="Delete"><i class="fa-solid fa-trash"></i></div>
                    </div>
                `;
                div.onclick = () => switchChat(chat.id);
                els.chatList.appendChild(div);
            });
        }

        function renderChatMessages() {
            els.chatHistory.innerHTML = '';
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (!chat) return;

            if (chat.messages.length === 0) {
                els.chatHistory.innerHTML = `
                    <div class="text-center text-xs text-gray-400 mt-4">
                        Ask a question about the loaded PDFs.
                        <br>Uses <span class="font-mono">nomic-embed-text</span> & <span class="font-mono">llama3.2</span>.
                    </div>`;
                return;
            }

            chat.messages.forEach(msg => {
                let htmlContent = msg.html;

                if (msg.role === 'assistant' && msg.context && htmlContent.includes('jumpToCitation')) {
                    
                    // Helper to create tooltip text
                    const getTooltip = (chunk) => {
                        const snippet = chunk.text.length > 150 ? chunk.text.substring(0, 150) + "..." : chunk.text;
                        return `Source: ${chunk.docName} (Page ${chunk.pageNum})\nText: ${snippet}`;
                    };

                    // 1. Upgrade Inline Citations (Add Title attribute)
                    htmlContent = htmlContent.replace(
                        /<span class="citation-chip" onclick="jumpToCitation\((\d+)\)">(\d+)<\/span>/g, 
                        (match, idxStr, text) => {
                            const idx = parseInt(idxStr);
                            const chunk = msg.context[idx];
                            if (chunk) {
                                return `<span class="citation-chip" onclick="handleCitationClick(this)" 
                                            data-doc="${chunk.docId}" 
                                            data-page="${chunk.pageNum}" 
                                            data-text="${encodeURIComponent(chunk.text)}"
                                            title="${escapeHtml(getTooltip(chunk))}">${text}</span>`;
                            }
                            return match;
                        }
                    );

                    // 2. Upgrade Footer Citations (Remove Name, Add Title, Keep Attributes)
                    // Matches: <span ... onclick="jumpToCitation(X)">[X] DocName P1</span>
                    htmlContent = htmlContent.replace(
                        /<span class="text-\[10px\] bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded cursor-pointer hover:bg-blue-100" onclick="jumpToCitation\((\d+)\)">.*?<\/span>/g,
                        (match, idxStr) => {
                            const idx = parseInt(idxStr);
                            const chunk = msg.context[idx];
                            if (chunk) {
                                return `<span class="text-[10px] bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded cursor-pointer hover:bg-blue-100" 
                                            onclick="handleCitationClick(this)"

        // --- AI Helper Functions ---

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0;
            let normA = 0;
            let normB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        async function getEmbedding(text) {
            try {
                const response = await fetch('http://localhost:11434/api/embeddings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "nomic-embed-text:latest",
                        prompt: text
                    })
                });
                const data = await response.json();
                return data.embedding;
            } catch (error) {
                console.error("Embedding Error:", error);
                return null;
            }
        }

        async function generateLLMResponse(prompt) {
            try {
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "gemma3:1b",
                        prompt: prompt,
                        stream: false
                    })
                });
                const data = await response.json();
                return data.response;
            } catch (error) {
                console.error("LLM Error:", error);
                return "Error connecting to LLM.";
            }
        }

        async function indexDocuments(force = false) {
            if (state.isIndexing) return;
            
            const docIds = Object.keys(state.documents);
            const embeddedDocIds = new Set(state.embeddings.map(e => e.docId));
            const needsIndexing = force || docIds.some(id => !embeddedDocIds.has(id));

            if (!needsIndexing) {
                updateAIStatus(`Ready. Indexed ${state.embeddings.length} segments.`);
                return;
            }

            state.isIndexing = true;
            updateAIStatus("Indexing PDFs...");
            
            const chunkSize = 500;
            const overlap = 50;

            for (const docId of docIds) {
                if (embeddedDocIds.has(docId) && !force) continue; 

                const doc = state.documents[docId];
                const totalPages = Math.min(doc.pageCount, 50); 

                for (let i = 1; i <= totalPages; i++) {
                    try {
                        const page = await doc.pdfDoc.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ').trim();
                        
                        if(pageText.length < 10) continue;

                        for (let start = 0; start < pageText.length; start += (chunkSize - overlap)) {
                            const chunk = pageText.substring(start, start + chunkSize);
                            if (chunk.trim().length > 10) {
                                const vector = await getEmbedding(chunk);
                                if (vector) {
                                    state.embeddings.push({
                                        id: `chunk_${docId}_${i}_${start}`,
                                        text: chunk,
                                        vector: vector,
                                        docId: docId,
                                        docName: doc.name,
                                        pageNum: i
                                    });
                                }
                            }
                        }
                    } catch (e) { console.error("Error indexing page", i, e); }
                }
            }
            
            state.isIndexing = false;
            updateAIStatus(`Ready. Indexed ${state.embeddings.length} segments.`);
        }

            els.aiStatus.innerText = msg;

        async function highlightChunk(text, side) {
            const layer = document.getElementById(`${side}-search-layer`);
            layer.innerHTML = ''; 
            const viewState = state.view[side];
            const docId = viewState.docId;
            if (!docId || !state.documents[docId]) return;

            try {
                const page = await state.documents[docId].pdfDoc.getPage(viewState.pageNum);
                const textContent = await page.getTextContent();
                const viewport = page.getViewport({ scale: viewState.scale });
                
                const measureCtx = state.measureCanvas.getContext('2d');
                const searchTerm = text.substring(0, 100).trim();
                let found = false;
                for (let itemIdx = 0; itemIdx < textContent.items.length; itemIdx++) {
                    const item = textContent.items[itemIdx];
                    if (item.str.includes(searchTerm)) {
                        const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                        const left = tx[4];
                        const bottom = tx[5];
                        const fontSize = Math.sqrt((tx[0] * tx[0]) + (tx[1] * tx[1]));
                        const top = bottom - fontSize;
                        
                        const cssFontFamily = getCssFontFamily(item.fontName);
                        measureCtx.font = `${fontSize}px ${cssFontFamily}`;
                        const matchWidth = measureCtx.measureText(searchTerm).width;

                        const div = document.createElement('div');
                        div.className = 'citation-highlight'; 
                        div.style.left = `${left}px`;
                        div.style.top = `${top}px`;
                        div.style.width = `${matchWidth}px`;
                        div.style.height = `${fontSize}px`;
                        layer.appendChild(div);
                        found = true;
                        break; 
                    }
                }
            } catch (e) {
                console.error("Error highlighting chunk", e);
            }
        }

        async function handleChat() {
            const question = els.chatInput.value.trim();
            if (!question) return;

            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (!chat) return;

            if (chat.messages.length === 0) {
                chat.title = question.substring(0, 30) + (question.length > 30 ? "..." : "");
                saveChatToDB(chat);
                renderChatList();
            }

            chat.messages.push({ role: 'user', html: escapeHtml(question) });
            appendMessageToDOM('user', escapeHtml(question));
            
            els.chatInput.value = '';
            updateAIStatus("Thinking...");

            const questionVector = await getEmbedding(question);
            if (!questionVector) {
                appendMessageToDOM('assistant', "Failed to generate embedding for question.");
                updateAIStatus("Error");
                return;
            }

            const scoredEmbeddings = state.embeddings.map(emb => {
                return { ...emb, score: cosineSimilarity(questionVector, emb.vector) };
            }).sort((a, b) => b.score - a.score).slice(0, 3); 

            state.currentContextChunks = scoredEmbeddings;

            const contextText = scoredEmbeddings.map((emb, idx) => 
                `[${idx + 1}] Source: ${emb.docName} (Page ${emb.pageNum})\nText: ${emb.text}`
            ).join("\n---\n");

            const systemPrompt = `You are a helpful assistant answering questions based on the provided PDF context.
            Use the context below to answer the user's question.`;

            const fullPrompt = `${systemPrompt}\n\nContext:\n${contextText}\n\nUser Question: ${question}\n\nAnswer:`;

            const answer = await generateLLMResponse(fullPrompt);

            // --- CHANGED: Generate HTML with Tooltips ---
            const formattedAnswer = answer.replace(/\[(\d+)\]/g, (match, num) => {
                const idx = parseInt(num) - 1;
                const emb = scoredEmbeddings[idx];
                if (!emb) return match; 

                const snippet = emb.text.length > 150 ? emb.text.substring(0, 150) + "..." : emb.text;
                const tooltipText = `Source: ${emb.docName} (Page ${emb.pageNum})\nText: ${snippet}`;

                return `<span class="citation-chip" onclick="handleCitationClick(this)" 
                            data-doc="${emb.docId}" 
                            data-page="${emb.pageNum}" 
                            data-text="${encodeURIComponent(emb.text)}"
                            title="${escapeHtml(tooltipText)}">${num}</span>`;
            });

            let contentHtml = formattedAnswer;
            contentHtml += `<div class="mt-2 pt-2 border-t border-gray-200 flex flex-wrap gap-1">`;
            scoredEmbeddings.forEach((emb, idx) => {
                // --- CHANGED: Footer links show only [num], with Tooltip ---
                const snippet = emb.text.length > 150 ? emb.text.substring(0, 150) + "..." : emb.text;
                const tooltipText = `Source: ${emb.docName} (Page ${emb.pageNum})\nText: ${snippet}`;

                contentHtml += `<span class="text-[10px] bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded cursor-pointer hover:bg-blue-100" 
                    onclick="handleCitationClick(this)"
                    data-doc="${emb.docId}" 
                    data-page="${emb.pageNum}" 
                    data-text="${encodeURIComponent(emb.text)}"
                    title="${escapeHtml(tooltipText)}">
                    [${idx+1}]
                </span>`;
            });
            contentHtml += `</div>`;

            appendMessageToDOM('assistant', contentHtml);
            
            const assistantMsg = chat.messages[chat.messages.length - 1];
            assistantMsg.html = contentHtml;
            assistantMsg.context = scoredEmbeddings; 
            
            await saveChatToDB(chat);

            updateAIStatus("Ready");
        }

        function initResizer() {
            const resizer = els.resizer;
            const leftSide = els.leftPanel;
            const rightSide = els.rightPanel;
            const container = els.workspaceMain;
            
            let x = 0;
            let leftWidth = 0;

            const mouseDownHandler = function(e) {
                x = e.clientX;
                const rect = leftSide.getBoundingClientRect();
                leftWidth = rect.width;

                document.body.classList.add('resizing-active');
                resizer.classList.add('resizing');

                document.addEventListener('pointermove', mouseMoveHandler);
                document.addEventListener('pointerup', mouseUpHandler);
            };

            const mouseMoveHandler = function(e) {
                const dx = e.clientX - x;
                const newLeftWidth = ((leftWidth + dx) * 100) / container.getBoundingClientRect().width;
                if (newLeftWidth > 10 && newLeftWidth < 90) {
                    leftSide.style.width = `${newLeftWidth}%`;
                    rightSide.style.width = `${100 - newLeftWidth}%`;
                    state.splitRatio = newLeftWidth / 100;
                }
            };

            const mouseUpHandler = function() {
                document.body.classList.remove('resizing-active');
                resizer.classList.remove('resizing');
                document.removeEventListener('pointermove', mouseMoveHandler);
                document.removeEventListener('pointerup', mouseUpHandler);
                saveSettings();
                renderMarkersForView('left');
                renderMarkersForView('right');
                ['left', 'right'].forEach(s => renderTextLayer(s));
            };

            resizer.addEventListener('pointerdown', mouseDownHandler);
        }

        function renderTextLayerCustom(textContent, textLayerDiv, viewport) {

        function getCssFontFamily(pdfFontName) {
            if (!pdfFontName) return 'sans-serif';
            const n = pdfFontName.toLowerCase();
            if (n.includes('times')) return 'Times New Roman, serif';
            if (n.includes('helvetica')) return 'Helvetica, Arial, sans-serif';
            if (n.includes('courier')) return 'Courier New, monospace';
            return 'sans-serif'; 
        }

        async function performViewportSearch(side, targetPageNum = null) {
            const input = document.getElementById(`${side}-search-input`);
            const query = input.value.trim().toLowerCase();
            const docId = state.view[side].docId;

            if (!query || !docId) {
                clearSearchHighlights(side);
                state.search[side] = { query: '', results: [], index: -1, abortController: null };
                updateSearchCount(side);
                return;
            }

            if (state.search[side].query === query && !targetPageNum) {
                renderSearchHighlights(side);
                return;
            }

            if (state.search[side].abortController) {
                state.search[side].abortController.abort();
            }

            const abortController = new AbortController();
            state.search[side].abortController = abortController;
            state.search[side].query = query;

            const doc = state.documents[docId];
            const allMatches = [];
            const maxPage = Math.min(doc.pageCount, 500); 
            const measureCtx = state.measureCanvas.getContext('2d');

            for (let i = 1; i <= maxPage; i++) {
                if (abortController.signal.aborted) break;

                try {
                    const page = await doc.pdfDoc.getPage(i);
                    const textContent = await page.getTextContent();
                    const viewport = page.getViewport({ scale: state.view[side].scale });

                    for (let itemIdx = 0; itemIdx < textContent.items.length; itemIdx++) {
                        const item = textContent.items[itemIdx];
                        const textStr = item.str.toLowerCase();
                        
                        if (textStr.includes(query)) {
                            const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                            const left = tx[4];
                            const bottom = tx[5];
                            const fontSize = Math.sqrt((tx[0] * tx[0]) + (tx[1] * tx[1]));
                            const top = bottom - fontSize;
                            
                            let searchIndex = 0;
                            let matchIndex;
                            while ((matchIndex = textStr.indexOf(query, searchIndex)) !== -1) {
                                const cssFontFamily = getCssFontFamily(item.fontName);
                                measureCtx.font = `${fontSize}px ${cssFontFamily}`;
                                const prefixStr = item.str.substring(0, matchIndex);
                                const prefixWidth = measureCtx.measureText(prefixStr).width;
                                const matchStr = item.str.substring(matchIndex, matchIndex + query.length);
                                const matchWidth = measureCtx.measureText(matchStr).width;

                                const matchLeft = left + prefixWidth;
                                
                                allMatches.push({
                                    page: i,
                                    index: itemIdx, 
                                    x: matchLeft,
                                    y: top,
                                    w: matchWidth,
                                    h: fontSize
                                });

                                searchIndex = matchIndex + 1;
                            }
                        }
                    }
                } catch (e) { }
            }

            state.search[side].results = allMatches;
            let startIndex = 0;
            if (targetPageNum) {
                startIndex = allMatches.findIndex(m => m.page === targetPageNum);
            } else {
                const currentMatches = allMatches.filter(m => m.page === state.view[side].pageNum);
                if (currentMatches.length > 0) {
                    startIndex = allMatches.indexOf(currentMatches[0]);
                } else if (allMatches.length > 0) {
                    startIndex = 0;
                }
            }
            
            if (startIndex === -1) startIndex = 0;
            state.search[side].index = startIndex;
            
            const targetMatch = allMatches[startIndex];
            if (targetPageNum && targetMatch && targetMatch.page !== state.view[side].pageNum) {
                state.view[side].pageNum = targetMatch.page;
                renderPage(side); 
            } else {
                renderSearchHighlights(side);
            }
            
            updateSearchCount(side);
        }

        function clearSearchHighlights(side) {
            document.getElementById(`${side}-search-layer`).innerHTML = '';
        }

        function renderSearchHighlights(side) {
            const container = document.getElementById(`${side}-search-layer`);
            container.innerHTML = '';
            
            const currentPage = state.view[side].pageNum;
            const pageMatches = state.search[side].results.filter(m => m.page === currentPage);
            const activeGlobalIndex = state.search[side].index;
            
            pageMatches.forEach((res) => {
                const globalIdx = state.search[side].results.indexOf(res);
                const div = document.createElement('div');
                div.className = 'search-highlight' + (globalIdx === activeGlobalIndex ? ' active' : '');
                div.style.left = `${res.x}px`;
                div.style.top = `${res.y}px`;
                div.style.width = `${res.w}px`;
                div.style.height = `${res.h}px`;
                container.appendChild(div);
            });
        }

        function updateSearchCount(side) {
            const total = state.search[side].results.length;
            const current = total > 0 ? state.search[side].index + 1 : 0;
            document.getElementById(`${side}-search-count`).innerText = `${current}/${total}`;
        }

        function navigateSearchResult(side, dir) {
            const results = state.search[side].results;
            if (results.length === 0) return;
            
            let newIndex = state.search[side].index + dir;
            if (newIndex < 0) newIndex = results.length - 1;
            if (newIndex >= results.length) newIndex = 0;
            
            state.search[side].index = newIndex;
            const match = results[newIndex];
            
            if (match.page !== state.view[side].pageNum) {
                state.view[side].pageNum = match.page;
                renderPage(side);
            } else {
                renderSearchHighlights(side);
            }
            updateSearchCount(side);
        }

        async function performGlobalSearch() {
            const query = els.globalSearchInput.value.trim().toLowerCase();
            const container = els.globalSearchResults;
            container.innerHTML = '';

            if (!query) {
                container.classList.add('hidden');
                return;

            container.classList.remove('hidden');
            container.innerHTML = '<div class="text-xs text-gray-400 p-2 text-center">Searching...</div>';

            let allMatches = [];

            for (const docId of Object.keys(state.documents)) {
                const doc = state.documents[docId];
                const maxPage = Math.min(doc.pageCount, 100); 
                
                for (let i = 1; i <= maxPage; i++) {
                    try {
                        const page = await doc.pdfDoc.getPage(i);
                        const textContent = await page.getTextContent();
                        const foundOnPage = textContent.items.some(item => item.str.toLowerCase().includes(query));
                        if (foundOnPage) {
                            allMatches.push({
                                docId: docId,
                                docName: doc.name,
                                page: i
                            });
                        }
                    } catch(e) { }
                }
            }

            container.innerHTML = '';
            if (allMatches.length === 0) {
                container.innerHTML = '<div class="text-xs text-gray-500 p-2">No matches found.</div>';
                return;
            }

            allMatches.forEach(match => {
                const div = document.createElement('div');
                div.className = 'p-2 border-b border-gray-100 search-result-item hover:bg-blue-50';
                div.innerHTML = `
                    <div class="font-bold text-xs text-gray-700 truncate">${match.docName}</div>
                    <div class="text-[10px] text-blue-600">Page ${match.page}</div>
                `;
                div.onclick = async () => {
                    const side = state.lastActiveSide;
                    state.view[side].docId = match.docId;
                    state.view[side].pageNum = match.page;
                    state.view[side].scrollTop = 0;
                    
                    const input = document.getElementById(`${side}-search-input`);
                    input.value = query;
                    input.classList.remove('hidden');
                    document.getElementById(`${side}-search-nav`).classList.remove('hidden');

                    await performViewportSearch(side, match.page);
                    
                    renderPage(side);
                    renderDocList();
                };
                container.appendChild(div);
            });
        }

        async function deleteDocument(id) {
            if(!confirm("Are you sure you want to delete this PDF and all its annotations/links?")) return;

            delete state.documents[id];
            delete state.annotations[id];

            const updatedLinks = state.links.filter(l => l.source.docId !== id && l.target.docId !== id);
            
            const tx = db.transaction(['documents', 'links', 'annotations'], 'readwrite');
            tx.objectStore('documents').delete(id);
            tx.objectStore('annotations').delete(id);
            
            const linkStore = tx.objectStore('links');
            linkStore.clear();
            updatedLinks.forEach(l => linkStore.put(l));
            state.links = updatedLinks;

            state.embeddings = state.embeddings.filter(e => e.docId !== id);

            if(state.view.left.docId === id) {
                state.view.left.docId = null;
                renderPage('left');
            }
            if(state.view.right.docId === id) {
                state.view.right.docId = null;
                renderPage('right');
            }

            renderDocList();
            renderMarkersForView('left');
            renderMarkersForView('right');
        }

        async function deleteCurrentPage(side) {
            const viewState = state.view[side];
            const docId = viewState.docId;
            const pageNum = viewState.pageNum;

            if (!docId) return;

            if (!confirm(`Delete page ${pageNum} from ${state.documents[docId].name}? This cannot be undone.`)) return;

            els.loadingSpinner.classList.remove('hidden');
            els.loadingSpinner.querySelector('span').innerText = "Deleting Page...";

            try {
                const originalDoc = state.documents[docId];
                if (originalDoc.pageCount <= 1) {
                    showModal("Error", "Cannot delete only page in a document.");
                    return;
                }

                const arrayBuffer = await originalDoc.file.arrayBuffer();
                const pdfLibDoc = await PDFDocument.load(arrayBuffer);

                pdfLibDoc.removePage(pageNum - 1);

                const newPdfBytes = await pdfLibDoc.save();
                const newBlob = new Blob([newPdfBytes], { type: 'application/pdf' });

                if (state.annotations[docId]) {
                    const newAnnoMap = {};
                    for(let i=1; i<pageNum; i++) {
                        if(state.annotations[docId][i]) newAnnoMap[i] = state.annotations[docId][i];
                    }
                    for(let i=pageNum+1; i<=originalDoc.pageCount; i++) {
                        if(state.annotations[docId][i]) newAnnoMap[i-1] = state.annotations[docId][i];
                    }
                    state.annotations[docId] = newAnnoMap;
                    await saveAnnotationsToDB(docId, state.annotations[docId]);
                }

                state.embeddings.forEach(e => {
                    if (e.docId === docId && e.pageNum > pageNum) {
                        e.pageNum -= 1;
                    }
                });

                const updatedLinks = [];
                for (const link of state.links) {
                    let keepLink = true;
                    const updatePoint = (pt) => {
                        if (pt.docId === docId) {
                            if (pt.page === pageNum) keepLink = false; 
                            else if (pt.page > pageNum) return { ...pt, page: pt.page - 1 };
                        }
                        return pt;
                    };
                    const newSource = updatePoint(link.source);
                    const newTarget = updatePoint(link.target);
                    if(keepLink) {
                        updatedLinks.push({ ...link, source: newSource, target: newTarget });
                        await saveLinkToDB(updatedLinks[updatedLinks.length-1]);
                    }
                }
                
                const tx = db.transaction(['links'], 'readwrite');
                const linkStore = tx.objectStore('links');
                linkStore.clear();
                updatedLinks.forEach(l => linkStore.put(l));
                state.links = updatedLinks;

                const newPdfJsDoc = await pdfjsLib.getDocument(newPdfBytes).promise;

                state.documents[docId].file = newBlob;
                state.documents[docId].pdfDoc = newPdfJsDoc;
                state.documents[docId].pageCount = newPdfJsDoc.numPages;

                await saveDocumentToDB({
                    id: docId,
                    name: originalDoc.name,
                    pageCount: newPdfJsDoc.numPages,
                    thumbnail: originalDoc.thumbnail,
                    fileBlob: newBlob
                });

                if (state.view[side].pageNum > state.documents[docId].pageCount) {
                    state.view[side].pageNum = state.documents[docId].pageCount;
                }
                
                const otherSide = side === 'left' ? 'right' : 'left';
                if(state.view[otherSide].docId === docId && state.view[otherSide].pageNum >= pageNum) {
                    if (state.view[otherSide].pageNum > state.documents[docId].pageCount) {
                        state.view[otherSide].pageNum = state.documents[docId].pageCount;
                    }
                    renderPage(otherSide);
                }

                renderPage(side);
                renderDocList();
                showModal("Success", "Page deleted successfully.");

            } catch (err) {
                console.error(err);
                showModal("Error", "Failed to delete page.");
            } finally {
                els.loadingSpinner.classList.add('hidden');
            }
        }

        function deleteSelection() {
            if (!state.selection.active) return;
            const side = state.selection.side;
            const docId = state.view[side].docId;
            const pageNum = state.view[side].pageNum;
            
            if (!state.annotations[docId] || !state.annotations[docId][pageNum]) return;
            const pageData = state.annotations[docId][pageNum];

            state.selection.selectedImages.forEach(imgObj => {
                const idx = pageData.images.indexOf(imgObj);
                if(idx > -1) {
                    pageData.images.splice(idx, 1);
                    delete state.imageCache[imgObj.id];
                }
            });

            state.selection.selectedTextBoxes.forEach(textBoxObj => {
                const idx = pageData.textBoxes.indexOf(textBoxObj);
                if(idx > -1) {
                    pageData.textBoxes.splice(idx, 1);
                }
            });

            state.selection.selectedStrokes.forEach(strokeObj => {
                const idx = pageData.strokes.indexOf(strokeObj);
                if(idx > -1) pageData.strokes.splice(idx, 1);
            });

            clearSelection();
            saveAnnotationsToDB(docId, state.annotations[docId]);
            renderAnnotations(side);
            renderTextLayer(side);
        }

        function renderTextLayer(side) {
            const wrapper = els[side + 'Wrapper'];
            const existingBoxes = wrapper.querySelectorAll('.text-box');
            existingBoxes.forEach(el => el.remove());

            const viewState = state.view[side];
            const docId = viewState.docId;
            const pageNum = viewState.pageNum;
            const scale = viewState.scale;

            if (!state.annotations[docId] || !state.annotations[docId][pageNum]) return;

            const boxes = state.annotations[docId][pageNum].textBoxes || [];

            boxes.forEach(box => {
                const div = document.createElement('div');
                div.className = 'text-box';
                if (state.selection.selectedTextBoxes.includes(box)) {
                    div.classList.add('selected');
                }
                
                div.contentEditable = true;
                div.innerText = box.content;
                div.dataset.id = box.id;
                
                div.style.left = (box.x * 100) + '%';
                div.style.top = (box.y * 100) + '%';
                div.style.width = (box.w * 100) + '%';
                div.style.height = (box.h * 100) + '%'; 
                
                div.style.color = box.color;
                div.style.fontSize = (box.fontSize * scale) + 'px';

                div.addEventListener('input', (e) => {
                    box.content = div.innerText;
                    if (div.scrollHeight > div.clientHeight) {
                        const wrapperHeight = els[side + 'Wrapper'].offsetHeight;
                        const newPixelHeight = div.scrollHeight;
                        box.h = newPixelHeight / wrapperHeight;
                        div.style.height = newPixelHeight + 'px';
                        debouncedSaveToDB(side); 
                    } else {
                        debouncedSaveToDB(side);
                    }
                });

                div.addEventListener('focus', () => {
                    if (state.appMode === 'annotation' && state.annoTool === 'text') {}
                    else if (state.appMode === 'annotation' && state.annoTool === 'select') {}
                });

                div.addEventListener('blur', () => {
                    if (!box.content.trim()) {
                        const pageData = state.annotations[docId][pageNum];
                        const idx = pageData.textBoxes.indexOf(box);
                        if (idx > -1) {
                            pageData.textBoxes.splice(idx, 1);
                            saveAnnotationsToDB(docId, state.annotations[docId]);
                            div.remove();
                            if (state.selection.selectedTextBoxes.includes(box)) {
                                state.selection.selectedTextBoxes = state.selection.selectedTextBoxes.filter(b => b.id !== box.id);
                            }
                        }
                    } else {
                        debouncedSaveToDB(side);
                    }
                });

                wrapper.appendChild(div);
            });
        }
        
        const dbSaveDebounceMap = { left: null, right: null };
        function debouncedSaveToDB(side) {
            if (dbSaveDebounceMap[side]) clearTimeout(dbSaveDebounceMap[side]);
            dbSaveDebounceMap[side] = setTimeout(() => {
                const docId = state.view[side].docId;
                if(docId) saveAnnotationsToDB(docId, state.annotations[docId]);
            }, 500);
        }

        // Helper to convert Blob to Uint8Array for SQLite
        const blobToUint8Array = async (blob) => {
            const arrayBuffer = await blob.arrayBuffer();
            return new Uint8Array(arrayBuffer);
        };

        // Helper to convert Uint8Array to Blob
        const uint8ArrayToBlob = (u8Array, mimeType) => {
            return new Blob([u8Array], { type: mimeType });
        };

        function setAppMode(mode, save = true) {
            state.appMode = mode;
            if (save) saveSettings();

            document.body.classList.remove('linking-mode', 'annotation-mode', 'anno-pen', 'anno-pixel-eraser', 'anno-stroke-eraser', 'anno-select', 'anno-text', 'delete-link-mode');

            [els.modeNavBtn, els.modeLinkBtn, els.modeDelLinkBtn, els.modeAnnoBtn].forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
                btn.classList.add('text-gray-500');
            });
            els.annoTools.classList.add('hidden');

            if (mode === 'navigation') {
                els.modeNavBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeNavBtn.classList.remove('text-gray-500');
            } else if (mode === 'linking') {
                document.body.classList.add('linking-mode');
                els.modeLinkBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeLinkBtn.classList.remove('text-gray-500');
            } else if (mode === 'delete-link') {
                document.body.classList.add('delete-link-mode');
                els.modeDelLinkBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeDelLinkBtn.classList.remove('text-gray-500');
                showModal("Delete Link Mode", "Click on any red link marker to delete it.");
            } else if (mode === 'annotation') {
                document.body.classList.add('annotation-mode');
                els.modeAnnoBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                els.modeAnnoBtn.classList.remove('text-gray-500');
                els.annoTools.classList.remove('hidden');
                setAnnoTool(state.annoTool, false); 
            }
        }


        function setAnnoTool(tool, save = true) {
            state.annoTool = tool;
            if (save) saveSettings();

            // Reset all tool buttons
            const allTools = [els.toolSelect, els.toolPen, els.toolText, els.toolEraserPixel, els.toolEraserStroke, els.toolHighlighter];
            allTools.forEach(btn => {
                btn.classList.remove('bg-blue-50', 'text-blue-600', 'bg-purple-50', 'text-purple-600', 'bg-yellow-100', 'text-yellow-700');
                btn.classList.add('text-gray-500');
            });

            // Remove all tool-specific body classes
            document.body.classList.remove('anno-pen', 'anno-pixel-eraser', 'anno-stroke-eraser', 'anno-select', 'anno-text', 'anno-highlighter');

            // --- DYNAMIC SETTINGS LOGIC ---
            // Ensure settings exist (fallback for old saves)
            if (!state.toolSettings) {
                state.toolSettings = {
                    pen: { color: '#ef4444', thickness: 5 },
                    highlighter: { color: '#facc15', thickness: 20 }
                };
            }

            // Apply the specific tool's settings to the global state and UI
            if (state.toolSettings[tool]) {
                const settings = state.toolSettings[tool];
                
                if (settings.color !== undefined) {
                    state.annoColor = settings.color;
                    els.colorPicker.value = settings.color;
                }
                if (settings.thickness !== undefined) {
                    state.annoThickness = settings.thickness;
                    els.thicknessPicker.value = settings.thickness;
                    
                    // Update the text number display
                    const thicknessDisplay = document.getElementById('thickness-val');
                    if(thicknessDisplay) thicknessDisplay.innerText = settings.thickness;
                }
            }
            // ------------------------------

            // Activate specific tool visual state
            if (tool === 'select') {
                els.toolSelect.classList.add('bg-purple-50', 'text-purple-600');
                els.toolSelect.classList.remove('text-gray-500');
                document.body.classList.add('anno-select');
            } 
            else if (tool === 'pen') {
                els.toolPen.classList.add('bg-blue-50', 'text-blue-600');
                els.toolPen.classList.remove('text-gray-500');
                document.body.classList.add('anno-pen');
            } 
            else if (tool === 'text') {
                els.toolText.classList.add('bg-blue-50', 'text-blue-600');
                els.toolText.classList.remove('text-gray-500');
                document.body.classList.add('anno-text');
            } 
            else if (tool === 'eraser-pixel') {
                els.toolEraserPixel.classList.add('bg-blue-50', 'text-blue-600');
                els.toolEraserPixel.classList.remove('text-gray-500');
                document.body.classList.add('anno-pixel-eraser');
            } 
            else if (tool === 'eraser-stroke') {
                els.toolEraserStroke.classList.add('bg-blue-50', 'text-blue-600');
                els.toolEraserStroke.classList.remove('text-gray-500');
                document.body.classList.add('anno-stroke-eraser');
            }
            else if (tool === 'highlighter') {
                els.toolHighlighter.classList.add('bg-yellow-100', 'text-yellow-700');
                els.toolHighlighter.classList.remove('text-gray-500');
                document.body.classList.add('anno-highlighter');
            }
        }
